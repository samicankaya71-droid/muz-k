<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta-ify Executive Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --neon-dim: rgba(0, 242, 255, 0.3); --bg: #000; --card: rgba(255, 255, 255, 0.05); --glass: rgba(10, 10, 10, 0.85); }
        * { box-sizing: border-box; outline: none; transition: all 0.2s ease-in-out; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 280px; background: #000; border-right: 1px solid #111; display: flex; flex-direction: column; padding: 30px 15px; z-index: 1001; }
        .logo { font-weight: 800; font-size: 22px; color: var(--neon); letter-spacing: 2px; margin-bottom: 40px; text-shadow: 0 0 15px var(--neon); }
        .nav-link { padding: 14px 18px; cursor: pointer; border-radius: 12px; color: #888; font-weight: 600; display: flex; align-items: center; gap: 15px; font-size: 14px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: var(--card); color: #fff; }
        .nav-link.active { color: var(--neon); box-shadow: inset 0 0 10px var(--neon-dim); }
        .playlist-scroll { flex: 1; overflow-y: auto; margin-top: 20px; }
        
        /* MAIN */
        #main-content { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at 0% 0%, #151515, #000); overflow-y: auto; padding-bottom: 150px; }
        .view-header { padding: 60px 40px 30px; display: flex; align-items: flex-end; gap: 30px; }
        .header-img { width: 200px; height: 200px; background: linear-gradient(135deg, #111, #222); border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 80px; border: 1px solid #333; }
        
        /* SONG TABLE */
        .song-table { width: 100%; padding: 0 40px; border-collapse: collapse; }
        .song-row { display: grid; grid-template-columns: 50px 2fr 1fr 120px; padding: 15px 20px; border-radius: 12px; align-items: center; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; }
        .song-row:hover { background: rgba(255,255,255,0.05); }
        .song-row.playing { border-color: var(--neon); background: rgba(0,242,255,0.03); color: var(--neon); }
        .btn-icon { cursor: pointer; opacity: 0.6; font-size: 18px; }
        .btn-icon:hover { opacity: 1; transform: scale(1.2); color: var(--neon); }
        .btn-icon.active { color: var(--neon); opacity: 1; text-shadow: 0 0 10px var(--neon); }
        .btn-icon.fav.active { color: #ff0055; text-shadow: 0 0 10px #ff0055; }

        /* PLAYER BAR */
        #player-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1300px; height: 100px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; padding: 0 40px; z-index: 1000; box-shadow: 0 25px 50px rgba(0,0,0,0.7); }
        .track-zone { width: 25%; display: flex; align-items: center; gap: 15px; }
        .control-zone { width: 50%; display: flex; flex-direction: column; align-items: center; }
        .main-controls { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
        .play-pause { width: 55px; height: 55px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .play-pause:hover { transform: scale(1.1); background: var(--neon); }
        .bar-bg { width: 100%; height: 6px; background: #222; border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 15px var(--neon); }

        /* MODALS (SETTINGS & HISTORY) */
        .premium-modal { position: fixed; background: #0a0a0a; border: 1px solid var(--neon); border-radius: 20px; padding: 25px; z-index: 2000; display: none; box-shadow: 0 0 40px rgba(0,242,255,0.15); }
        #settings-modal { bottom: 150px; right: 40px; width: 300px; }
        #history-modal { bottom: 150px; left: 40px; width: 350px; }
        .playlist-modal { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">USTA-IFY</div>
    <div class="nav-link active" onclick="showView('all', this)">🏠 Ana Havuz</div>
    <div class="nav-link" onclick="showView('favorites', this)">💖 Favoriler</div>
    <div class="nav-link" onclick="toggleModal('history-modal')">📜 Geçmiş</div>
    <div class="nav-link" onclick="toggleModal('settings-modal')">⚙️ Ayarlar</div>
    
    <div class="playlist-scroll">
        <div style="font-size: 10px; font-weight: 800; color: #444; margin-bottom: 15px; padding-left: 18px;">PLAYLISTLER</div>
        <div id="side-playlists"></div>
        <div class="nav-link" onclick="toggleModal('new-playlist-modal')" style="color: var(--neon);">+ Yeni Liste</div>
    </div>
</div>

<div id="main-content">
    <div class="view-header">
        <div class="header-img" id="view-icon">🎧</div>
        <div>
            <div style="font-size: 12px; font-weight: 800; color: var(--neon);">EXECUTIVE PLAYER</div>
            <h1 id="view-title">Tüm Şarkılar</h1>
        </div>
    </div>
    <div class="song-table" id="song-body"></div>
</div>

<div id="player-bar">
    <div class="track-zone">
        <div style="width: 55px; height: 55px; background: #111; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #222;" id="mini-img">🎵</div>
        <div>
            <div id="bar-title" style="font-weight: bold; font-size: 14px; width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Şarkı Seçin</div>
            <div id="bar-artist" style="font-size: 11px; color: #555;">Sanatçı</div>
        </div>
    </div>

    <div class="control-zone">
        <div class="main-controls">
            <div class="btn-icon" id="shuffle-btn" onclick="toggleShuffle()">🔀</div>
            <div class="btn-icon" onclick="skipTime(-10)">⏪</div>
            <div class="btn-icon" onclick="prevSong()">⏮</div>
            <div class="play-pause" id="play-btn" onclick="togglePlay()">▶</div>
            <div class="btn-icon" onclick="nextSong()">⏭</div>
            <div class="btn-icon" onclick="skipTime(10)">⏩</div>
            <div class="btn-icon" id="repeat-btn" onclick="toggleRepeat()">🔁</div>
        </div>
        <div style="width: 100%; display: flex; align-items: center; gap: 15px;">
            <span id="cur-time" style="font-size: 10px; color: #444;">0:00</span>
            <div class="bar-bg" onclick="seek(event)">
                <div id="bar-fill" class="bar-fill"></div>
            </div>
            <span id="dur-time" style="font-size: 10px; color: #444;">0:00</span>
        </div>
    </div>

    <div style="width: 25%; display: flex; justify-content: flex-end; align-items: center; gap: 15px;">
        <span style="font-size: 12px; color: #444;">🔊</span>
        <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" style="width: 80px; accent-color: var(--neon);">
    </div>
</div>

<div id="settings-modal" class="premium-modal">
    <h3 style="margin-top:0; color: var(--neon);">Ayarlar</h3>
    <p style="font-size:13px">Crossfade: <span id="cf-val">3</span> Saniye</p>
    <input type="range" min="0" max="15" value="3" style="width:100%" oninput="updateCF(this.value)">
    <p style="font-size:11px; color:#444; margin-top:20px;">Usta-ify v12.0 Stable Build</p>
</div>

<div id="history-modal" class="premium-modal">
    <h3 style="margin-top:0; color: var(--neon);">Dinleme Geçmişi</h3>
    <div id="history-content" style="max-height: 300px; overflow-y: auto; font-size: 12px;"></div>
    <button onclick="clearHistory()" style="background:none; border:1px solid #333; color:#555; width:100%; margin-top:10px; cursor:pointer;">Temizle</button>
</div>

<div id="new-playlist-modal" class="premium-modal playlist-modal">
    <h3 id="modal-title">Listeye Ekle</h3>
    <div id="pl-options" style="margin-bottom:15px; max-height:150px; overflow-y:auto;"></div>
    <input type="text" id="pl-input" placeholder="Yeni liste adı..." style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:10px; border-radius:8px;">
    <button onclick="saveToPlaylist()" style="width:100%; background:var(--neon); border:none; padding:10px; margin-top:10px; border-radius:8px; font-weight:bold; cursor:pointer;">Kaydet</button>
    <button onclick="toggleModal('new-playlist-modal')" style="width:100%; background:none; border:none; color:#555; margin-top:5px; cursor:pointer;">İptal</button>
</div>

<audio id="audio1"></audio>
<audio id="audio2"></audio>

<script>
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_favs')) || [];
    let playlists = JSON.parse(localStorage.getItem('u_lists')) || {}, history = JSON.parse(localStorage.getItem('u_hist')) || [];
    let currentIndex = 0, activePlayer = 1, cfTime = 3, isShuffle = false, repeatMode = 0; // 0:no, 1:list, 2:one
    let selectedSongUrl = null;

    const a1 = document.getElementById('audio1'), a2 = document.getElementById('audio2');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v || "İsimsiz", artist: r.c[1]?.v || "Bilinmiyor", url: r.c[2]?.v || "" })).filter(s => s.url.includes('http'));
            showView('all');
            renderSidePlaylists();
            updateHistoryUI();
        } catch(e) { console.error("Hata:", e); }
    }

    function showView(type, el, plName = null) {
        if(el) { document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        if(type === 'all') { currentQueue = [...allSongs]; document.getElementById('view-title').innerText = "Tüm Şarkılar"; }
        else if(type === 'favorites') { currentQueue = allSongs.filter(s => favorites.includes(s.url)); document.getElementById('view-title').innerText = "Favorilerim"; }
        else if(type === 'playlist') { currentQueue = allSongs.filter(s => playlists[plName].includes(s.url)); document.getElementById('view-title').innerText = plName; }
        renderSongs();
    }

    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIndex === i && currentQueue[i].url === s.url ? 'playing' : ''}" onclick="playIndex(${i})">
                <div style="font-weight:bold; opacity:0.3">${i+1}</div>
                <div style="font-weight:600">${s.title}</div>
                <div style="color:#555; font-size:13px">${s.artist}</div>
                <div style="display:flex; gap:15px; justify-content:flex-end">
                    <span class="btn-icon fav ${favorites.includes(s.url) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${s.url}')">❤</span>
                    <span class="btn-icon" onclick="event.stopPropagation(); openPLModal('${s.url}')">➕</span>
                </div>
            </div>
        `).join('');
    }

    function playIndex(index) {
        currentIndex = index;
        const song = currentQueue[currentIndex];
        const p = activePlayer === 1 ? a1 : a2;
        p.src = song.url;
        p.play();
        document.getElementById('play-btn').innerText = "⏸";
        document.getElementById('bar-title').innerText = song.title;
        document.getElementById('bar-artist').innerText = song.artist;
        addToHistory(song.title);
        track(p);
        renderSongs();
    }

    function track(p) {
        p.ontimeupdate = () => {
            document.getElementById('bar-fill').style.width = (p.currentTime / p.duration * 100) + "%";
            document.getElementById('cur-time').innerText = formatTime(p.currentTime);
            document.getElementById('dur-time').innerText = formatTime(p.duration);
            
            // Crossfade & Otomatik Geçiş
            if (p.duration && p.duration - p.currentTime <= cfTime && cfTime > 0) {
                p.ontimeupdate = null;
                crossfadeNext();
            } else if (p.ended) {
                nextSong();
            }
        };
        p.onended = () => { if(cfTime <= 0) nextSong(); };
    }

    function crossfadeNext() {
        const oldP = activePlayer === 1 ? a1 : a2;
        activePlayer = activePlayer === 1 ? 2 : 1;
        const newP = activePlayer === 1 ? a1 : a2;
        
        determineNextIndex();
        newP.src = currentQueue[currentIndex].url;
        newP.volume = 0;
        newP.play();
        
        let fade = setInterval(() => {
            if(newP.volume < 0.9) {
                newP.volume += 0.1;
                if(oldP.volume > 0.1) oldP.volume -= 0.1;
            } else {
                oldP.pause(); oldP.volume = 1; newP.volume = 1;
                clearInterval(fade);
                track(newP);
                updateUIForNewSong();
            }
        }, 200);
    }

    function determineNextIndex() {
        if(repeatMode === 2) return; // Aynı şarkı
        if(isShuffle) { currentIndex = Math.floor(Math.random() * currentQueue.length); }
        else { currentIndex = (currentIndex + 1) % currentQueue.length; }
    }

    function nextSong() { determineNextIndex(); playIndex(currentIndex); }
    function prevSong() { currentIndex = (currentIndex - 1 + currentQueue.length) % currentQueue.length; playIndex(currentIndex); }
    function skipTime(s) { const p = activePlayer === 1 ? a1 : a2; p.currentTime += s; }
    function seek(e) { const p = activePlayer === 1 ? a1 : a2; p.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * p.duration; }
    
    function togglePlay() { 
        const p = activePlayer === 1 ? a1 : a2; 
        if(p.paused) { p.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { p.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }

    function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffle-btn').classList.toggle('active', isShuffle); }
    function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; const btn = document.getElementById('repeat-btn'); btn.innerText = repeatMode === 2 ? "🔂" : "🔁"; btn.classList.toggle('active', repeatMode > 0); }

    function updateCF(v) { cfTime = parseInt(v); document.getElementById('cf-val').innerText = v; }
    function setVolume(v) { a1.volume = v; a2.volume = v; }
    function formatTime(s) { const m = Math.floor(s/60), sc = Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }

    // MODAL & STORAGE
    function toggleModal(id) { const m = document.getElementById(id); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    function addToHistory(t) { const entry = { name: t, time: new Date().toLocaleTimeString() }; history.unshift(entry); if(history.length > 20) history.pop(); localStorage.setItem('u_hist', JSON.stringify(history)); updateHistoryUI(); }
    function updateHistoryUI() { document.getElementById('history-content').innerHTML = history.map(h => `<div style="padding:8px 0; border-bottom:1px solid #111"><b>${h.name}</b> <br><span style="color:#444; font-size:10px">${h.time}</span></div>`).join(''); }
    function clearHistory() { history = []; localStorage.removeItem('u_hist'); updateHistoryUI(); }

    function openPLModal(url) { selectedSongUrl = url; toggleModal('new-playlist-modal'); document.getElementById('pl-options').innerHTML = Object.keys(playlists).map(n => `<div onclick="confirmPL('${n}')" style="padding:10px; cursor:pointer; border-bottom:1px solid #222">${n}</div>`).join(''); }
    function confirmPL(n) { if(!playlists[n].includes(selectedSongUrl)) playlists[n].push(selectedSongUrl); localStorage.setItem('u_lists', JSON.stringify(playlists)); toggleModal('new-playlist-modal'); renderSidePlaylists(); }
    function saveToPlaylist() { const n = document.getElementById('pl-input').value; if(n) { if(!playlists[n]) playlists[n] = []; confirmPL(n); } }
    function renderSidePlaylists() { document.getElementById('side-playlists').innerHTML = Object.keys(playlists).map(n => `<div class="nav-link" onclick="showView('playlist', this, '${n}')"># ${n}</div>`).join(''); }
    function toggleFav(url) { if(favorites.includes(url)) favorites = favorites.filter(f => f !== url); else favorites.push(url); localStorage.setItem('u_favs', JSON.stringify(favorites)); renderSongs(); }

    window.onload = init;
</script>
</body>
</html>
