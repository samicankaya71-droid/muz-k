<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Spotify Pro v28</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #1db954; --black: #000; --dark: #121212; --grey: #282828; --text-grey: #b3b3b3; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 240px; background: var(--black); padding: 15px; display: flex; flex-direction: column; border-right: 1px solid #222; z-index: 10; }
        .nav-item { padding: 12px; cursor: pointer; color: var(--text-grey); font-weight: bold; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-radius: 8px; }
        .nav-item:hover, .nav-item.active { color: white; background: var(--grey); }
        .playlist-area { margin-top: 20px; overflow-y: auto; flex-grow: 1; border-top: 1px solid #222; padding-top: 10px; }
        .pl-item { padding: 8px 12px; font-size: 14px; color: var(--text-grey); cursor: pointer; display: flex; justify-content: space-between; }
        .pl-item:hover { color: white; background: #1a1a1a; }

        /* Main Content */
        #main { flex-grow: 1; background: linear-gradient(to bottom, #1e1e1e, var(--black)); overflow-y: auto; padding: 20px; padding-bottom: 120px; position: relative; }
        .song-table { width: 100%; border-collapse: collapse; text-align: left; }
        .song-table tr { transition: 0.2s; }
        .song-table tr:hover { background: rgba(255,255,255,0.05); }
        .song-table td { padding: 12px; color: var(--text-grey); cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .active-song { color: var(--green) !important; font-weight: bold; }

        /* Right Drawer (Geçmiş) */
        #drawer { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #080808; border-left: 1px solid #222; transition: 0.3s; z-index: 100; padding: 20px; }
        #drawer.open { right: 0; }
        .drawer-close { cursor: pointer; float: right; font-size: 20px; }

        /* Player */
        #player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 30px; border-top: 1px solid #282828; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 101; }
        .p-left { width: 30%; display: flex; align-items: center; gap: 15px; }
        .p-mid { width: 40%; display: flex; flex-direction: column; align-items: center; }
        .p-right { width: 30%; text-align: right; display: flex; justify-content: flex-end; gap: 20px; }
        
        .play-btn { background: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .bar-bg { flex-grow: 1; height: 4px; background: #4f4f4f; border-radius: 2px; cursor: pointer; position: relative; width: 100%; margin: 10px 0; }
        .bar-fill { height: 100%; background: var(--green); width: 0%; border-radius: 2px; }
        .btn-icon { background: none; border: none; color: var(--text-grey); font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-icon:hover, .active-btn { color: white; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-item active" onclick="showSection('all')"><i class="fas fa-home"></i> Kitaplık</div>
    <div class="nav-item" onclick="showSection('favs')"><i class="fas fa-heart"></i> Favoriler</div>
    <div class="nav-item" onclick="toggleDrawer(true)"><i class="fas fa-history"></i> Geçmiş</div>
    
    <div class="playlist-area">
        <div style="font-size: 11px; font-weight: bold; margin-bottom: 10px; color: #555; padding-left:12px;">ÇALMA LİSTELERİ</div>
        <div class="nav-item" onclick="createNewPlaylist()"><i class="fas fa-plus-square"></i> Liste Oluştur</div>
        <div id="playlist-container"></div>
    </div>
</div>

<div id="main">
    <h1 id="view-title">Tüm Şarkılar</h1>
    <table class="song-table" id="song-list"></table>
</div>

<div id="drawer">
    <span class="drawer-close" onclick="toggleDrawer(false)">×</span>
    <h3>Son Dinlenenler</h3>
    <div id="history-list"></div>
</div>

<div id="player">
    <div class="p-left">
        <i class="fas fa-compact-disc fa-spin" style="font-size: 30px; color: var(--green);"></i>
        <div>
            <div id="p-title" style="font-size: 14px; font-weight: bold;">Seçilmedi</div>
            <div id="p-artist" style="font-size: 12px; color: var(--text-grey);">Usta Arşivi</div>
        </div>
        <i class="far fa-heart" id="p-fav-icon" onclick="toggleCurrentFav()" style="margin-left:15px; cursor:pointer;"></i>
    </div>

    <div class="p-mid">
        <div style="display:flex; gap:20px; align-items:center;">
            <button class="btn-icon" onclick="toggleShuffle()" id="shf-btn"><i class="fas fa-random"></i></button>
            <button class="btn-icon" onclick="prev()"><i class="fas fa-step-backward"></i></button>
            <button class="play-btn" onclick="togglePlay()" id="play-icon">▶</button>
            <button class="btn-icon" onclick="next()"><i class="fas fa-step-forward"></i></button>
            <button class="btn-icon" onclick="toggleRepeat()" id="rep-btn"><i class="fas fa-redo"></i></button>
        </div>
        <div style="width:100%; display:flex; align-items:center; gap:10px; font-size:10px; color:#888;">
            <span id="time-now">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div class="bar-fill" id="bar-fill"></div></div>
            <span id="time-total">0:00</span>
        </div>
    </div>

    <div class="p-right">
        <i class="fas fa-list" onclick="toggleDrawer(true)" style="cursor:pointer;"></i>
        <i class="fas fa-volume-up"></i>
    </div>
</div>

<script>
const TABLO_ID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
const sheetUrl = `https://docs.google.com/spreadsheets/d/${TABLO_ID}/gviz/tq?tqx=out:json`;

let allSongs = [], currentSongs = [], favorites = [], history = [], playlists = {};
let currentIdx = 0, isShuffle = false, repeatMode = 0;
let audio = new Audio();

async function init() {
    try {
        const r = await fetch(sheetUrl);
        const t = await r.text();
        const j = JSON.parse(t.substring(47).slice(0, -2));
        allSongs = j.table.rows.map(row => ({
            title: row.c[0]?.v || "Bilinmiyor",
            artist: row.c[1]?.v || "Usta",
            url: row.c[2]?.v || ""
        })).filter(s => s.url.includes("http"));

        loadStorage();
        currentSongs = allSongs;
        renderList();
        renderPlaylists();
    } catch(e) { console.error("Hata:", e); }
}

function renderList() {
    const table = document.getElementById('song-list');
    table.innerHTML = "";
    currentSongs.forEach((s, i) => {
        const isFav = favorites.some(f => f.url === s.url);
        table.innerHTML += `
            <tr>
                <td style="width:30px">${i+1}</td>
                <td onclick="playSong(${i})" class="${allSongs[currentIdx]?.url === s.url ? 'active-song' : ''}">
                    <strong>${s.title}</strong><br><small>${s.artist}</small>
                </td>
                <td>
                    <i class="${isFav ? 'fas' : 'far'} fa-heart" onclick="toggleFav(event, ${i})" style="${isFav?'color:var(--green)':''}"></i>
                    <i class="fas fa-plus" onclick="addToPlaylistMenu(event, ${i})" style="margin-left:15px; font-size:12px;"></i>
                </td>
            </tr>`;
    });
}

function playSong(i) {
    currentIdx = i;
    const song = currentSongs[currentIdx];
    audio.src = song.url;
    audio.play();
    
    // Geçmişe ekle
    history = history.filter(h => h.url !== song.url);
    history.unshift(song);
    if(history.length > 20) history.pop();
    
    document.getElementById('play-icon').innerText = "⏸";
    document.getElementById('p-title').innerText = song.title;
    document.getElementById('p-artist').innerText = song.artist;
    
    saveStorage();
    renderList();
    updateFavIcon();
}

function togglePlay() {
    if(audio.paused) { audio.play(); document.getElementById('play-icon').innerText = "⏸"; }
    else { audio.pause(); document.getElementById('play-icon').innerText = "▶"; }
}

function next() { playSong((currentIdx + 1) % currentSongs.length); }
function prev() { playSong((currentIdx - 1 + currentSongs.length) % currentSongs.length); }

audio.ontimeupdate = () => {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('bar-fill').style.width = (pct || 0) + "%";
    document.getElementById('time-now').innerText = formatTime(audio.currentTime);
    document.getElementById('time-total').innerText = formatTime(audio.duration);
};
audio.onended = () => next();

function seek(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
}

// HAFIZA İŞLEMLERİ
function toggleFav(e, i) {
    e.stopPropagation();
    const s = currentSongs[i];
    const fIdx = favorites.findIndex(f => f.url === s.url);
    if(fIdx > -1) favorites.splice(fIdx, 1); else favorites.push(s);
    saveStorage(); renderList(); updateFavIcon();
}

function createNewPlaylist() {
    const name = prompt("Liste adı:");
    if(name && !playlists[name]) {
        playlists[name] = [];
        saveStorage(); renderPlaylists();
    }
}

function addToPlaylistMenu(e, i) {
    e.stopPropagation();
    const listNames = Object.keys(playlists);
    if(listNames.length === 0) return alert("Önce bir liste oluştur usta!");
    const choice = prompt("Hangi listeye eklensin?\n" + listNames.join(", "));
    if(playlists[choice]) {
        playlists[choice].push(currentSongs[i]);
        saveStorage(); alert("Eklendi!");
    }
}

function renderPlaylists() {
    const cont = document.getElementById('playlist-container');
    cont.innerHTML = "";
    Object.keys(playlists).forEach(name => {
        cont.innerHTML += `<div class="pl-item" onclick="showPlaylist('${name}')"><span>${name}</span> <i class="fas fa-trash" onclick="deletePlaylist(event, '${name}')" style="font-size:10px; opacity:0.5;"></i></div>`;
    });
}

function showPlaylist(name) {
    currentSongs = playlists[name];
    document.getElementById('view-title').innerText = name;
    renderList();
}

function showSection(type) {
    if(type === 'favs') { currentSongs = favorites; document.getElementById('view-title').innerText = "Favorilerim"; }
    else { currentSongs = allSongs; document.getElementById('view-title').innerText = "Tüm Şarkılar"; }
    renderList();
}

function toggleDrawer(open) {
    document.getElementById('drawer').classList.toggle('open', open);
    if(open) {
        document.getElementById('history-list').innerHTML = history.map(h => `<div style="padding:10px; border-bottom:1px solid #1a1a1a; font-size:13px;">${h.title}</div>`).join('');
    }
}

function deletePlaylist(e, name) {
    e.stopPropagation();
    if(confirm("Bu listeyi siliyorum?")) { delete playlists[name]; saveStorage(); renderPlaylists(); }
}

function formatTime(s) {
    if(!s) return "0:00";
    let m = Math.floor(s / 60); let sec = Math.floor(s % 60);
    return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function saveStorage() {
    localStorage.setItem('usta_favs', JSON.stringify(favorites));
    localStorage.setItem('usta_history', JSON.stringify(history));
    localStorage.setItem('usta_playlists', JSON.stringify(playlists));
}

function loadStorage() {
    favorites = JSON.parse(localStorage.getItem('usta_favs') || "[]");
    history = JSON.parse(localStorage.getItem('usta_history') || "[]");
    playlists = JSON.parse(localStorage.getItem('usta_playlists') || "{}");
}

function updateFavIcon() {
    const isFav = favorites.some(f => f.url === allSongs[currentIdx]?.url);
    const icon = document.getElementById('p-fav-icon');
    icon.className = isFav ? "fas fa-heart" : "far fa-heart";
    icon.style.color = isFav ? "var(--green)" : "white";
}

init();
</script>
</body>
</html>
