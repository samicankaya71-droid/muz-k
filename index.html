<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Usta Spotify Pro v32</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --green: #1db954; --black: #000; --dark: #121212; --grey: #282828; --text-grey: #b3b3b3; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 240px; background: var(--black); padding: 15px; display: flex; flex-direction: column; border-right: 1px solid #222; }
        @media (max-width: 768px) { #sidebar { display: none; } }
        .nav-item { padding: 12px; cursor: pointer; color: var(--text-grey); font-weight: bold; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-radius: 8px; }
        .nav-item:hover, .nav-item.active { color: white; background: var(--grey); }
        .playlist-area { margin-top: 20px; overflow-y: auto; flex-grow: 1; border-top: 1px solid #222; padding-top: 10px; }

        /* Main Content */
        #main { flex-grow: 1; background: linear-gradient(to bottom, #1e1e1e, var(--black)); overflow-y: auto; padding: 20px; padding-bottom: 160px; -webkit-overflow-scrolling: touch; }
        .song-table { width: 100%; border-collapse: collapse; text-align: left; }
        .song-table tr { transition: 0.2s; border-radius: 5px; cursor: pointer; }
        .song-table tr:hover { background: rgba(255,255,255,0.05); }
        .song-table td { padding: 12px; color: var(--text-grey); border-bottom: 1px solid #1a1a1a; }
        .active-song { color: var(--green) !important; font-weight: bold; }

        /* Player */
        #player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 20px; border-top: 1px solid #282828; z-index: 100; box-sizing: border-box; }
        .player-inner { display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 768px) { .player-inner { grid-template-columns: 1fr; } .p-left, .p-right { display: none; } }

        .play-btn { background: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bar-bg { width: 100%; height: 4px; background: #4f4f4f; border-radius: 2px; cursor: pointer; position: relative; margin: 10px 0; }
        .bar-fill { height: 100%; background: var(--green); width: 0%; border-radius: 2px; }
        
        /* Modal */
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #181818; padding: 30px; border-radius: 15px; z-index: 1000; border: 1px solid #333; width: 300px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="sidebar">
    <div class="nav-item active" onclick="showSection('all')"><i class="fas fa-home"></i> Kitaplık</div>
    <div class="nav-item" onclick="showSection('favs')"><i class="fas fa-heart"></i> Favoriler</div>
    <div class="nav-item" onclick="openSettings()"><i class="fas fa-cog"></i> Ayarlar</div>
    <div class="playlist-area" id="pl-container"></div>
</div>

<div id="main">
    <h1 id="view-title">Yükleniyor...</h1>
    <table class="song-table"><tbody id="song-list"></tbody></table>
</div>

<div id="player">
    <div class="player-inner">
        <div class="p-left">
            <div id="p-title" style="font-weight:bold; font-size:14px;">Seçilmedi</div>
            <div id="p-artist" style="color:var(--text-grey); font-size:12px;">Usta</div>
        </div>

        <div class="p-mid" style="display:flex; flex-direction:column; align-items:center;">
            <div style="display:flex; gap:25px; align-items:center;">
                <button onclick="toggleShuffle()" id="shf" style="background:none; border:none; color:var(--text-grey);"><i class="fas fa-random"></i></button>
                <button onclick="prev()" style="background:none; border:none; color:white;"><i class="fas fa-step-backward"></i></button>
                <button class="play-btn" onclick="togglePlay()" id="play-btn">▶</button>
                <button onclick="next()" style="background:none; border:none; color:white;"><i class="fas fa-step-forward"></i></button>
                <button onclick="toggleRepeat()" id="rep" style="background:none; border:none; color:var(--text-grey);"><i class="fas fa-redo"></i></button>
            </div>
            <div class="bar-bg" onclick="seek(event)">
                <div class="bar-fill" id="bar-fill"></div>
            </div>
        </div>

        <div class="p-right" style="text-align:right;"><i class="fas fa-volume-up"></i></div>
    </div>
</div>

<div id="settings-modal">
    <h3>Ayarlar</h3>
    <label>Crossfade: <span id="cf-val">5</span>s</label>
    <input type="range" min="0" max="15" value="5" id="cf-range" oninput="updateCF(this.value)" style="width:100%; margin:15px 0;">
    <button onclick="closeSettings()" style="width:100%; padding:10px; background:var(--green); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">KAYDET</button>
</div>
<div class="overlay" id="overlay" onclick="closeSettings()"></div>

<script>
const TABLO_ID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
const sheetUrl = `https://docs.google.com/spreadsheets/d/${TABLO_ID}/gviz/tq?tqx=out:json`;

let allSongs = [], currentSongs = [], favorites = [], playlists = {}, settings = { cf: 5 };
let currentIdx = 0, isShuffle = false, activeAudio = new Audio(), nextAudio = new Audio(), isCrossfading = false;
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;
    activeAudio.play().then(() => { activeAudio.pause(); }).catch(()=>{});
    audioUnlocked = true;
}

async function init() {
    try {
        const res = await fetch(sheetUrl);
        const data = await res.text();
        const json = JSON.parse(data.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ 
            title: r.c[0]?.v || "İsimsiz", 
            artist: r.c[1]?.v || "Usta", 
            url: r.c[2]?.v || "" 
        })).filter(s => s.url.includes("http"));
        
        loadStorage();
        showSection('all');
        renderPlaylists();
        initSortable();
    } catch(e) { console.log(e); }
}

function initSortable() {
    Sortable.create(document.getElementById('song-list'), {
        animation: 150,
        onEnd: function() {
            const trs = document.querySelectorAll('#song-list tr');
            const newOrder = Array.from(trs).map(tr => currentSongs[tr.dataset.index]);
            currentSongs = newOrder;
            saveStorage();
        }
    });
}

function renderList() {
    const list = document.getElementById('song-list');
    list.innerHTML = currentSongs.map((s, i) => `
        <tr data-index="${i}" class="${activeAudio.src === s.url ? 'active-song' : ''}" onclick="playSong(${i})">
            <td style="width:40px">${i+1}</td>
            <td><strong>${s.title}</strong><br><small>${s.artist}</small></td>
            <td style="text-align:right">
                <i class="fas fa-plus-circle" onclick="addToPl(event, ${i})"></i>
            </td>
        </tr>`).join('');
}

function playSong(i, isFade = false) {
    currentIdx = i;
    const s = currentSongs[currentIdx];
    
    if(!isFade) {
        activeAudio.pause();
        activeAudio.src = s.url;
        activeAudio.play();
    } else {
        activeAudio = nextAudio;
    }

    document.getElementById('play-btn').innerText = "⏸";
    document.getElementById('p-title').innerText = s.title;
    document.getElementById('p-artist').innerText = s.artist;
    
    isCrossfading = false;
    activeAudio.ontimeupdate = handleTimeUpdate;
    renderList();
    
    // Bir sonraki şarkıyı hazırla (Preload)
    let nIdx = (currentIdx + 1) % currentSongs.length;
    nextAudio.src = currentSongs[nIdx].url;
    nextAudio.preload = "auto";
}

function handleTimeUpdate() {
    const pct = (activeAudio.currentTime / activeAudio.duration) * 100;
    document.getElementById('bar-fill').style.width = pct + "%";
    
    if(activeAudio.duration - activeAudio.currentTime <= settings.cf && !isCrossfading && settings.cf > 0) {
        isCrossfading = true;
        startCrossfade();
    }
}

function startCrossfade() {
    nextAudio.volume = 0;
    nextAudio.play();
    let vol = 0;
    let fadeInterval = setInterval(() => {
        if(vol < 1) {
            vol += 0.1;
            nextAudio.volume = vol;
            if(activeAudio.volume > 0.1) activeAudio.volume -= 0.1;
        } else {
            activeAudio.pause();
            playSong((currentIdx + 1) % currentSongs.length, true);
            clearInterval(fadeInterval);
        }
    }, (settings.cf * 1000) / 10);
}

function togglePlay() {
    if(activeAudio.paused) { activeAudio.play(); document.getElementById('play-btn').innerText = "⏸"; }
    else { activeAudio.pause(); document.getElementById('play-btn').innerText = "▶"; }
}

function next() { playSong((currentIdx + 1) % currentSongs.length); }
function prev() { playSong((currentIdx - 1 + currentSongs.length) % currentSongs.length); }

function seek(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    activeAudio.currentTime = pct * activeAudio.duration;
}

function showSection(name) {
    document.getElementById('view-title').innerText = (name === 'all' ? "Kitaplık" : (name === 'favs' ? "Favoriler" : name));
    currentSongs = name === 'all' ? [...allSongs] : (name === 'favs' ? [...favorites] : [...playlists[name]]);
    renderList();
}

function openSettings() { document.getElementById('settings-modal').style.display='block'; document.getElementById('overlay').style.display='block'; }
function closeSettings() { document.getElementById('settings-modal').style.display='none'; document.getElementById('overlay').style.display='none'; saveStorage(); }
function updateCF(v) { settings.cf = parseInt(v); document.getElementById('cf-val').innerText = v; }

function saveStorage() {
    localStorage.setItem('usta_settings', JSON.stringify(settings));
    localStorage.setItem('usta_favs', JSON.stringify(favorites));
    localStorage.setItem('usta_playlists', JSON.stringify(playlists));
}
function loadStorage() {
    settings = JSON.parse(localStorage.getItem('usta_settings') || '{"cf":5}');
    favorites = JSON.parse(localStorage.getItem('usta_favs') || "[]");
    playlists = JSON.parse(localStorage.getItem('usta_playlists') || "{}");
}

init();
</script>
</body>
</html>
