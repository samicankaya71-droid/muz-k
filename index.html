<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Santral v36</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #1db954; --black: #080808; --grey: #181818; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #main { flex-grow: 1; background: linear-gradient(to bottom, #121212, var(--black)); padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .song-table { width: 100%; border-collapse: collapse; }
        .song-table td { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; color: #b3b3b3; }
        .active-song { color: var(--green) !important; font-weight: bold; }

        /* GİZLİ PANEL STİLLERİ */
        #admin-btn { position: fixed; top: 10px; right: 10px; opacity: 0.1; cursor: pointer; z-index: 1000; }
        #admin-btn:hover { opacity: 1; }
        #admin-panel { display: none; position: fixed; top: 50px; right: 20px; background: #222; padding: 20px; border-radius: 10px; width: 350px; border: 1px solid var(--green); z-index: 1001; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 150px; background: #111; color: var(--green); border: 1px solid #444; font-family: monospace; font-size: 11px; margin-top: 10px; }

        #player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .play-btn { background: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="admin-btn" onclick="toggleAdmin()"><i class="fas fa-hammer"></i></div>

<div id="admin-panel">
    <h3 style="color:var(--green); margin-top:0;">Usta Link Oluşturucu</h3>
    <small>Yerel Sunucu Adresin (CMD'deki adres):</small>
    <input type="text" id="local-url" value="http://192.168.1.10:8080/" style="width:100%; background:#333; color:white; border:none; padding:5px; margin-top:5px;">
    
    <p style="font-size:12px; margin-top:15px;">Müzik klasörünü seç, tablona hazır linkleri al:</p>
    <input type="file" id="file-input" webkitdirectory multiple style="font-size:12px;">
    
    <textarea id="output-list" readonly placeholder="Linkler burada görünecek..."></textarea>
    <button onclick="copyLinks()" style="width:100%; background:var(--green); border:none; padding:8px; margin-top:10px; font-weight:bold; cursor:pointer;">LİSTEYİ KOPYALA</button>
</div>

<div id="main">
    <h1 id="view-title">Usta Arşiv (Yerel)</h1>
    <table class="song-table"><tbody id="song-list"></tbody></table>
</div>

<div id="player">
    <div style="width:30%">
        <div id="p-title" style="font-weight:bold;">Seçilmedi</div>
        <div id="p-artist" style="color:#b3b3b3; font-size:12px;">Usta Santral</div>
    </div>
    <div style="display:flex; gap:20px; align-items:center;">
        <button onclick="prev()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-step-backward"></i></button>
        <button class="play-btn" onclick="togglePlay()" id="play-btn">▶</button>
        <button onclick="next()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-step-forward"></i></button>
    </div>
    <div style="width:30%; text-align:right;"><i class="fas fa-volume-up"></i></div>
</div>

<script>
const TABLO_ID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
const sheetUrl = `https://docs.google.com/spreadsheets/d/${TABLO_ID}/gviz/tq?tqx=out:json`;

let allSongs = [], currentIdx = 0, activeAudio = new Audio();

async function init() {
    try {
        const res = await fetch(sheetUrl);
        const data = await res.text();
        const json = JSON.parse(data.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url);
        renderList();
    } catch(e) { console.error("Hata:", e); }
}

function renderList() {
    const list = document.getElementById('song-list');
    list.innerHTML = allSongs.map((s, i) => `
        <tr onclick="playSong(${i})" class="${currentIdx === i ? 'active-song' : ''}">
            <td>${i+1}</td>
            <td><strong>${s.title}</strong><br><small>${s.artist}</small></td>
        </tr>`).join('');
}

function playSong(i) {
    currentIdx = i;
    const s = allSongs[currentIdx];
    // Eğer link "http" ile başlamıyorsa, yerel sunucu adresini başına ekler
    const finalUrl = s.url.startsWith('http') ? s.url : document.getElementById('local-url').value + s.url;
    
    activeAudio.pause();
    activeAudio.src = finalUrl;
    activeAudio.play();
    
    document.getElementById('p-title').innerText = s.title;
    document.getElementById('p-artist').innerText = s.artist;
    document.getElementById('play-btn').innerText = "⏸";
    renderList();
}

// GİZLİ PANEL FONKSİYONLARI
function toggleAdmin() {
    const p = document.getElementById('admin-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

document.getElementById('file-input').addEventListener('change', function(e) {
    const files = e.target.files;
    const localBase = document.getElementById('local-url').value;
    let output = "";
    
    for(let file of files) {
        if(file.name.endsWith('.mp3')) {
            // Tabloya yapıştırman için hazır format
            output += `${file.name.replace('.mp3','')}\tUsta\t${file.name}\n`;
        }
    }
    document.getElementById('output-list').value = output;
});

function copyLinks() {
    const copyText = document.getElementById('output-list');
    copyText.select();
    document.execCommand("copy");
    alert("Liste kopyalandı! Google Tablo'na yapıştırabilirsin.");
}

function togglePlay() { if(activeAudio.paused) activeAudio.play(); else activeAudio.pause(); }
function next() { playSong((currentIdx + 1) % allSongs.length); }
function prev() { playSong((currentIdx - 1 + allSongs.length) % allSongs.length); }

init();
</script>
</body>
</html>
