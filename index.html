<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta-ify Onyx Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --neon-dark: #008c94; --bg: #020202; --card: rgba(255, 255, 255, 0.03); --glass: rgba(10, 10, 10, 0.8); }
        * { box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SOL PANEL - LÜKS TASARIM */
        #sidebar { width: 280px; background: #000; border-right: 1px solid #111; display: flex; flex-direction: column; padding: 30px 15px; }
        .logo { font-weight: 800; font-size: 22px; color: var(--neon); letter-spacing: 2px; margin-bottom: 40px; text-shadow: 0 0 15px var(--neon); padding-left: 15px; }
        .nav-group { margin-bottom: 30px; }
        .nav-link { padding: 14px 18px; cursor: pointer; border-radius: 12px; color: #888; font-weight: 600; transition: 0.3s; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .nav-link:hover, .nav-link.active { background: var(--card); color: #fff; box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }
        .nav-link.active { color: var(--neon); border-left: 4px solid var(--neon); }
        .playlist-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }
        .playlist-item { padding: 10px 18px; color: #666; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .playlist-item:hover { color: var(--neon); }

        /* ANA EKRAN */
        #main-content { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top left, #121212, #020202); overflow-y: auto; padding-bottom: 150px; }
        .view-header { padding: 60px 40px 30px; display: flex; align-items: flex-end; gap: 30px; }
        .header-img { width: 180px; height: 180px; background: linear-gradient(45deg, #111, #222); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 70px; border: 1px solid #333; }
        .header-text h1 { font-size: 60px; margin: 0; font-weight: 800; letter-spacing: -2px; }

        /* ŞARKI TABLOSU */
        .song-table { width: 100%; padding: 0 40px; border-collapse: collapse; margin-top: 20px; }
        .table-header { display: grid; grid-template-columns: 50px 2fr 1fr 120px; color: #444; font-size: 12px; font-weight: 800; padding: 10px 20px; border-bottom: 1px solid #111; }
        .song-row { display: grid; grid-template-columns: 50px 2fr 1fr 120px; padding: 15px 20px; border-radius: 10px; align-items: center; cursor: pointer; transition: 0.2s; margin-bottom: 4px; border: 1px solid transparent; }
        .song-row:hover { background: rgba(255,255,255,0.03); border-color: #222; }
        .song-row.playing { color: var(--neon); background: rgba(0,242,255,0.02); }
        .action-btns { display: flex; gap: 15px; visibility: hidden; }
        .song-row:hover .action-btns { visibility: visible; }
        .btn-icon { cursor: pointer; opacity: 0.5; transition: 0.2s; font-size: 18px; }
        .btn-icon:hover { opacity: 1; transform: scale(1.2); }
        .btn-icon.active { color: #ff0055; opacity: 1; }

        /* ALT OYNATICI - CENTERED PREMIUM */
        #player-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px; height: 90px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 30px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .track-zone { width: 25%; display: flex; align-items: center; gap: 15px; }
        .control-zone { width: 50%; display: flex; flex-direction: column; align-items: center; }
        .main-controls { display: flex; align-items: center; gap: 25px; margin-bottom: 10px; }
        .play-pause { width: 45px; height: 45px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; cursor: pointer; }
        .play-pause:hover { transform: scale(1.1); background: var(--neon); }
        .progress-box { width: 100%; display: flex; align-items: center; gap: 15px; font-size: 10px; color: #555; }
        .bar-bg { flex: 1; height: 5px; background: #222; border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 15px var(--neon); }

        /* PLAYLIST MODAL */
        #playlist-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 20px; border: 1px solid var(--neon); z-index: 2000; display: none; width: 320px; }
        .modal-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .modal-btn { background: var(--neon); border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .playlist-opt { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .playlist-opt:hover { color: var(--neon); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">USTA-IFY</div>
    <div class="nav-group">
        <div class="nav-link active" onclick="showView('all')"><span>🏠</span> Ana Havuz</div>
        <div class="nav-link" onclick="showView('favorites')"><span>❤️</span> Favorilerim</div>
    </div>
    
    <div class="playlist-scroll">
        <div style="font-size: 10px; font-weight: 800; color: #444; margin-bottom: 15px; padding-left: 15px;">KÜTÜPHANE</div>
        <div id="playlist-list"></div>
        <div class="nav-link" onclick="openNewPlaylistModal()" style="color: var(--neon); font-size: 12px;">+ Yeni Liste Oluştur</div>
    </div>
</div>

<div id="main-content">
    <div class="view-header">
        <div class="header-img" id="view-icon">🎧</div>
        <div class="header-text">
            <div style="font-size: 12px; font-weight: 800; color: var(--neon);">PREMIUM ÇALMA LİSTESİ</div>
            <h1 id="view-title">Tüm Şarkılar</h1>
        </div>
    </div>
    
    <div class="table-header">
        <div>#</div><div>BAŞLIK</div><div>SANATÇI</div><div></div>
    </div>
    <div class="song-table" id="song-body"></div>
</div>

<div id="player-bar">
    <div class="track-zone">
        <div style="width: 50px; height: 50px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center;" id="bar-img">🎵</div>
        <div>
            <div id="bar-title" style="font-weight: bold; font-size: 14px;">Şarkı Seçin</div>
            <div id="bar-artist" style="font-size: 11px; color: #555;">Sanatçı</div>
        </div>
    </div>

    <div class="control-zone">
        <div class="main-controls">
            <div class="btn-icon" onclick="toggleShuffle()">🔀</div>
            <div class="btn-icon" onclick="prevSong()">⏮</div>
            <div class="play-pause" id="play-btn" onclick="togglePlay()">▶</div>
            <div class="btn-icon" onclick="nextSong()">⏭</div>
            <div class="btn-icon" onclick="toggleRepeat()">🔁</div>
        </div>
        <div class="progress-box">
            <span id="cur-time">0:00</span>
            <div class="bar-bg" onclick="seek(event)">
                <div id="bar-fill" class="bar-fill"></div>
            </div>
            <span id="dur-time">0:00</span>
        </div>
    </div>

    <div style="width: 25%; display: flex; justify-content: flex-end; align-items: center; gap: 15px;">
        <span style="font-size: 12px; color: #444;">🔊</span>
        <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" style="width: 80px; accent-color: var(--neon);">
    </div>
</div>

<div id="playlist-modal">
    <h3 id="modal-head" style="margin-top:0">Listeye Ekle</h3>
    <div id="playlist-options" style="max-height: 200px; overflow-y: auto;"></div>
    <input type="text" id="new-pl-name" class="modal-input" placeholder="Veya yeni liste adı...">
    <button class="modal-btn" onclick="saveToPlaylist()">Kaydet</button>
    <button class="modal-btn" onclick="closeModal()" style="background:none; color:#555; margin-top:5px;">İptal</button>
</div>

<audio id="audio1"></audio>
<audio id="audio2"></audio>

<script>
    let allSongs = [];
    let currentQueue = [];
    let favorites = JSON.parse(localStorage.getItem('usta_favs')) || [];
    let playlists = JSON.parse(localStorage.getItem('usta_playlists')) || {};
    let activeView = 'all';
    let selectedSongForPlaylist = null;
    
    let currentIndex = 0;
    let activePlayer = 1;
    let isPlaying = false;

    const a1 = document.getElementById('audio1');
    const a2 = document.getElementById('audio2');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            allSongs = json.table.rows.map(r => ({
                title: r.c[0]?.v || "İsimsiz",
                artist: r.c[1]?.v || "Bilinmiyor",
                url: r.c[2]?.v || ""
            })).filter(s => s.url.includes('http'));
            
            showView('all');
            renderPlaylistSidebar();
        } catch(e) { console.error("Tablo yüklenemedi!"); }
    }

    function showView(type, plName = null) {
        activeView = type;
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        
        if(type === 'all') {
            currentQueue = [...allSongs];
            document.getElementById('view-title').innerText = "Tüm Şarkılar";
            document.getElementById('view-icon').innerText = "🎧";
        } else if(type === 'favorites') {
            currentQueue = allSongs.filter(s => favorites.includes(s.url));
            document.getElementById('view-title').innerText = "Favorilerim";
            document.getElementById('view-icon').innerText = "💖";
        } else if(type === 'playlist') {
            const urls = playlists[plName] || [];
            currentQueue = allSongs.filter(s => urls.includes(s.url));
            document.getElementById('view-title').innerText = plName;
            document.getElementById('view-icon').innerText = "📂";
        }
        renderSongs();
    }

    function renderSongs() {
        const container = document.getElementById('song-body');
        container.innerHTML = currentQueue.map((s, i) => `
            <div class="song-row" onclick="playIndex(${i})">
                <div style="color: #333; font-weight: bold;">${i+1}</div>
                <div style="font-weight: 600;">${s.title}</div>
                <div style="color: #666; font-size: 13px;">${s.artist}</div>
                <div class="action-btns">
                    <span class="btn-icon ${favorites.includes(s.url) ? 'active' : ''}" 
                          onclick="event.stopPropagation(); toggleFav('${s.url}')">❤</span>
                    <span class="btn-icon" onclick="event.stopPropagation(); openPlaylistModal('${s.url}')">➕</span>
                </div>
            </div>
        `).join('');
    }

    // PLAYLIST MANTIĞI
    function openPlaylistModal(url) {
        selectedSongForPlaylist = url;
        const opts = document.getElementById('playlist-options');
        opts.innerHTML = Object.keys(playlists).map(name => `
            <div class="playlist-opt" onclick="confirmAddToPlaylist('${name}')">${name}</div>
        `).join('');
        document.getElementById('playlist-modal').style.display = 'block';
    }

    function saveToPlaylist() {
        const name = document.getElementById('new-pl-name').value;
        if(name) {
            if(!playlists[name]) playlists[name] = [];
            confirmAddToPlaylist(name);
        }
    }

    function confirmAddToPlaylist(name) {
        if(!playlists[name].includes(selectedSongForPlaylist)) {
            playlists[name].push(selectedSongForPlaylist);
            localStorage.setItem('usta_playlists', JSON.stringify(playlists));
        }
        closeModal();
        renderPlaylistSidebar();
    }

    function renderPlaylistSidebar() {
        const list = document.getElementById('playlist-list');
        list.innerHTML = Object.keys(playlists).map(name => `
            <div class="playlist-item" onclick="showView('playlist', '${name}')"># ${name}</div>
        `).join('');
    }

    function closeModal() { document.getElementById('playlist-modal').style.display = 'none'; }
    function openNewPlaylistModal() { document.getElementById('playlist-modal').style.display = 'block'; }

    // OYNATMA VE DİĞER FONKSİYONLAR (Önceki stabil yapı)
    function playIndex(index) {
        currentIndex = index;
        const song = currentQueue[currentIndex];
        const p = activePlayer === 1 ? a1 : a2;
        p.src = song.url;
        p.play();
        isPlaying = true;
        document.getElementById('play-btn').innerText = "⏸";
        document.getElementById('bar-title').innerText = song.title;
        document.getElementById('bar-artist').innerText = song.artist;
        
        p.ontimeupdate = () => {
            const perc = (p.currentTime / p.duration) * 100;
            document.getElementById('bar-fill').style.width = perc + "%";
            document.getElementById('cur-time').innerText = formatTime(p.currentTime);
            document.getElementById('dur-time').innerText = formatTime(p.duration);
            if(p.duration && p.duration - p.currentTime < 3) {
                 // Crossfade ve Otomatik Geçiş buraya
            }
        };
    }

    function seek(e) {
        const p = activePlayer === 1 ? a1 : a2;
        const bar = document.querySelector('.bar-bg');
        p.currentTime = (e.offsetX / bar.offsetWidth) * p.duration;
    }

    function togglePlay() {
        const p = activePlayer === 1 ? a1 : a2;
        if(p.paused) { p.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { p.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }

    function formatTime(s) {
        const m = Math.floor(s / 60); const sc = Math.floor(s % 60);
        return `${m}:${sc < 10 ? '0' : ''}${sc}`;
    }

    function toggleFav(url) {
        if(favorites.includes(url)) favorites = favorites.filter(f => f !== url);
        else favorites.push(url);
        localStorage.setItem('usta_favs', JSON.stringify(favorites));
        renderSongs();
    }

    window.onload = init;
</script>
</body>
</html>
