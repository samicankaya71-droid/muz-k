<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Usta-ify Steel v18.0</title>
    <link id="main-font-link" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #050505; 
            --panel: rgba(10,10,10,0.95);
            --text: #ffffff;
            --font-size: 14px;
        }
        * { box-sizing: border-box; transition: all 0.4s ease; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Montserrat', sans-serif; 
            font-size: var(--font-size);
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* DİNAMİK GRADIENT ARKAPLAN */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, var(--accent), var(--bg) 40%);
            opacity: 0.15; pointer-events: none; z-index: 0;
        }

        /* SIDEBAR */
        #sidebar { width: 260px; background: #000; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; z-index: 100; }
        .nav-link { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; opacity: 0.6; }
        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--accent); }

        /* ANA HAVUZ (PLAYLIST) */
        #main-content { flex: 1; overflow-y: auto; z-index: 1; padding: 40px; padding-bottom: 160px; }
        .song-row { 
            display: grid; grid-template-columns: 40px 2fr 1fr 80px; 
            padding: 12px 20px; border-radius: 10px; margin-bottom: 5px; cursor: pointer;
            background: rgba(255,255,255,0.02);
        }
        .song-row:hover { background: rgba(255,255,255,0.08); }
        .song-row.playing { border-left: 4px solid var(--accent); background: rgba(255,255,255,0.05); color: var(--accent); }

        /* MODAL PENCERELER (MÜHÜRLÜ) */
        .full-panel {
            position: fixed; top: 0; left: 260px; right: 0; bottom: 0;
            background: var(--bg); z-index: 500; display: none; padding: 60px;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .close-btn { 
            position: absolute; top: 30px; right: 40px; font-size: 30px; 
            cursor: pointer; opacity: 0.5; font-weight: bold;
        }
        .close-btn:hover { opacity: 1; color: var(--accent); }

        /* SAĞ PANEL (HAYALET) */
        #right-panel { 
            width: 380px; background: var(--panel); border-left: 1px solid rgba(255,255,255,0.05);
            position: fixed; top: 0; right: 0; bottom: 0; transform: translateX(100%);
            z-index: 200; padding: 30px;
        }
        #right-panel.open { transform: translateX(0); }
        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }
        
        .ghost-input { background: transparent; border: none; color: #fff; width: 100%; padding: 10px; opacity: 0; cursor: default; }
        .ghost-input:focus, .ghost-input:hover { opacity: 0.5; border: 1px dashed var(--accent); }

        /* PLAYER BAR (DARALTILMIŞ) */
        #player-bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 1000px; height: 90px;
            background: rgba(15,15,15,0.9); backdrop-filter: blur(20px);
            border-radius: 45px; border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; padding: 0 35px; z-index: 1000;
        }
        .bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; margin: 0 20px; }
        #bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; box-shadow: 0 0 10px var(--accent); }

        /* AYARLAR ELEMANLARI */
        .setting-item { margin-bottom: 30px; }
        select, input[type="color"] { background: #111; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>

<div id="dynamic-bg"></div>

<div id="sidebar">
    <div style="padding: 40px 30px; font-weight: 900; color: var(--accent); font-size: 22px;">USTA-IFY</div>
    <div class="nav-link active" onclick="showView('all')"><span>🏠</span><span>HAVUZ</span></div>
    <div class="nav-link" onclick="showView('fav')"><span>💖</span><span>FAVORİLER</span></div>
    <div class="nav-link" onclick="togglePanel('db-panel')"><span>👤</span><span>ARŞİV</span></div>
    <div class="nav-link" onclick="togglePanel('settings-panel')"><span>⚙️</span><span>AYARLAR</span></div>
    <div class="nav-link" onclick="toggleRight()"><span>📑</span><span>DETAYLAR</span></div>
</div>

<div id="main-content">
    <h1 id="view-title" style="font-size: 50px; font-weight: 900; margin-bottom: 40px;">HAVUZ</h1>
    <div id="song-body"></div>
</div>

<div id="settings-panel" class="full-panel">
    <span class="close-btn" onclick="togglePanel('settings-panel')">✕</span>
    <h1>AYARLAR</h1>
    <div class="setting-item">
        <label>Bukalemun Etkisi (Kapak Rengine Göre)</label>
        <input type="checkbox" id="chameleon-toggle" checked onchange="updateTheme()">
    </div>
    <div class="setting-item">
        <label>Sabit Renk Seçimi (Bukalemun Kapalıyken)</label>
        <input type="color" id="static-color" value="#00f2ff" oninput="updateTheme()">
    </div>
    <div class="setting-item">
        <label>Yazı Fontu</label>
        <select id="font-select" onchange="updateFont(this.value)">
            <option value="Montserrat">Montserrat</option>
            <option value="Roboto">Roboto</option>
            <option value="Open Sans">Open Sans</option>
            <option value="Bebas Neue">Bebas Neue</option>
            <option value="Poppins">Poppins</option>
        </select>
    </div>
    <div class="setting-item">
        <label>Yazı Büyüklüğü</label>
        <input type="range" min="12" max="20" value="14" oninput="updateFontSize(this.value)">
    </div>
</div>

<div id="db-panel" class="full-panel">
    <span class="close-btn" onclick="togglePanel('db-panel')">✕</span>
    <h1>SANATÇI ARŞİVİ</h1>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
        <input type="text" id="db-tag" placeholder="#etiket" class="static-input">
        <input type="text" id="db-name" placeholder="Tam İsim" class="static-input">
        <input type="text" id="db-img" placeholder="Resim URL" class="static-input">
    </div>
    <button onclick="saveToDB()" style="margin-top:20px; padding:15px; background:var(--accent); border:none; width:200px; font-weight:bold; cursor:pointer">EKLE</button>
    <div id="db-list" style="margin-top:40px; display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:20px"></div>
</div>

<div id="right-panel">
    <span class="close-btn" onclick="toggleRight()">✕</span>
    <div class="premium-art" onclick="updateArt()" id="main-art"></div>
    <div id="artist-chips"></div>
    <input type="text" id="credits-input" class="ghost-input" placeholder="#tag yaz..." oninput="parseHashtags()">
    <textarea id="desc-input" class="ghost-input" style="height:100px; opacity:0.1; margin-top:20px" oninput="saveSongMeta()" placeholder="Notlar..."></textarea>
</div>

<div id="player-bar">
    <div style="width:200px; display:flex; align-items:center; gap:12px">
        <div id="mini-art" style="width:45px; height:45px; border-radius:10px; background:#222; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:700; font-size:13px; white-space:nowrap">Şarkı Seç</div>
            <div id="bar-artist" style="font-size:10px; opacity:0.5">Usta-ify</div>
        </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:8px">
            <span onclick="prev()" style="cursor:pointer">⏮</span>
            <div onclick="togglePlay()" id="play-btn" style="width:40px; height:40px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer">▶</div>
            <span onclick="next()" style="cursor:pointer">⏭</span>
        </div>
        <div style="width:100%; display:flex; align-items:center">
            <span id="cur-time" style="font-size:9px; opacity:0.5">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div id="bar-fill"></div></div>
            <span id="dur-time" style="font-size:9px; opacity:0.5">0:00</span>
        </div>
    </div>
    <div style="width:150px; text-align:right">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)" style="accent-color:var(--accent); width:80px">
    </div>
</div>

<audio id="p1"></audio><audio id="p2"></audio>

<script>
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {}, artistDB = JSON.parse(localStorage.getItem('u_db')) || {};
    let currentIndex = 0, activeP = 1, cfS = 3;

    const p1 = document.getElementById('p1'), p2 = document.getElementById('p2');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url?.includes('http'));
        showView('all');
        updateDBUI();
        requestAnimationFrame(sync);
    }

    // THEME & BUKALEMUN
    function updateTheme(imgUrl = null) {
        const isCham = document.getElementById('chameleon-toggle').checked;
        const staticCol = document.getElementById('static-color').value;

        if (isCham && imgUrl) {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = imgUrl;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 1; canvas.height = 1; ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const col = `rgb(${r},${g},${b})`;
                document.documentElement.style.setProperty('--accent', col);
                updateContrast(r, g, b);
            };
        } else if (!isCham) {
            document.documentElement.style.setProperty('--accent', staticCol);
            document.documentElement.style.setProperty('--text', '#fff');
        }
    }

    function updateContrast(r, g, b) {
        const bright = (r * 299 + g * 587 + b * 114) / 1000;
        document.documentElement.style.setProperty('--text', bright > 150 ? '#000' : '#fff');
    }

    function updateFont(font) {
        const link = document.getElementById('main-font-link');
        link.href = `https://fonts.googleapis.com/css2?family=${font.replace(' ', '+')}:wght@400;700;900&display=swap`;
        document.body.style.setProperty('font-family', font + ', sans-serif');
    }

    function updateFontSize(v) { document.documentElement.style.setProperty('--font-size', v + 'px'); }

    // ENGINE & CROSSFADE
    function playIdx(i) {
        currentIndex = i; const s = currentQueue[currentIndex];
        const cur = activeP === 1 ? p1 : p2;
        const other = activeP === 1 ? p2 : p1;
        other.pause(); cur.src = s.url; cur.volume = 1; cur.play();
        document.getElementById('play-btn').innerText = "⏸";
        updateUI(s);
    }

    function sync() {
        const cur = activeP === 1 ? p1 : p2;
        if(!cur.paused && cur.duration) {
            document.getElementById('bar-fill').style.width = (cur.currentTime/cur.duration*100) + "%";
            document.getElementById('cur-time').innerText = formatT(cur.currentTime);
            document.getElementById('dur-time').innerText = formatT(cur.duration);
            if(cur.duration - cur.currentTime <= cfS && !cur.dataset.fading) {
                cur.dataset.fading = "true"; crossFade();
            }
        }
        requestAnimationFrame(sync);
    }

    function crossFade() {
        const oldP = activeP === 1 ? p1 : p2;
        activeP = activeP === 1 ? 2 : 1;
        const newP = activeP === 1 ? p1 : p2;
        currentIndex = (currentIndex + 1) % currentQueue.length;
        const s = currentQueue[currentIndex];
        newP.src = s.url; newP.volume = 0; newP.play();
        let v = 0;
        let iv = setInterval(() => {
            v += 0.05;
            if(v >= 1) { clearInterval(iv); oldP.pause(); oldP.dataset.fading = ""; newP.volume = 1; }
            else { newP.volume = v; oldP.volume = 1-v; }
        }, (cfS*1000)/20);
        updateUI(s);
    }

    function updateUI(s) {
        document.getElementById('bar-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = s.artist;
        const m = songMeta[s.url] || { art: '', credits: '' };
        document.getElementById('main-art').innerHTML = m.art ? `<img src="${m.art}">` : '';
        document.getElementById('mini-art').innerHTML = m.art ? `<img src="${m.art}" style="width:100%;height:100%;object-fit:cover">` : '';
        updateTheme(m.art);
        renderSongs();
        parseHashtags();
    }

    // ARŞİV
    function saveToDB() {
        const tag = document.getElementById('db-tag').value.toLowerCase().replace('#','');
        const name = document.getElementById('db-name').value;
        const img = document.getElementById('db-img').value;
        if(tag && name) {
            artistDB[tag] = { name, img };
            localStorage.setItem('u_db', JSON.stringify(artistDB));
            updateDBUI();
        }
    }

    function updateDBUI() {
        document.getElementById('db-list').innerHTML = Object.keys(artistDB).map(k => `
            <div style="background:#111; padding:15px; border-radius:10px; text-align:center">
                <img src="${artistDB[k].img}" style="width:60px; height:60px; border-radius:50%; margin-bottom:10px">
                <div style="font-weight:bold">#${k}</div>
                <div style="font-size:12px; opacity:0.5">${artistDB[k].name}</div>
                <div onclick="delDB('${k}')" style="color:red; cursor:pointer; margin-top:10px">SİL</div>
            </div>
        `).join('');
    }

    function parseHashtags() {
        const val = document.getElementById('credits-input').value;
        const tags = val.match(/#(\w+)/g) || [];
        document.getElementById('artist-chips').innerHTML = tags.map(t => {
            const key = t.substring(1).toLowerCase();
            const art = artistDB[key];
            return art ? `<div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); padding:5px 12px; border-radius:20px; margin:5px; float:left"><img src="${art.img}" style="width:20px; height:20px; border-radius:50%"> ${art.name}</div>` : '';
        }).join('') + '<div style="clear:both"></div>';
        saveSongMeta();
    }

    // UI KONTROL
    function togglePanel(id) { 
        const p = document.getElementById(id);
        const isVisible = p.style.display === 'block';
        document.querySelectorAll('.full-panel').forEach(el => el.style.display = 'none');
        p.style.display = isVisible ? 'none' : 'block';
    }
    function toggleRight() { document.getElementById('right-panel').classList.toggle('open'); }
    function showView(type) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(type === 'all') document.querySelector('.nav-link:nth-child(2)').classList.add('active');
        currentQueue = type === 'all' ? [...allSongs] : allSongs.filter(s => favorites.includes(s.url));
        renderSongs();
    }
    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIndex===i?'playing':''}" onclick="playIdx(${i})">
                <div style="opacity:0.3">${i+1}</div>
                <div style="font-weight:700">${s.title}</div>
                <div style="opacity:0.5">${s.artist}</div>
                <div onclick="event.stopPropagation(); toggleFav('${s.url}')">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }
    function toggleFav(u) {
        if(favorites.includes(u)) favorites = favorites.filter(f => f !== u);
        else favorites.push(u);
        localStorage.setItem('u_f', JSON.stringify(favorites)); renderSongs();
    }
    function formatT(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function togglePlay() { const cur = activeP===1?p1:p2; cur.paused ? cur.play() : cur.pause(); document.getElementById('play-btn').innerText = cur.paused ? "▶" : "⏸"; }
    function next() { crossFade(); }
    function prev() { currentIndex = (currentIndex - 1 + currentQueue.length) % currentQueue.length; playIdx(currentIndex); }
    function seek(e) { const cur = activeP===1?p1:p2; cur.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * cur.duration; }
    function setVol(v) { p1.volume = v; p2.volume = v; }
    function updateArt() { const u = prompt("URL:"); if(u) { document.getElementById('main-art').innerHTML=`<img src="${u}">`; saveSongMeta(); updateTheme(u); } }
    function saveSongMeta() {
        const s = currentQueue[currentIndex];
        const img = document.querySelector('#main-art img');
        songMeta[s.url] = { art: img?img.src:'', credits: document.getElementById('credits-input').value, desc: document.getElementById('desc-input').value };
        localStorage.setItem('u_m', JSON.stringify(songMeta));
    }
    function delDB(k) { delete artistDB[k]; localStorage.setItem('u_db', JSON.stringify(artistDB)); updateDBUI(); }

    window.onload = init;
</script>
</body>
</html>
