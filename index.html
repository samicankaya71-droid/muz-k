<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Arşiv - Spotify Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #1db954; --black: #000; --dark: #121212; --grey: #282828; --text-grey: #b3b3b3; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: var(--black); padding: 15px; display: flex; flex-direction: column; border-right: 1px solid #222; transition: 0.3s; }
        .nav-item { padding: 12px; cursor: pointer; color: var(--text-grey); font-weight: bold; display: flex; align-items: center; gap: 15px; transition: 0.3s; border-radius: 5px; }
        .nav-item:hover, .nav-item.active { color: white; background: var(--grey); }
        .playlist-area { margin-top: 20px; overflow-y: auto; flex-grow: 1; border-top: 1px solid #222; padding-top: 10px; }
        
        /* Main Content */
        #main { flex-grow: 1; background: linear-gradient(to bottom, #222, var(--dark)); overflow-y: auto; padding: 20px; position: relative; }
        .song-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .song-table tr { border-bottom: 1px solid transparent; transition: 0.2s; cursor: pointer; }
        .song-table tr:hover { background: rgba(255,255,255,0.1); }
        .song-table td { padding: 12px; color: var(--text-grey); }
        .song-table .active-song { color: var(--green); }

        /* Bottom Player */
        #player { position: fixed; bottom: 0; width: 100%; background: #181818; padding: 15px 20px; border-top: 1px solid #282828; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; z-index: 100; }
        .playing-info { display: flex; align-items: center; gap: 15px; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .buttons { display: flex; align-items: center; gap: 20px; }
        .main-play { background: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .sub-btn { background: none; border: none; color: var(--text-grey); cursor: pointer; font-size: 18px; transition: 0.2s; }
        .sub-btn:hover, .sub-btn.active { color: white; }

        /* Seek Bar */
        .seek-container { width: 100%; display: flex; align-items: center; gap: 10px; color: var(--text-grey); font-size: 12px; }
        .bar-bg { flex-grow: 1; height: 4px; background: #4f4f4f; border-radius: 2px; cursor: pointer; position: relative; }
        .bar-fill { height: 100%; background: var(--green); width: 0%; border-radius: 2px; }

        /* History & Playlist Drawer */
        #drawer { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #050505; border-left: 1px solid #222; transition: 0.3s; z-index: 101; padding: 20px; box-sizing: border-box; }
        #drawer.open { right: 0; }
        .close-drawer { float: right; cursor: pointer; font-size: 20px; }

        /* Mobile Adjust */
        @media (max-width: 768px) { #sidebar { display: none; } #player { grid-template-columns: 1fr; } .playing-info { display: none; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-item active" onclick="showSection('all')"><i class="fas fa-home"></i> Kitaplık</div>
    <div class="nav-item" onclick="showSection('favs')"><i class="fas fa-heart"></i> Favoriler</div>
    <div class="nav-item" onclick="toggleDrawer('history')"><i class="fas fa-history"></i> Geçmiş</div>
    <div class="playlist-area" id="playlists">
        <div style="font-size: 12px; letter-spacing: 1px; margin-bottom: 10px;">ÇALMA LİSTELERİM</div>
        <div class="nav-item" onclick="createPlaylist()">+ Liste Oluştur</div>
    </div>
</div>

<div id="main">
    <h1 id="section-title">Kitaplık</h1>
    <table class="song-table" id="song-list">
        </table>
</div>

<div id="drawer">
    <span class="close-drawer" onclick="toggleDrawer()">×</span>
    <h2 id="drawer-title">Geçmiş</h2>
    <div id="drawer-content"></div>
</div>

<div id="player">
    <div class="playing-info">
        <div id="cur-icon" style="font-size: 30px;">🎵</div>
        <div>
            <div id="cur-title" style="font-size: 14px; font-weight: bold;">Bir parça seç</div>
            <div id="cur-artist" style="font-size: 12px; color: var(--text-grey);">Usta Arşivi</div>
        </div>
        <i class="far fa-heart" id="fav-btn" style="margin-left: 10px; cursor: pointer;"></i>
    </div>

    <div class="controls">
        <div class="buttons">
            <button class="sub-btn" id="shuffleBtn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
            <button class="sub-btn" onclick="seekRelative(-10)"><i class="fas fa-undo"></i></button>
            <button class="sub-btn" onclick="prev()"><i class="fas fa-step-backward"></i></button>
            <button class="main-play" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button>
            <button class="sub-btn" onclick="next()"><i class="fas fa-step-forward"></i></button>
            <button class="sub-btn" onclick="seekRelative(10)"><i class="fas fa-redo"></i></button>
            <button class="sub-btn" id="repeatBtn" onclick="toggleRepeat()"><i class="fas fa-retweet"></i></button>
        </div>
        <div class="seek-container">
            <span id="time-cur">0:00</span>
            <div class="bar-bg" onclick="manualSeek(event)">
                <div class="bar-fill" id="bar-fill"></div>
            </div>
            <span id="time-total">0:00</span>
        </div>
    </div>
    
    <div style="text-align: right; padding-right: 20px;">
        <i class="fas fa-list" style="cursor: pointer;" onclick="toggleDrawer('history')"></i>
    </div>
</div>

<script>
const TABLO_ID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
const url = `https://docs.google.com/spreadsheets/d/${TABLO_ID}/gviz/tq?tqx=out:json`;

let songs = [], favs = [], history = [], playlists = {};
let currentIdx = -1;
let isShuffle = false, repeatMode = 0; // 0: no, 1: list, 2: single
let activeAudio = new Audio(), nextAudio = new Audio();
let crossfadeTriggered = false;

// VERİ ÇEKME
async function init() {
    try {
        const r = await fetch(url);
        const t = await r.text();
        const j = JSON.parse(t.substring(47).slice(0, -2));
        songs = j.table.rows.map(row => ({
            title: row.c[0]?.v || "Bilinmiyor",
            artist: row.c[1]?.v || "Usta",
            url: row.c[2]?.v || ""
        })).filter(s => s.url.includes("http"));
        loadLocalData();
        renderSongs(songs);
    } catch(e) { console.error("Hata:", e); }
}

function renderSongs(list) {
    const table = document.getElementById('song-list');
    table.innerHTML = `<tr><td>#</td><td>Başlık</td><td>Sanatçı</td><td><i class="far fa-heart"></i></td></tr>`;
    list.forEach((s, i) => {
        const isFav = favs.some(f => f.url === s.url);
        table.innerHTML += `
            <tr onclick="playSong(${i})" class="${currentIdx === i ? 'active-song' : ''}">
                <td>${i+1}</td>
                <td><strong>${s.title}</strong></td>
                <td>${s.artist}</td>
                <td><i class="${isFav?'fas':'far'} fa-heart" onclick="toggleFav(event, ${i})"></i></td>
            </tr>`;
    });
}

// ÇALMA FONKSİYONLARI
function playSong(index, fade = false) {
    if(index < 0 || index >= songs.length) return;
    currentIdx = index;
    const s = songs[currentIdx];
    
    crossfadeTriggered = false;
    
    // Geçmişe ekle
    if(!history.some(h => h.url === s.url)) {
        history.unshift(s);
        if(history.length > 20) history.pop();
        localStorage.setItem('usta_history', JSON.stringify(history));
    }

    if(!fade) {
        activeAudio.pause();
        activeAudio = new Audio(s.url);
        activeAudio.play();
    } else {
        activeAudio = nextAudio;
    }

    setupAudioEvents();
    updateUI();
    renderSongs(songs);
}

function setupAudioEvents() {
    activeAudio.ontimeupdate = () => {
        const p = (activeAudio.currentTime / activeAudio.duration) * 100;
        document.getElementById('bar-fill').style.width = p + "%";
        document.getElementById('time-cur').innerText = formatTime(activeAudio.currentTime);
        document.getElementById('time-total').innerText = formatTime(activeAudio.duration);

        // CROSSFADE LOGIC (Son 5 saniye)
        if(activeAudio.duration - activeAudio.currentTime < 5 && !crossfadeTriggered && repeatMode !== 2) {
            crossfadeTriggered = true;
            prepareNext();
        }
    };
    activeAudio.onended = () => { if(!crossfadeTriggered) next(); };
}

function prepareNext() {
    let nIdx = isShuffle ? Math.floor(Math.random() * songs.length) : (currentIdx + 1) % songs.length;
    nextAudio = new Audio(songs[nIdx].url);
    nextAudio.volume = 0;
    nextAudio.play();

    // Fade işlemi
    let vol = 0;
    let interval = setInterval(() => {
        if(vol < 1) {
            vol += 0.05;
            if(activeAudio.volume > 0.05) activeAudio.volume -= 0.05;
            nextAudio.volume = vol;
        } else {
            activeAudio.pause();
            playSong(nIdx, true);
            clearInterval(interval);
        }
    }, 200);
}

function togglePlay() {
    if(activeAudio.paused) { activeAudio.play(); } 
    else { activeAudio.pause(); }
    updateUI();
}

function updateUI() {
    const s = songs[currentIdx];
    if(!s) return;
    document.getElementById('cur-title').innerText = s.title;
    document.getElementById('cur-artist').innerText = s.artist;
    document.getElementById('playIcon').className = activeAudio.paused ? "fas fa-play" : "fas fa-pause";
}

function next() { 
    let n = isShuffle ? Math.floor(Math.random() * songs.length) : (currentIdx + 1) % songs.length;
    playSong(n); 
}
function prev() { playSong((currentIdx - 1 + songs.length) % songs.length); }
function seekRelative(sec) { activeAudio.currentTime += sec; }
function manualSeek(e) {
    const bar = e.currentTarget;
    const pct = e.offsetX / bar.offsetWidth;
    activeAudio.currentTime = pct * activeAudio.duration;
}

// YAN ÖZELLİKLER
function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffleBtn').classList.toggle('active', isShuffle); }
function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('repeatBtn').style.color = repeatMode > 0 ? "var(--green)" : "white"; }

function toggleFav(e, i) {
    e.stopPropagation();
    const s = songs[i];
    const idx = favs.findIndex(f => f.url === s.url);
    if(idx > -1) favs.splice(idx, 1); else favs.push(s);
    localStorage.setItem('usta_favs', JSON.stringify(favs));
    renderSongs(songs);
}

function toggleDrawer(type) {
    const d = document.getElementById('drawer');
    if(type) {
        d.classList.add('open');
        document.getElementById('drawer-title').innerText = type === 'history' ? "Son Dinlenenler" : "Liste";
        const content = type === 'history' ? history : [];
        document.getElementById('drawer-content').innerHTML = content.map(s => `<div style="padding:10px; border-bottom:1px solid #222;">${s.title}</div>`).join('');
    } else { d.classList.remove('open'); }
}

function formatTime(s) {
    if(!s) return "0:00";
    let m = Math.floor(s / 60);
    let sec = Math.floor(s % 60);
    return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function loadLocalData() {
    favs = JSON.parse(localStorage.getItem('usta_favs') || "[]");
    history = JSON.parse(localStorage.getItem('usta_history') || "[]");
}

init();
</script>
</body>
</html>
