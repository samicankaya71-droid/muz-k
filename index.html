<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta-ify Architect Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #000; --panel: #0a0a0a; --glass: rgba(15, 15, 15, 0.9); }
        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SOL PANEL (SIDEBAR) */
        #sidebar { width: 260px; background: #000; border-right: 1px solid #111; display: flex; flex-direction: column; position: relative; flex-shrink: 0; }
        #sidebar.collapsed { width: 80px; }
        .logo-area { padding: 30px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo-text { font-weight: 800; color: var(--neon); text-shadow: 0 0 10px var(--neon); display: block; }
        #sidebar.collapsed .logo-text { display: none; }
        .toggle-btn { cursor: pointer; color: #444; font-size: 20px; }
        .toggle-btn:hover { color: var(--neon); }

        .nav-link { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #666; font-weight: 600; font-size: 14px; white-space: nowrap; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { color: var(--neon); border-left: 3px solid var(--neon); }
        #sidebar.collapsed .nav-link span:last-child { display: none; }

        /* ANA EKRAN */
        #main-content { flex: 1; overflow-y: auto; background: radial-gradient(circle at top right, #111, #000); padding-bottom: 120px; }

        /* SAĞ PANEL (DETAY) */
        #right-panel { width: 350px; background: var(--panel); border-left: 1px solid #111; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; transform: translateX(100%); position: relative; }
        #right-panel.open { transform: translateX(0); }
        .panel-content { padding: 25px; }
        .song-art { width: 100%; aspect-ratio: 1; background: #111; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #222; margin-bottom: 20px; }
        .song-art img { width: 100%; height: 100%; object-fit: cover; }
        .editable-area { background: transparent; border: 1px solid transparent; color: #888; width: 100%; resize: none; font-family: inherit; padding: 5px; border-radius: 5px; margin-bottom: 15px; }
        .editable-area:hover, .editable-area:focus { border-color: #333; background: #000; color: #fff; }
        .label { font-size: 10px; font-weight: 800; color: var(--neon); letter-spacing: 1px; margin-bottom: 5px; display: block; }

        /* PLAYER BAR */
        #player-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); background: var(--glass); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); height: 90px; display: flex; align-items: center; padding: 0 30px; z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        /* ÖNCEKİ STİLLERİN DEVAMI VE BUTONLAR */
        .control-btns { display: flex; align-items: center; gap: 15px; }
        .play-btn { width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; cursor: pointer; }
        .bar-bg { flex: 1; height: 4px; background: #333; border-radius: 5px; cursor: pointer; position: relative; margin: 0 15px; }
        .bar-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 10px var(--neon); }
        
        .btn-icon { cursor: pointer; opacity: 0.5; font-size: 18px; }
        .btn-icon:hover, .btn-icon.active { opacity: 1; color: var(--neon); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo-area">
        <span class="logo-text">USTA-IFY</span>
        <span class="toggle-btn" onclick="toggleSidebar()">≡</span>
    </div>
    <div class="nav-link active" onclick="showView('all', this)"><span>🏠</span><span>Ana Havuz</span></div>
    <div class="nav-link" onclick="showView('favorites', this)"><span>💖</span><span>Favoriler</span></div>
    <div class="nav-link" onclick="toggleRightPanel()"><span>📑</span><span>Şarkı Detayı</span></div>
    
    <div id="side-playlists" style="margin-top:20px"></div>
</div>

<div id="main-content">
    <div id="view-header" style="padding:50px 40px;">
        <h1 id="view-title" style="font-size: 40px; margin:0">Tüm Şarkılar</h1>
    </div>
    <div id="song-body" style="padding: 0 40px;"></div>
</div>

<div id="right-panel">
    <div class="panel-content">
        <span class="label">ALBÜM KAPAĞI</span>
        <div class="song-art" onclick="changeArt()" id="art-container">
            <span id="art-placeholder">Resim Linki Ekle</span>
        </div>
        
        <span class="label">KÜNYE / SANATÇILAR</span>
        <textarea class="editable-area" id="info-credits" placeholder="Emeği geçenler..." oninput="saveSongData()"></textarea>
        
        <span class="label">AÇIKLAMA & NOTLAR</span>
        <textarea class="editable-area" id="info-desc" style="height: 100px;" placeholder="Bu şarkı hakkında notların..." oninput="saveSongData()"></textarea>
        
        <span class="label">ŞARKINI SÖZLERİ (YAKINDA)</span>
        <div style="color:#333; font-size:12px; border:1px dashed #222; padding:20px; border-radius:10px; text-align:center">
            Sözler sistemi buraya gelecek...
        </div>
    </div>
</div>

<div id="player-bar">
    <div style="width:250px; display:flex; align-items:center; gap:12px">
        <div id="bar-art-mini" style="width:45px; height:45px; border-radius:5px; background:#111; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:bold; font-size:13px; white-space:nowrap">Şarkı Seçin</div>
            <div id="bar-artist" style="font-size:11px; color:#555">Sanatçı</div>
        </div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div class="control-btns">
            <span class="btn-icon" id="shuf-btn" onclick="toggleShuffle()">🔀</span>
            <span class="btn-icon" onclick="skip(-10)">⏪</span>
            <span class="btn-icon" onclick="prev()">⏮</span>
            <div class="play-btn" id="play-btn" onclick="togglePlay()">▶</div>
            <span class="btn-icon" onclick="next()">⏭</span>
            <span class="btn-icon" onclick="skip(10)">⏩</span>
            <span class="btn-icon" id="rep-btn" onclick="toggleRepeat()">🔁</span>
        </div>
        <div style="width:100%; display:flex; align-items:center; margin-top:10px">
            <span id="cur-time" style="font-size:10px">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div id="bar-fill" class="bar-fill"></div></div>
            <span id="dur-time" style="font-size:10px">0:00</span>
        </div>
    </div>

    <div style="width:200px; display:flex; justify-content:flex-end; gap:10px">
        <span style="font-size:12px">🔊</span>
        <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)" style="width:80px; accent-color:var(--neon)">
    </div>
</div>

<audio id="a1"></audio><audio id="a2"></audio>

<script>
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let playlists = JSON.parse(localStorage.getItem('u_l')) || {}, shufflePool = [];
    let currentIndex = 0, activePlayer = 1, isShuffle = false, repeatMode = 0;
    let songMetaData = JSON.parse(localStorage.getItem('u_meta')) || {};

    const a1 = document.getElementById('a1'), a2 = document.getElementById('a2');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v || "İsimsiz", artist: r.c[1]?.v || "Bilinmiyor", url: r.c[2]?.v || "" })).filter(s => s.url.includes('http'));
        showView('all');
    }

    function showView(type, el) {
        if(el) { document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        currentQueue = type === 'all' ? [...allSongs] : allSongs.filter(s => favorites.includes(s.url));
        shufflePool = []; // Havuzu sıfırla
        renderSongs();
    }

    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row" style="display:grid; grid-template-columns: 40px 2fr 1fr 100px; padding:12px; border-radius:10px; cursor:pointer" onclick="playIdx(${i})">
                <div style="opacity:0.3">${i+1}</div>
                <div style="font-weight:600">${s.title}</div>
                <div style="color:#555">${s.artist}</div>
                <div style="text-align:right" onclick="event.stopPropagation(); toggleFav('${s.url}')">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }

    function playIdx(i) {
        currentIndex = i;
        const s = currentQueue[currentIndex];
        const p = activePlayer === 1 ? a1 : a2;
        p.src = s.url; p.play();
        document.getElementById('play-btn').innerText = "⏸";
        document.getElementById('bar-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = s.artist;
        loadSongData(s.url);
        if(!document.getElementById('right-panel').classList.contains('open')) toggleRightPanel();
        
        p.ontimeupdate = () => {
            document.getElementById('bar-fill').style.width = (p.currentTime/p.duration*100)+"%";
            document.getElementById('cur-time').innerText = formatT(p.currentTime);
            document.getElementById('dur-time').innerText = formatT(p.duration);
            if(p.duration && p.duration - p.currentTime < 3) autoNext();
        };
    }

    function autoNext() {
        if(repeatMode === 2) { playIdx(currentIndex); return; }
        if(isShuffle) {
            if(shufflePool.length === 0) shufflePool = Array.from({length: currentQueue.length}, (_, i) => i);
            let rIdx = Math.floor(Math.random() * shufflePool.length);
            currentIndex = shufflePool.splice(rIdx, 1)[0];
        } else {
            currentIndex = (currentIndex + 1) % currentQueue.length;
        }
        playIdx(currentIndex);
    }

    // SAĞ PANEL DATA YÖNETİMİ
    function loadSongData(url) {
        const data = songMetaData[url] || { art: '', credits: '', desc: '' };
        document.getElementById('info-credits').value = data.credits;
        document.getElementById('info-desc').value = data.desc;
        const artCont = document.getElementById('art-container');
        if(data.art) artCont.innerHTML = `<img src="${data.art}">`;
        else artCont.innerHTML = `<span>Resim Linki Ekle</span>`;
        document.getElementById('bar-art-mini').innerHTML = data.art ? `<img src="${data.art}" style="width:100%; height:100%; object-fit:cover">` : '';
    }

    function saveSongData() {
        const url = currentQueue[currentIndex].url;
        const img = document.querySelector('#art-container img');
        songMetaData[url] = {
            art: img ? img.src : '',
            credits: document.getElementById('info-credits').value,
            desc: document.getElementById('info-desc').value
        };
        localStorage.setItem('u_meta', JSON.stringify(songMetaData));
    }

    function changeArt() {
        const link = prompt("Kapak fotoğrafı URL'sini yapıştırın:");
        if(link) {
            document.getElementById('art-container').innerHTML = `<img src="${link}">`;
            saveSongData();
            loadSongData(currentQueue[currentIndex].url);
        }
    }

    // UI KONTROLLER
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleRightPanel() { document.getElementById('right-panel').classList.toggle('open'); }
    function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuf-btn').classList.toggle('active', isShuffle); shufflePool = []; }
    function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('rep-btn').innerText = repeatMode === 2 ? "🔂" : "🔁"; }
    function skip(v) { const p = activePlayer === 1 ? a1 : a2; p.currentTime += v; }
    function seek(e) { const p = activePlayer === 1 ? a1 : a2; p.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * p.duration; }
    function formatT(s) { const m = Math.floor(s/60), sc = Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function setVol(v) { a1.volume = v; a2.volume = v; }
    function togglePlay() { 
        const p = activePlayer === 1 ? a1 : a2; 
        if(p.paused) { p.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { p.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }
    function toggleFav(u) { if(favorites.includes(u)) favorites = favorites.filter(f=>f!==u); else favorites.push(u); localStorage.setItem('u_f', JSON.stringify(favorites)); renderSongs(); }

    window.onload = init;
</script>
</body>
</html>
