<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usta-ify Premium Cloud v27</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link id="main-font-link" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --accent: #00f2ff;
            --accent-dark: #0a0a0a;
            --accent-mid: rgba(0, 242, 255, 0.4);
            --bg: #050505;
            --bg-soft: rgba(255, 255, 255, 0.05);
            --panel: rgba(0, 0, 0, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --text: #fff;
            --muted: rgba(255, 255, 255, 0.6);
            --f-size: 14px;
            --sidebar-width: 280px;
            --right-panel-width: 380px;
            --player-width: 85%;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: var(--f-size);
        }

        body {
            display: flex;
            overflow: hidden;
            position: relative;
        }

        button, input, textarea {
            font: inherit;
        }

        button {
            border: none;
        }

        .icon-btn, .ghost-btn, .panel-btn, .nav-link, .pl-item, .song-row, .close-x {
            cursor: pointer;
        }

        #aurora {
            position: fixed;
            inset: 0;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.4;
            transition: all 2s ease;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--accent);
            border-radius: 50%;
            animation: move 20s infinite alternate;
            opacity: 0.6;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(30%, 30%); }
        }

        #sidebar, #player-bar, #right-panel, .full-modal {
            backdrop-filter: blur(25px);
            background: var(--panel);
        }

        #sidebar {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 5000;
            overflow-y: auto;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand {
            padding: 40px 30px;
            font-weight: 900;
            color: var(--accent);
            font-size: 22px;
            letter-spacing: 0.04em;
        }

        .nav-link {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            opacity: 0.6;
            user-select: none;
        }

        .nav-link:hover,
        .nav-link.active {
            opacity: 1;
            color: var(--accent);
        }

        .pl-item {
            padding: 8px 55px;
            font-size: 0.85em;
            opacity: 0.5;
        }

        .pl-item:hover,
        .pl-item.active {
            opacity: 1;
            color: var(--accent);
        }

        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            padding-bottom: 180px;
            z-index: 1;
            transition: margin 0.5s ease;
            position: relative;
        }

        body.right-open #main-content {
            margin-right: var(--right-panel-width);
        }

        .menu-toggle {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 5500;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        #view-title {
            font-size: 40px;
            font-weight: 900;
            margin: 0;
        }

        .search-box,
        .text-input,
        .text-area {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-mid);
            border-radius: 18px;
            color: #fff;
            outline: none;
        }

        .search-box {
            width: 250px;
            padding: 10px 20px;
        }

        .btn-edit,
        .panel-btn,
        .ghost-btn {
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-edit {
            background: var(--accent-mid);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 15px;
            font-size: 12px;
        }

        .btn-edit.active,
        .panel-btn {
            background: var(--accent);
            color: #000;
        }

        .panel-btn {
            width: 100%;
            padding: 15px;
        }

        .ghost-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 12px 18px;
        }

        .song-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 5px;
            border: 1px solid transparent;
            user-select: none;
        }

        .song-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .song-row.playing {
            background: var(--accent-mid);
            color: var(--accent);
        }

        .drag-handle {
            width: 30px;
            cursor: grab;
            opacity: 0.3;
            display: none;
            text-align: center;
            flex-shrink: 0;
        }

        body.edit-mode .drag-handle {
            display: block;
        }

        .song-title {
            flex: 2;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            flex: 1;
            opacity: 0.6;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-fav-btn {
            width: 40px;
            text-align: right;
            font-size: 18px;
            flex-shrink: 0;
        }

        .empty-state {
            padding: 40px 25px;
            border: 1px dashed var(--accent-mid);
            border-radius: 20px;
            text-align: center;
            color: var(--muted);
        }

        #right-panel {
            width: var(--right-panel-width);
            border-left: 1px solid var(--border);
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            transform: translateX(100%);
            z-index: 4000;
            padding: 30px;
            overflow-y: auto;
            transition: transform 0.5s ease;
        }

        #right-panel.open {
            transform: translateX(0);
        }

        .pull-handle {
            width: 40px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 0 auto 20px auto;
        }

        .close-x {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 35px;
        }

        .premium-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            border: 1px dashed var(--accent-mid);
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .premium-art img,
        #mini-art img,
        .chip-avatar,
        .db-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .art-placeholder {
            opacity: 0.3;
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }

        .detail-center {
            text-align: center;
            margin: 25px 0;
        }

        .detail-center h2 {
            margin: 0;
            font-size: 24px;
        }

        .detail-center p {
            opacity: 0.5;
            margin: 8px 0;
        }

        .chip-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .artist-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }

        .chip-avatar {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .text-input {
            width: 100%;
            padding: 15px;
        }

        .text-area {
            width: 100%;
            min-height: 110px;
            margin-top: 15px;
            padding: 15px;
            resize: vertical;
            opacity: 0.9;
        }

        .mobile-controls {
            display: none;
        }

        #player-bar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: var(--player-width);
            height: 100px;
            border-radius: 25px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            gap: 20px;
        }

        .mini-track {
            width: 280px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        #mini-art {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            background: #222;
            overflow: hidden;
            flex-shrink: 0;
        }

        .player-title {
            overflow: hidden;
        }

        .player-title-strong {
            font-weight: 900;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-title-muted {
            font-size: 11px;
            opacity: 0.6;
        }

        .center-player {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 8px;
        }

        .ctrl-btn,
        .skip-btn {
            opacity: 0.7;
            cursor: pointer;
            user-select: none;
        }

        .ctrl-btn.active,
        .skip-btn:hover {
            opacity: 1;
            color: var(--accent);
        }

        .play-sync {
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .play-sync.large {
            width: 65px;
            height: 65px;
            font-size: 25px;
        }

        .play-sync.small {
            width: 45px;
            height: 45px;
            font-size: 20px;
        }

        .bar-wrap {
            width: 100%;
            display: flex;
            align-items: center;
        }

        .bar-time {
            font-size: 11px;
            opacity: 0.5;
            width: 40px;
        }

        .bar-time.right {
            text-align: right;
        }

        .bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            margin: 0 15px;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--accent);
        }

        .right-player {
            width: 200px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
        }

        .speed-btn {
            font-size: 10px;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            min-width: 40px;
            text-align: center;
        }

        .full-modal {
            position: fixed;
            inset: 0;
            z-index: 6000;
            display: none;
            padding: 60px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.9);
        }

        .full-modal.open {
            display: block;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
        }

        .sliders {
            display: flex;
            justify-content: space-between;
            height: 150px;
            align-items: flex-end;
            padding: 20px 0;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            opacity: 0.5;
        }

        .row-inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .row-inputs .text-input {
            flex: 1;
        }

        .grid-list {
            display: grid;
            gap: 20px;
        }

        .playlist-grid {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }

        .db-grid {
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            margin-top: 30px;
        }

        .playlist-card,
        .db-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }

        .playlist-card {
            padding: 20px;
        }

        .db-card {
            text-align: center;
            padding: 15px;
        }

        .db-avatar-wrap {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto;
            overflow: hidden;
            background: #222;
        }

        .muted {
            color: var(--muted);
        }

        .status {
            font-size: 10px;
            opacity: 0.7;
            min-width: 64px;
        }

        .range {
            width: 100%;
            accent-color: var(--accent);
        }

        @media (max-width: 768px) {
            :root {
                --player-width: 95%;
            }

            #sidebar {
                position: fixed;
                left: calc(-1 * var(--sidebar-width));
                height: 100%;
            }

            body.left-open #sidebar {
                transform: translateX(var(--sidebar-width));
            }

            body.right-open #main-content {
                margin-right: 0;
            }

            .song-artist,
            .pc-controls {
                display: none !important;
            }

            .mobile-controls {
                display: block;
            }

            #player-bar {
                width: 95%;
                bottom: 10px;
                height: 85px;
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>
    <div id="aurora"><div class="blob"></div></div>

    <div id="menu-toggle" class="menu-toggle" aria-label="Menüyü Aç">☰</div>

    <aside id="sidebar">
        <div class="brand">USTA-IFY PREMIUM</div>
        <div class="nav-link active" data-view="all"><span>🏠</span><span>HAVUZ</span></div>
        <div class="nav-link" data-view="fav"><span>💖</span><span>FAVORİLER</span></div>
        <div class="nav-link" data-modal-target="playlist-modal"><span>📂</span><span>LİSTELER</span></div>
        <div id="sidebar-playlists"></div>
        <div style="margin-top:auto; padding-bottom:30px;">
            <div class="nav-link" data-modal-target="db-modal">👤 ARŞİV</div>
            <div class="nav-link" data-modal-target="settings-modal">⚙️ AYARLAR</div>
        </div>
    </aside>

    <main id="main-content">
        <div class="toolbar">
            <h1 id="view-title">HAVUZ</h1>
            <input type="text" id="search-input" class="search-box" placeholder="🔍 Ara...">
            <button id="edit-btn" class="btn-edit" type="button">✍️ DÜZENLE</button>
            <span id="sync-status" class="status"></span>
        </div>
        <div id="song-body"></div>
    </main>

    <aside id="right-panel">
        <div id="right-handle" class="pull-handle" aria-label="Paneli Kapat"></div>
        <span id="right-close" class="close-x" aria-label="Paneli Kapat">✕</span>
        <div id="main-art" class="premium-art"></div>
        <div class="detail-center">
            <h2 id="det-title">Şarkı Seçilmedi</h2>
            <p id="det-artist">Usta-ify</p>
        </div>
        <div id="artist-chips" class="chip-wrap"></div>

        <div class="mobile-controls">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:25px;">
                <span id="m-cur" style="font-size:12px;">0:00</span>
                <div class="bar-bg" data-seek-surface="mobile"><div class="bar-fill" id="m-fill"></div></div>
                <span id="m-dur" style="font-size:12px;">0:00</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span class="skip-btn" data-skip="-10">⏪ 10s</span>
                <div style="display:flex; align-items:center; gap:20px;">
                    <span data-prev style="font-size:30px; cursor:pointer;">⏮</span>
                    <div class="play-sync large" data-play-toggle>▶</div>
                    <span data-next style="font-size:30px; cursor:pointer;">⏭</span>
                </div>
                <span class="skip-btn" data-skip="10">10s ⏩</span>
            </div>
        </div>

        <input type="text" id="credits-input" class="text-input" placeholder="#etiket ekle...">
        <textarea id="desc-input" class="text-area" placeholder="Notlar..."></textarea>
    </aside>

    <div id="player-bar" class="pc-controls">
        <div id="mini-track" class="mini-track">
            <div id="mini-art"></div>
            <div class="player-title">
                <div id="bar-title" class="player-title-strong">Şarkı Seç</div>
                <div id="bar-artist" class="player-title-muted">Usta-ify</div>
            </div>
        </div>

        <div class="center-player">
            <div class="control-row">
                <span id="shuf-btn" class="ctrl-btn" data-shuffle>🔀</span>
                <span class="skip-btn" data-skip="-10">-10s</span>
                <span data-prev style="font-size:22px; cursor:pointer;">⏮</span>
                <div class="play-sync small" data-play-toggle>▶</div>
                <span data-next style="font-size:22px; cursor:pointer;">⏭</span>
                <span class="skip-btn" data-skip="10">+10s</span>
                <span id="rep-btn" class="ctrl-btn" data-repeat>🔁</span>
            </div>
            <div class="bar-wrap">
                <span id="pc-cur" class="bar-time right">0:00</span>
                <div class="bar-bg" data-seek-surface="desktop"><div class="bar-fill" id="pc-fill"></div></div>
                <span id="pc-dur" class="bar-time">0:00</span>
            </div>
        </div>

        <div class="right-player">
            <div id="speed-indicator" class="speed-btn" data-speed>1.0x</div>
            <input id="volume-range" class="range" type="range" min="0" max="1" step="0.01" value="1" style="width:80px">
        </div>
    </div>

    <section id="settings-modal" class="full-modal">
        <span class="close-x" data-close-modal="settings-modal">✕</span>
        <h1 style="font-size:40px; font-weight:900;">PREMIUM AYARLAR</h1>
        <div class="panel-grid">
            <div class="card">
                <h3>🛠 SİSTEM</h3>
                <button id="manual-sync-btn" class="panel-btn" type="button">BULUTU SENKRONİZE ET</button>
                <div style="margin-bottom:15px;">
                    <label>Crossfade (sn): <span id="cf-val">3</span></label>
                    <input id="crossfade-range" class="range" type="range" min="0" max="10" value="3">
                </div>
                <div>
                    <label>Uyku Zamanlayıcısı: <span id="timer-val">Kapalı</span></label>
                    <input id="sleep-range" class="range" type="range" min="0" max="120" step="15" value="0">
                </div>
            </div>
            <div class="card">
                <h3>🎚 EKOLAYZIR</h3>
                <div class="sliders">
                    <input type="range" orient="vertical" min="-10" max="10" value="0" style="appearance:slider-vertical; width:15px; height:100%;">
                    <input type="range" orient="vertical" min="-10" max="10" value="3" style="appearance:slider-vertical; width:15px; height:100%;">
                    <input type="range" orient="vertical" min="-10" max="10" value="5" style="appearance:slider-vertical; width:15px; height:100%;">
                    <input type="range" orient="vertical" min="-10" max="10" value="2" style="appearance:slider-vertical; width:15px; height:100%;">
                    <input type="range" orient="vertical" min="-10" max="10" value="4" style="appearance:slider-vertical; width:15px; height:100%;">
                </div>
                <div class="slider-labels"><span>60Hz</span><span>250Hz</span><span>1kHz</span><span>4kHz</span><span>16kHz</span></div>
            </div>
        </div>
    </section>

    <section id="playlist-modal" class="full-modal">
        <span class="close-x" data-close-modal="playlist-modal">✕</span>
        <h1>LİSTELERİM</h1>
        <div class="row-inputs">
            <input type="text" id="pl-name" class="text-input" placeholder="Liste Adı...">
            <button id="create-playlist-btn" class="panel-btn" type="button" style="width:auto; padding:0 30px;">LİSTE OLUŞTUR</button>
        </div>
        <div id="pl-list-modal" class="grid-list playlist-grid"></div>
    </section>

    <section id="db-modal" class="full-modal">
        <span class="close-x" data-close-modal="db-modal">✕</span>
        <h1>SANATÇI ARŞİVİ</h1>
        <div class="row-inputs" style="display:grid; grid-template-columns:1fr 1fr 1fr;">
            <input type="text" id="db-tag" class="text-input" placeholder="#etiket">
            <input type="text" id="db-name" class="text-input" placeholder="Sanatçı">
            <input type="text" id="db-img" class="text-input" placeholder="Resim URL">
        </div>
        <button id="save-db-btn" class="panel-btn" type="button">ARŞİVE EKLE</button>
        <div id="db-list" class="grid-list db-grid"></div>
    </section>

    <audio id="pa" preload="none"></audio>
    <audio id="pb" preload="none"></audio>

    <script>
        (() => {
            const SYNC_URL = "https://script.google.com/macros/s/AKfycby-ViBklGLN-VCfeI_GdJk3Yy9Im9FA4CBDJCk7FHK5SgAXldoyFE8SgaL0eZejK0_3/exec";
            const SHEET_ID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
            const STORAGE_KEYS = ["u_f", "u_pl", "u_db", "u_m"];
            const SPEED_STEPS = [1, 1.25, 1.5, 2, 0.75];
            const DEFAULT_META = { art: "", credits: "", desc: "" };

            const state = {
                allSongs: [],
                currentQueue: [],
                favorites: safeJsonParse(localStorage.getItem("u_f"), []),
                playlists: safeJsonParse(localStorage.getItem("u_pl"), {}),
                artistDB: safeJsonParse(localStorage.getItem("u_db"), {}),
                songMeta: safeJsonParse(localStorage.getItem("u_m"), {}),
                currentIdx: -1,
                activePlayerKey: "a",
                crossfadeSeconds: 3,
                isShuffle: false,
                repeatMode: 0,
                playbackSpeed: 1,
                sleepTimerId: null,
                activeView: "all",
                activePlaylist: "",
                searchTerm: "",
                editMode: false,
                isCrossfading: false,
                progressTimer: null,
                lastSyncOk: null
            };

            const dom = {
                body: document.body,
                menuToggle: document.getElementById("menu-toggle"),
                sidebar: document.getElementById("sidebar"),
                sidebarPlaylists: document.getElementById("sidebar-playlists"),
                viewTitle: document.getElementById("view-title"),
                searchInput: document.getElementById("search-input"),
                editBtn: document.getElementById("edit-btn"),
                syncStatus: document.getElementById("sync-status"),
                songBody: document.getElementById("song-body"),
                rightPanel: document.getElementById("right-panel"),
                rightClose: document.getElementById("right-close"),
                rightHandle: document.getElementById("right-handle"),
                mainArt: document.getElementById("main-art"),
                miniArt: document.getElementById("mini-art"),
                detTitle: document.getElementById("det-title"),
                detArtist: document.getElementById("det-artist"),
                barTitle: document.getElementById("bar-title"),
                barArtist: document.getElementById("bar-artist"),
                artistChips: document.getElementById("artist-chips"),
                creditsInput: document.getElementById("credits-input"),
                descInput: document.getElementById("desc-input"),
                miniTrack: document.getElementById("mini-track"),
                shufBtn: document.getElementById("shuf-btn"),
                repBtn: document.getElementById("rep-btn"),
                speedIndicator: document.getElementById("speed-indicator"),
                volumeRange: document.getElementById("volume-range"),
                pcFill: document.getElementById("pc-fill"),
                mFill: document.getElementById("m-fill"),
                pcCur: document.getElementById("pc-cur"),
                pcDur: document.getElementById("pc-dur"),
                mCur: document.getElementById("m-cur"),
                mDur: document.getElementById("m-dur"),
                settingsModal: document.getElementById("settings-modal"),
                playlistModal: document.getElementById("playlist-modal"),
                dbModal: document.getElementById("db-modal"),
                manualSyncBtn: document.getElementById("manual-sync-btn"),
                crossfadeRange: document.getElementById("crossfade-range"),
                cfVal: document.getElementById("cf-val"),
                sleepRange: document.getElementById("sleep-range"),
                timerVal: document.getElementById("timer-val"),
                plName: document.getElementById("pl-name"),
                createPlaylistBtn: document.getElementById("create-playlist-btn"),
                plListModal: document.getElementById("pl-list-modal"),
                dbTag: document.getElementById("db-tag"),
                dbName: document.getElementById("db-name"),
                dbImg: document.getElementById("db-img"),
                saveDbBtn: document.getElementById("save-db-btn"),
                dbList: document.getElementById("db-list"),
                pa: document.getElementById("pa"),
                pb: document.getElementById("pb")
            };

            let sortableInstance = null;

            function safeJsonParse(raw, fallback) {
                if (!raw) return fallback;
                try {
                    const parsed = JSON.parse(raw);
                    return parsed ?? fallback;
                } catch {
                    return fallback;
                }
            }

            function escapeAttr(value) {
                return String(value ?? "");
            }

            function getPlayer(key = state.activePlayerKey) {
                return key === "a" ? dom.pa : dom.pb;
            }

            function getInactivePlayer() {
                return state.activePlayerKey === "a" ? dom.pb : dom.pa;
            }

            function getCurrentSong() {
                return state.currentQueue[state.currentIdx] || null;
            }

            function saveLocalState() {
                localStorage.setItem("u_f", JSON.stringify(state.favorites));
                localStorage.setItem("u_pl", JSON.stringify(state.playlists));
                localStorage.setItem("u_db", JSON.stringify(state.artistDB));
                localStorage.setItem("u_m", JSON.stringify(state.songMeta));
            }

            function setSyncStatus(text, ok = null) {
                state.lastSyncOk = ok;
                dom.syncStatus.textContent = text;
            }

            function normalizeCloudPayload(data) {
                const result = {};
                for (const key of STORAGE_KEYS) {
                    const fallback = key === "u_f" ? [] : {};
                    const parsed = safeJsonParse(data?.[key], fallback);
                    result[key] = JSON.stringify(parsed);
                }
                return result;
            }

            function applyCloudData(payload) {
                localStorage.setItem("u_f", payload.u_f);
                localStorage.setItem("u_pl", payload.u_pl);
                localStorage.setItem("u_db", payload.u_db);
                localStorage.setItem("u_m", payload.u_m);
                state.favorites = safeJsonParse(payload.u_f, []);
                state.playlists = safeJsonParse(payload.u_pl, {});
                state.artistDB = safeJsonParse(payload.u_db, {});
                state.songMeta = safeJsonParse(payload.u_m, {});
            }

            function buildSheetUrl() {
                return "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json";
            }

            async function fetchSheetSongs() {
                const res = await fetch(buildSheetUrl(), { cache: "no-store" });
                if (!res.ok) {
                    throw new Error("Tablo okunamadı.");
                }
                const text = await res.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                return (json.table.rows || [])
                    .map((row) => ({
                        title: row.c?.[0]?.v || "İsimsiz",
                        artist: row.c?.[1]?.v || "Bilinmeyen Sanatçı",
                        url: row.c?.[2]?.v || ""
                    }))
                    .filter((song) => /^https?:\/\//i.test(song.url));
            }

            async function syncFromCloud() {
                try {
                    setSyncStatus("☁️ çekiliyor...");
                    const res = await fetch(SYNC_URL, { cache: "no-store" });
                    if (!res.ok) {
                        throw new Error("Bulut verisi alınamadı.");
                    }
                    const data = await res.json();
                    const payload = normalizeCloudPayload(data);
                    applyCloudData(payload);
                    renderSidebarPlaylists();
                    renderPlaylistModal();
                    renderArtistDB();
                    setSyncStatus("✅ bulut hazır", true);
                } catch (error) {
                    setSyncStatus("⚠️ lokal veri", false);
                    console.error(error);
                }
            }

            async function syncToCloud() {
                saveLocalState();
                try {
                    setSyncStatus("☁️ gönderiliyor...");
                    const payload = {
                        u_f: localStorage.getItem("u_f") || "[]",
                        u_pl: localStorage.getItem("u_pl") || "{}",
                        u_db: localStorage.getItem("u_db") || "{}",
                        u_m: localStorage.getItem("u_m") || "{}"
                    };
                    await fetch(SYNC_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(payload)
                    });
                    setSyncStatus("✅ senkron", true);
                } catch (error) {
                    setSyncStatus("⚠️ senkron hata", false);
                    console.error(error);
                }
            }

            function applyFilters() {
                const selectedUrl = getCurrentSong()?.url || null;
                const term = state.searchTerm.trim().toLowerCase();
                let baseQueue = [];

                if (state.activeView === "fav") {
                    baseQueue = state.allSongs.filter((song) => state.favorites.includes(song.url));
                    dom.viewTitle.textContent = "FAVORİLER";
                } else if (state.activeView === "playlist" && state.activePlaylist) {
                    const urls = state.playlists[state.activePlaylist] || [];
                    baseQueue = state.allSongs.filter((song) => urls.includes(song.url));
                    dom.viewTitle.textContent = state.activePlaylist;
                } else {
                    baseQueue = [...state.allSongs];
                    dom.viewTitle.textContent = "HAVUZ";
                }

                if (term) {
                    baseQueue = baseQueue.filter((song) =>
                        song.title.toLowerCase().includes(term) ||
                        song.artist.toLowerCase().includes(term)
                    );
                }

                state.currentQueue = baseQueue;

                if (!state.currentQueue.length) {
                    state.currentIdx = -1;
                    return;
                }

                if (selectedUrl) {
                    const matchedIndex = state.currentQueue.findIndex((song) => song.url === selectedUrl);
                    state.currentIdx = matchedIndex;
                }

                if (state.currentIdx >= state.currentQueue.length) {
                    state.currentIdx = -1;
                }
            }

            function clearNode(node) {
                while (node.firstChild) node.removeChild(node.firstChild);
            }

            function createSafeImage(src, alt, className = "") {
                const img = document.createElement("img");
                img.src = src;
                img.alt = alt;
                if (className) img.className = className;
                img.loading = "lazy";
                return img;
            }

            function renderArt(container, artUrl, placeholderText) {
                clearNode(container);
                if (artUrl && /^https?:\/\//i.test(artUrl)) {
                    container.appendChild(createSafeImage(artUrl, placeholderText));
                } else {
                    const placeholder = document.createElement("span");
                    placeholder.className = "art-placeholder";
                    placeholder.textContent = placeholderText;
                    container.appendChild(placeholder);
                }
            }

            function renderSongs() {
                clearNode(dom.songBody);

                if (!state.currentQueue.length) {
                    const empty = document.createElement("div");
                    empty.className = "empty-state";
                    empty.textContent = state.searchTerm
                        ? "Aramana uygun şarkı bulunamadı."
                        : "Burada gösterilecek şarkı yok.";
                    dom.songBody.appendChild(empty);
                    return;
                }

                const currentSong = getCurrentSong();
                for (let i = 0; i < state.currentQueue.length; i += 1) {
                    const song = state.currentQueue[i];
                    const row = document.createElement("div");
                    row.className = "song-row";
                    if (currentSong && currentSong.url === song.url) {
                        row.classList.add("playing");
                    }
                    row.dataset.index = String(i);

                    const drag = document.createElement("div");
                    drag.className = "drag-handle";
                    drag.textContent = "⣿";

                    const title = document.createElement("div");
                    title.className = "song-title";
                    title.textContent = song.title;

                    const artist = document.createElement("div");
                    artist.className = "song-artist";
                    artist.textContent = song.artist;

                    const fav = document.createElement("div");
                    fav.className = "song-fav-btn";
                    fav.textContent = state.favorites.includes(song.url) ? "💖" : "🤍";
                    fav.addEventListener("click", (event) => {
                        event.stopPropagation();
                        toggleFavorite(song.url);
                    });

                    row.append(drag, title, artist, fav);
                    row.addEventListener("click", () => playIndex(i, true));
                    dom.songBody.appendChild(row);
                }

                initSortable();
            }

            function renderSidebarPlaylists() {
                clearNode(dom.sidebarPlaylists);
                for (const name of Object.keys(state.playlists)) {
                    const item = document.createElement("div");
                    item.className = "pl-item";
                    if (state.activeView === "playlist" && state.activePlaylist === name) {
                        item.classList.add("active");
                    }
                    item.textContent = "# " + name;
                    item.addEventListener("click", () => showPlaylist(name));
                    dom.sidebarPlaylists.appendChild(item);
                }
            }

            function renderPlaylistModal() {
                clearNode(dom.plListModal);
                const names = Object.keys(state.playlists);
                if (!names.length) {
                    const empty = document.createElement("div");
                    empty.className = "empty-state";
                    empty.textContent = "Henüz playlist oluşturulmamış.";
                    dom.plListModal.appendChild(empty);
                    return;
                }

                for (const name of names) {
                    const card = document.createElement("div");
                    card.className = "playlist-card";

                    const title = document.createElement("div");
                    title.style.fontWeight = "900";
                    title.style.marginBottom = "8px";
                    title.textContent = name;

                    const count = document.createElement("div");
                    count.className = "muted";
                    count.style.fontSize = "12px";
                    count.style.marginBottom = "16px";
                    count.textContent = (state.playlists[name] || []).length + " kayıt";

                    const openBtn = document.createElement("button");
                    openBtn.type = "button";
                    openBtn.className = "ghost-btn";
                    openBtn.textContent = "Aç";
                    openBtn.addEventListener("click", () => {
                        showPlaylist(name);
                        toggleModal("playlist-modal", false);
                    });

                    card.append(title, count, openBtn);
                    dom.plListModal.appendChild(card);
                }
            }

            function renderArtistDB() {
                clearNode(dom.dbList);
                const keys = Object.keys(state.artistDB);
                if (!keys.length) {
                    const empty = document.createElement("div");
                    empty.className = "empty-state";
                    empty.textContent = "Sanatçı arşivi henüz boş.";
                    dom.dbList.appendChild(empty);
                    return;
                }

                for (const key of keys) {
                    const artist = state.artistDB[key];
                    const card = document.createElement("div");
                    card.className = "db-card";

                    const avatarWrap = document.createElement("div");
                    avatarWrap.className = "db-avatar-wrap";
                    if (artist.img && /^https?:\/\//i.test(artist.img)) {
                        avatarWrap.appendChild(createSafeImage(artist.img, artist.name, "db-avatar"));
                    }

                    const tag = document.createElement("div");
                    tag.style.fontSize = "12px";
                    tag.style.fontWeight = "bold";
                    tag.style.marginTop = "10px";
                    tag.textContent = "#" + key;

                    const name = document.createElement("div");
                    name.className = "muted";
                    name.style.marginTop = "4px";
                    name.style.fontSize = "11px";
                    name.textContent = artist.name || "";

                    card.append(avatarWrap, tag, name);
                    dom.dbList.appendChild(card);
                }
            }

            function renderHashtags() {
                clearNode(dom.artistChips);
                const currentSong = getCurrentSong();
                if (!currentSong) return;

                const meta = state.songMeta[currentSong.url] || DEFAULT_META;
                const tags = (meta.credits || "").match(/#(\w+)/g) || [];

                tags.forEach((tagToken) => {
                    const key = tagToken.slice(1).toLowerCase();
                    const artist = state.artistDB[key];
                    if (!artist) return;

                    const chip = document.createElement("div");
                    chip.className = "artist-chip";

                    if (artist.img && /^https?:\/\//i.test(artist.img)) {
                        chip.appendChild(createSafeImage(artist.img, artist.name, "chip-avatar"));
                    }

                    const name = document.createElement("span");
                    name.textContent = artist.name;
                    chip.appendChild(name);
                    dom.artistChips.appendChild(chip);
                });
            }

            function renderTrackDetails(song) {
                if (!song) {
                    dom.barTitle.textContent = "Şarkı Seç";
                    dom.barArtist.textContent = "Usta-ify";
                    dom.detTitle.textContent = "Şarkı Seçilmedi";
                    dom.detArtist.textContent = "Usta-ify";
                    dom.creditsInput.value = "";
                    dom.descInput.value = "";
                    renderArt(dom.mainArt, "", "FOTOĞRAF LİNKİ YAPIŞTIR");
                    clearNode(dom.miniArt);
                    clearNode(dom.artistChips);
                    return;
                }

                dom.barTitle.textContent = song.title;
                dom.barArtist.textContent = song.artist;
                dom.detTitle.textContent = song.title;
                dom.detArtist.textContent = song.artist;

                const meta = state.songMeta[song.url] || DEFAULT_META;
                dom.creditsInput.value = meta.credits || "";
                dom.descInput.value = meta.desc || "";
                renderArt(dom.mainArt, meta.art, "FOTOĞRAF LİNKİ YAPIŞTIR");

                clearNode(dom.miniArt);
                if (meta.art && /^https?:\/\//i.test(meta.art)) {
                    dom.miniArt.appendChild(createSafeImage(meta.art, song.title));
                }

                renderHashtags();
                applyTheme(meta.art);
            }

            function updateActiveNav() {
                document.querySelectorAll(".nav-link[data-view]").forEach((node) => {
                    node.classList.toggle("active", node.dataset.view === state.activeView);
                });
            }

            function refreshQueueAndRender() {
                applyFilters();
                updateActiveNav();
                renderSidebarPlaylists();
                renderSongs();

                const currentSong = getCurrentSong();
                if (currentSong) {
                    renderTrackDetails(currentSong);
                } else {
                    renderTrackDetails(null);
                }
            }

            function playIndex(index, manual = true) {
                if (!state.currentQueue.length || index < 0 || index >= state.currentQueue.length) return;
                state.currentIdx = index;
                const song = getCurrentSong();
                if (!song) return;

                const current = getPlayer();
                const other = getInactivePlayer();

                if (manual) {
                    other.pause();
                    other.currentTime = 0;
                    other.volume = Number(dom.volumeRange.value);
                    state.isCrossfading = false;
                    current.src = song.url;
                    current.currentTime = 0;
                    current.playbackRate = state.playbackSpeed;
                    current.volume = Number(dom.volumeRange.value);
                    current.play().catch((error) => console.error(error));
                }

                renderSongs();
                renderTrackDetails(song);
                toggleRightPanel(true);
            }

            function pickNextIndex() {
                if (!state.currentQueue.length) return -1;
                if (state.repeatMode === 2) return state.currentIdx;
                if (state.isShuffle) return Math.floor(Math.random() * state.currentQueue.length);
                return (state.currentIdx + 1) % state.currentQueue.length;
            }

            function manualNext() {
                const next = pickNextIndex();
                if (next >= 0) playIndex(next, true);
            }

            function manualPrev() {
                if (!state.currentQueue.length) return;
                if (state.isShuffle) {
                    playIndex(Math.floor(Math.random() * state.currentQueue.length), true);
                    return;
                }
                playIndex((state.currentIdx - 1 + state.currentQueue.length) % state.currentQueue.length, true);
            }

            function togglePlay() {
                const player = getPlayer();
                if (!getCurrentSong() && state.currentQueue.length) {
                    playIndex(Math.max(0, state.currentIdx), true);
                    return;
                }
                if (!player.src && state.currentQueue.length) {
                    playIndex(Math.max(0, state.currentIdx), true);
                    return;
                }
                if (player.paused) {
                    player.play().catch((error) => console.error(error));
                } else {
                    player.pause();
                }
                syncPlayButtons();
            }

            function seekByEvent(event) {
                const player = getPlayer();
                if (!player.duration) return;
                const rect = event.currentTarget.getBoundingClientRect();
                const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
                player.currentTime = ratio * player.duration;
                updateProgressUI();
            }

            function skipTime(seconds) {
                const player = getPlayer();
                if (!player.duration) return;
                player.currentTime = Math.min(player.duration, Math.max(0, player.currentTime + seconds));
            }

            function setVolume(value) {
                const volume = Number(value);
                dom.pa.volume = volume;
                dom.pb.volume = volume;
            }

            function toggleSpeed() {
                const nextIndex = (SPEED_STEPS.indexOf(state.playbackSpeed) + 1) % SPEED_STEPS.length;
                state.playbackSpeed = SPEED_STEPS[nextIndex];
                dom.pa.playbackRate = state.playbackSpeed;
                dom.pb.playbackRate = state.playbackSpeed;
                dom.speedIndicator.textContent = state.playbackSpeed.toFixed(2).replace(/\.00$/, ".0") + "x";
            }

            function updateCrossfade(value) {
                state.crossfadeSeconds = Number(value);
                dom.cfVal.textContent = String(value);
            }

            function setSleepTimer(minutes) {
                const value = Number(minutes);
                if (state.sleepTimerId) {
                    clearTimeout(state.sleepTimerId);
                    state.sleepTimerId = null;
                }
                if (value > 0) {
                    dom.timerVal.textContent = value + "dk";
                    state.sleepTimerId = setTimeout(() => {
                        dom.pa.pause();
                        dom.pb.pause();
                        syncPlayButtons();
                    }, value * 60000);
                } else {
                    dom.timerVal.textContent = "Kapalı";
                }
            }

            function toggleFavorite(url) {
                if (state.favorites.includes(url)) {
                    state.favorites = state.favorites.filter((item) => item !== url);
                } else {
                    state.favorites.push(url);
                }
                saveLocalState();
                refreshQueueAndRender();
                syncToCloud();
            }

            function saveCurrentMeta() {
                const song = getCurrentSong();
                if (!song) return;
                state.songMeta[song.url] = {
                    ...(state.songMeta[song.url] || DEFAULT_META),
                    credits: dom.creditsInput.value,
                    desc: dom.descInput.value
                };
                saveLocalState();
                renderHashtags();
            }

            function updateArt() {
                const song = getCurrentSong();
                if (!song) return;

                const input = window.prompt("Yeni Kapak Fotoğrafı URL:");
                if (!input) return;

                try {
                    const url = new URL(input);
                    if (!/^https?:$/i.test(url.protocol)) throw new Error("URL protokolü geçersiz.");
                    state.songMeta[song.url] = {
                        ...(state.songMeta[song.url] || DEFAULT_META),
                        art: url.toString()
                    };
                    saveLocalState();
                    renderTrackDetails(song);
                    syncToCloud();
                } catch {
                    window.alert("Geçerli bir görsel URL girmen gerekiyor.");
                }
            }

            function applyTheme(imageUrl) {
                if (!imageUrl || !/^https?:\/\//i.test(imageUrl)) return;
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = imageUrl;
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    if (!ctx) return;
                    canvas.width = 1;
                    canvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1);
                    const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                    document.documentElement.style.setProperty("--accent", "rgb(" + r + "," + g + "," + b + ")");
                    document.documentElement.style.setProperty("--accent-mid", "rgba(" + r + "," + g + "," + b + ", 0.3)");
                };
            }

            function toggleLeftMenu() {
                dom.body.classList.toggle("left-open");
            }

            function toggleRightPanel(force) {
                const open = typeof force === "boolean" ? force : !dom.rightPanel.classList.contains("open");
                dom.rightPanel.classList.toggle("open", open);
                if (window.innerWidth > 768) {
                    dom.body.classList.toggle("right-open", open);
                }
            }

            function toggleModal(id, force) {
                const modal = document.getElementById(id);
                const open = typeof force === "boolean" ? force : !modal.classList.contains("open");
                modal.classList.toggle("open", open);
            }

            function showView(view) {
                state.activeView = view;
                state.activePlaylist = "";
                refreshQueueAndRender();
            }

            function showPlaylist(name) {
                state.activeView = "playlist";
                state.activePlaylist = name;
                refreshQueueAndRender();
            }

            function createPlaylist() {
                const name = dom.plName.value.trim();
                if (!name) return;
                if (!state.playlists[name]) {
                    state.playlists[name] = [];
                    dom.plName.value = "";
                    saveLocalState();
                    renderSidebarPlaylists();
                    renderPlaylistModal();
                    syncToCloud();
                }
            }

            function saveArtistDB() {
                const tag = dom.dbTag.value.trim().replace(/^#/, "").toLowerCase();
                const name = dom.dbName.value.trim();
                const img = dom.dbImg.value.trim();
                if (!tag || !name) return;
                state.artistDB[tag] = { name, img };
                dom.dbTag.value = "";
                dom.dbName.value = "";
                dom.dbImg.value = "";
                saveLocalState();
                renderArtistDB();
                renderHashtags();
                syncToCloud();
            }

            function toggleShuffle() {
                state.isShuffle = !state.isShuffle;
                dom.shufBtn.classList.toggle("active", state.isShuffle);
                dom.shufBtn.style.opacity = state.isShuffle ? "1" : "0.5";
            }

            function toggleRepeat() {
                state.repeatMode = (state.repeatMode + 1) % 3;
                dom.repBtn.textContent = state.repeatMode === 2 ? "🔂" : "🔁";
                dom.repBtn.classList.toggle("active", state.repeatMode !== 0);
                dom.repBtn.style.opacity = state.repeatMode === 0 ? "0.5" : "1";
            }

            function formatTime(seconds) {
                if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
                const min = Math.floor(seconds / 60);
                const sec = Math.floor(seconds % 60);
                return min + ":" + String(sec).padStart(2, "0");
            }

            function updateProgressUI() {
                const player = getPlayer();
                const duration = player.duration || 0;
                const current = player.currentTime || 0;
                const percent = duration ? (current / duration) * 100 : 0;
                const width = percent + "%";
                dom.pcFill.style.width = width;
                dom.mFill.style.width = width;
                dom.pcCur.textContent = formatTime(current);
                dom.mCur.textContent = formatTime(current);
                dom.pcDur.textContent = formatTime(duration);
                dom.mDur.textContent = formatTime(duration);
            }

            function syncPlayButtons() {
                const player = getPlayer();
                document.querySelectorAll("[data-play-toggle]").forEach((button) => {
                    button.textContent = player.paused ? "▶" : "⏸";
                });
            }

            async function crossFadeToNext() {
                if (state.isCrossfading || state.crossfadeSeconds <= 0 || state.currentQueue.length < 1) return;

                const oldPlayer = getPlayer();
                const nextIndex = pickNextIndex();
                if (nextIndex < 0) return;
                const nextSong = state.currentQueue[nextIndex];
                if (!nextSong || !nextSong.url) return;

                state.isCrossfading = true;
                state.activePlayerKey = state.activePlayerKey === "a" ? "b" : "a";
                state.currentIdx = nextIndex;

                const newPlayer = getPlayer();
                const targetVolume = Number(dom.volumeRange.value);
                newPlayer.src = nextSong.url;
                newPlayer.currentTime = 0;
                newPlayer.playbackRate = state.playbackSpeed;
                newPlayer.volume = 0;

                try {
                    await newPlayer.play();
                } catch (error) {
                    state.activePlayerKey = state.activePlayerKey === "a" ? "b" : "a";
                    state.isCrossfading = false;
                    console.error(error);
                    return;
                }

                renderSongs();
                renderTrackDetails(nextSong);

                let currentStep = 0;
                const totalSteps = Math.max(1, Math.floor(state.crossfadeSeconds * 20));
                const intervalMs = (state.crossfadeSeconds * 1000) / totalSteps;

                const fadeInterval = setInterval(() => {
                    currentStep += 1;
                    const ratio = Math.min(1, currentStep / totalSteps);
                    newPlayer.volume = targetVolume * ratio;
                    oldPlayer.volume = targetVolume * (1 - ratio);

                    if (ratio >= 1) {
                        clearInterval(fadeInterval);
                        oldPlayer.pause();
                        oldPlayer.currentTime = 0;
                        oldPlayer.volume = targetVolume;
                        newPlayer.volume = targetVolume;
                        state.isCrossfading = false;
                        updateProgressUI();
                        syncPlayButtons();
                    }
                }, intervalMs);
            }

            function maybeStartCrossfade() {
                const player = getPlayer();
                if (state.crossfadeSeconds <= 0 || state.repeatMode === 2) return;
                if (!player.duration || player.paused) return;
                const remaining = player.duration - player.currentTime;
                if (remaining <= state.crossfadeSeconds + 0.05) {
                    crossFadeToNext();
                }
            }

            function initSortable() {
                if (!window.Sortable || sortableInstance) return;
                sortableInstance = Sortable.create(dom.songBody, {
                    handle: ".drag-handle",
                    animation: 150,
                    onEnd(evt) {
                        if (!state.currentQueue.length) return;
                        const selectedUrl = getCurrentSong()?.url || null;
                        const moved = state.currentQueue.splice(evt.oldIndex, 1)[0];
                        state.currentQueue.splice(evt.newIndex, 0, moved);
                        if (selectedUrl) {
                            state.currentIdx = state.currentQueue.findIndex((song) => song.url === selectedUrl);
                        }
                        renderSongs();
                    }
                });
            }

            function bindAudio(player) {
                player.addEventListener("timeupdate", () => {
                    if (player !== getPlayer()) return;
                    updateProgressUI();
                    maybeStartCrossfade();
                });
                player.addEventListener("loadedmetadata", () => {
                    if (player !== getPlayer()) return;
                    updateProgressUI();
                });
                player.addEventListener("play", () => {
                    if (player !== getPlayer()) return;
                    syncPlayButtons();
                });
                player.addEventListener("pause", () => {
                    if (player !== getPlayer()) return;
                    syncPlayButtons();
                });
                player.addEventListener("ended", () => {
                    if (state.isCrossfading || player !== getPlayer()) return;
                    if (state.repeatMode === 2) {
                        playIndex(state.currentIdx, true);
                    } else {
                        manualNext();
                    }
                });
            }

            function bindEvents() {
                dom.menuToggle.addEventListener("click", toggleLeftMenu);
                dom.rightClose.addEventListener("click", () => toggleRightPanel(false));
                dom.rightHandle.addEventListener("click", () => toggleRightPanel(false));
                dom.mainArt.addEventListener("click", updateArt);
                dom.miniTrack.addEventListener("click", () => toggleRightPanel(true));
                dom.editBtn.addEventListener("click", () => {
                    state.editMode = !state.editMode;
                    dom.body.classList.toggle("edit-mode", state.editMode);
                    dom.editBtn.classList.toggle("active", state.editMode);
                    dom.editBtn.textContent = state.editMode ? "✅ TAMAM" : "✍️ DÜZENLE";
                    if (!state.editMode) syncToCloud();
                });

                document.querySelectorAll(".nav-link[data-view]").forEach((node) => {
                    node.addEventListener("click", () => showView(node.dataset.view));
                });
                document.querySelectorAll("[data-modal-target]").forEach((node) => {
                    node.addEventListener("click", () => toggleModal(node.dataset.modalTarget, true));
                });
                document.querySelectorAll("[data-close-modal]").forEach((node) => {
                    node.addEventListener("click", () => toggleModal(node.dataset.closeModal, false));
                });

                dom.searchInput.addEventListener("input", () => {
                    state.searchTerm = dom.searchInput.value;
                    refreshQueueAndRender();
                });
                dom.creditsInput.addEventListener("input", () => {
                    saveCurrentMeta();
                    syncToCloud();
                });
                dom.descInput.addEventListener("input", () => {
                    saveCurrentMeta();
                    syncToCloud();
                });

                document.querySelectorAll("[data-play-toggle]").forEach((node) => {
                    node.addEventListener("click", togglePlay);
                });
                document.querySelectorAll("[data-prev]").forEach((node) => {
                    node.addEventListener("click", manualPrev);
                });
                document.querySelectorAll("[data-next]").forEach((node) => {
                    node.addEventListener("click", manualNext);
                });
                document.querySelectorAll("[data-skip]").forEach((node) => {
                    node.addEventListener("click", () => skipTime(Number(node.dataset.skip)));
                });
                document.querySelectorAll("[data-seek-surface]").forEach((node) => {
                    node.addEventListener("click", seekByEvent);
                });

                dom.shufBtn.addEventListener("click", toggleShuffle);
                dom.repBtn.addEventListener("click", toggleRepeat);
                dom.speedIndicator.addEventListener("click", toggleSpeed);
                dom.volumeRange.addEventListener("input", (event) => setVolume(event.target.value));

                dom.manualSyncBtn.addEventListener("click", async () => {
                    await syncFromCloud();
                    refreshQueueAndRender();
                });
                dom.crossfadeRange.addEventListener("input", (event) => updateCrossfade(event.target.value));
                dom.sleepRange.addEventListener("input", (event) => setSleepTimer(event.target.value));
                dom.createPlaylistBtn.addEventListener("click", createPlaylist);
                dom.saveDbBtn.addEventListener("click", saveArtistDB);

                window.addEventListener("keydown", (event) => {
                    const tag = document.activeElement?.tagName;
                    const isTyping = tag === "INPUT" || tag === "TEXTAREA";
                    if (isTyping) return;

                    if (event.code === "Space") {
                        event.preventDefault();
                        togglePlay();
                    } else if (event.code === "ArrowRight") {
                        event.preventDefault();
                        skipTime(10);
                    } else if (event.code === "ArrowLeft") {
                        event.preventDefault();
                        skipTime(-10);
                    }
                });

                bindAudio(dom.pa);
                bindAudio(dom.pb);
            }

            async function init() {
                bindEvents();
                updateCrossfade(state.crossfadeSeconds);
                setVolume(dom.volumeRange.value);
                toggleShuffle();
                toggleShuffle();
                toggleRepeat();
                toggleRepeat();
                toggleRepeat();

                await syncFromCloud();

                try {
                    state.allSongs = await fetchSheetSongs();
                    state.currentQueue = [...state.allSongs];
                    state.currentIdx = -1;
                    refreshQueueAndRender();
                    setSyncStatus(dom.syncStatus.textContent || "✅ hazır", true);
                } catch (error) {
                    console.error(error);
                    setSyncStatus("❌ şarkılar yüklenemedi", false);
                    refreshQueueAndRender();
                }
            }

            init();
        })();
    </script>
</body>
</html>
