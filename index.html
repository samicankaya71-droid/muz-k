<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Müzik Arşivi v25</title>
    <style>
        :root { --accent: #1db954; --bg: #090909; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 180px; }
        
        /* Liste Tasarımı */
        #container { padding: 20px; max-width: 700px; margin: 0 auto; }
        .sarki-kart { 
            background: var(--card); padding: 15px; margin-bottom: 8px; 
            border-radius: 10px; cursor: pointer; border: 1px solid #222;
            display: flex; align-items: center; transition: 0.2s;
        }
        .sarki-kart:hover { background: #1a1a1a; border-color: var(--accent); }
        .sarki-kart.aktif { border-left: 4px solid var(--accent); background: #1e1e1e; }
        .no { width: 30px; color: #555; font-weight: bold; }
        .detay { flex-grow: 1; }
        .detay strong { display: block; font-size: 15px; }
        .detay small { color: #888; }

        /* Alt Panel (Oynatıcı) */
        #player { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #000; border-top: 1px solid #333; padding: 20px 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.9);
        }
        .inner { width: 90%; max-width: 500px; margin: 0 auto; text-align: center; }
        #info { margin-bottom: 10px; font-weight: bold; color: var(--accent); height: 20px; }

        /* İlerleme Çubuğu */
        .progress-box { width: 100%; height: 6px; background: #333; border-radius: 10px; cursor: pointer; margin: 15px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 10px; position: relative; }
        
        /* Kontrol Butonları */
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .main-btn { background: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; }
        .side-btn { background: none; border: none; color: white; font-size: 30px; cursor: pointer; }

        /* Yükleme Simgesi */
        #status { text-align: center; padding: 20px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <div id="status">Arşiv taranıyor usta...</div>
    <div id="list"></div>
</div>

<div id="player">
    <div class="inner">
        <div id="info">Parça Bekleniyor...</div>
        
        <div class="progress-box" id="p-box" onclick="seek(event)">
            <div class="progress-fill" id="p-fill"></div>
        </div>

        <div class="controls">
            <button class="side-btn" onclick="prev()">⏮</button>
            <button id="playBtn" class="main-btn" onclick="toggle()">▶</button>
            <button class="side-btn" onclick="next()">⏭</button>
        </div>
    </div>
</div>

<script>
    const TABLO_ID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${TABLO_ID}/gviz/tq?tqx=out:json`;

    let playlist = [];
    let currentIdx = 0;
    let audio = new Audio();

    async function init() {
        try {
            const r = await fetch(sheetUrl);
            const t = await r.text();
            const j = JSON.parse(t.substring(47).slice(0, -2));
            playlist = j.table.rows.map(row => ({
                title: row.c[0]?.v || "Bilinmiyor",
                artist: row.c[1]?.v || "Usta Arşivi",
                url: row.c[2]?.v || ""
            })).filter(s => s.url.includes("http"));

            document.getElementById('status').style.display = 'none';
            render();
        } catch (e) {
            document.getElementById('status').innerText = "Bağlantı hatası! Tablo ayarlarını kontrol et.";
        }
    }

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = playlist.map((s, i) => `
            <div class="sarki-kart" id="s-${i}" onclick="play(${i})">
                <div class="no">${i+1}</div>
                <div class="detay">
                    <strong>${s.title}</strong>
                    <small>${s.artist}</small>
                </div>
            </div>
        `).join('');
    }

    function play(i) {
        document.querySelectorAll('.sarki-kart').forEach(k => k.classList.remove('aktif'));
        currentIdx = i;
        const song = playlist[currentIdx];
        
        document.getElementById(`s-${i}`).classList.add('aktif');
        document.getElementById('info').innerText = "Yükleniyor: " + song.title + "...";
        
        audio.src = song.url;
        audio.play().then(() => {
            document.getElementById('info').innerText = song.title;
            document.getElementById('playBtn').innerText = "⏸";
        }).catch(() => {
            document.getElementById('info').innerText = "Yükleme bekleniyor (Archive.org yavaş olabilir)...";
        });
    }

    function toggle() {
        if(!audio.src) return;
        if(audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
    }

    function next() { play((currentIdx + 1) % playlist.length); }
    function prev() { play((currentIdx - 1 + playlist.length) % playlist.length); }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('p-fill').style.width = (p || 0) + "%";
    };

    audio.onended = () => next();

    function seek(e) {
        const b = document.getElementById('p-box');
        const pct = e.offsetX / b.offsetWidth;
        audio.currentTime = pct * audio.duration;
    }

    init();
</script>
</body>
</html>
    arsiviYukle();
</script>

</body>
</html>
