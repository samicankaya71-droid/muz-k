<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usta-ify Premium Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #050505; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; position: relative; 
        }

        /* ARKA PLAN */
        #aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(100px); opacity: 0.3; transition: 2s; }
        .blob { position: absolute; width: 600px; height: 600px; background: var(--accent); border-radius: 50%; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        /* PANELLER & CAM EFEKTİ */
        #sidebar, #player-bar, #right-panel, .full-modal { backdrop-filter: blur(30px); background: rgba(0,0,0,0.7) !important; }

        #sidebar { 
            width: 280px; border-right: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; z-index: 5000;
            transition: 0.3s;
        }
        
        #main-content { flex: 1; overflow-y: auto; padding: 30px; padding-bottom: 150px; z-index: 1; transition: 0.4s; }
        
        /* SAĞ PANEL */
        #right-panel { 
            width: 380px; position: fixed; top: 0; right: -380px; bottom: 0; 
            z-index: 4500; padding: 30px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        #right-panel.open { right: 0; }
        body.right-open #main-content { margin-right: 380px; }

        /* LİSTE TASARIMI */
        .song-row { 
            display: grid; grid-template-columns: 40px 1.5fr 1fr 50px; 
            padding: 12px 15px; border-radius: 10px; margin-bottom: 5px; 
            cursor: pointer; transition: 0.2s; align-items: center; gap: 10px;
        }
        .song-row:hover { background: rgba(255,255,255,0.05); }
        .song-row.playing { background: var(--accent); color: #000; }
        .song-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drag-handle { cursor: grab; opacity: 0.4; display: none; }
        body.edit-mode .drag-handle { display: block; }

        /* PLAYER BAR */
        #player-bar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; height: 90px; border-radius: 20px; 
            display: flex; align-items: center; padding: 0 25px; z-index: 4000;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; margin: 0 10px; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; box-shadow: 0 0 10px var(--accent); }

        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 15px; overflow: hidden; background: #111; margin-bottom: 20px; }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }

        .btn-edit { border: 1px solid var(--accent); color: var(--accent); background: transparent; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 900; }
        .btn-edit.active { background: var(--accent); color: #000; }

        .full-modal { position: fixed; inset: 0; z-index: 6000; display: none; padding: 50px; overflow-y: auto; }
        
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; height: 100%; }
            body.left-open #sidebar { left: 0; }
            #right-panel { width: 100%; right: -100%; }
            #player-bar { width: 95%; height: 80px; }
            .song-artist, .pc-extra { display: none; }
            .song-row { grid-template-columns: 30px 1fr 40px; }
        }
    </style>
</head>
<body id="main-body">

<div id="aurora"><div class="blob"></div></div>

<div id="sidebar">
    <div style="padding: 40px 25px; font-weight: 900; color: var(--accent); font-size: 20px;">USTA-IFY</div>
    <div class="nav-link active" onclick="showView('all', this)">🏠 HAVUZ</div>
    <div class="nav-link" onclick="showView('fav', this)">💖 FAVORİLER</div>
    <div class="nav-link" onclick="toggleModal('playlist-modal')">📂 LİSTELER</div>
    <div id="sidebar-playlists"></div>
    <div style="margin-top: auto; padding-bottom: 20px;">
        <div class="nav-link" onclick="toggleModal('db-modal')">👤 ARŞİV</div>
        <div class="nav-link" onclick="toggleModal('settings-modal')">⚙️ AYARLAR</div>
    </div>
</div>

<div id="main-content">
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px; flex-wrap: wrap;">
        <div onclick="toggleLeft()" style="font-size:25px; cursor:pointer;">☰</div>
        <h1 id="view-title" style="font-size: clamp(24px, 5vw, 40px); margin:0;">HAVUZ</h1>
        <button id="edit-btn" class="btn-edit" onclick="toggleEditMode()">DÜZENLE</button>
        <span id="sync-status" style="font-size: 10px; opacity: 0.4;"></span>
    </div>
    <div id="song-body"></div>
</div>

<div id="right-panel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="font-weight:900; opacity:0.5">ŞİMDİ ÇALIYOR</span>
        <span onclick="toggleRight(false)" style="font-size:30px; cursor:pointer;">✕</span>
    </div>
    <div class="premium-art" id="main-art" onclick="updateArt()"></div>
    <div style="text-align: center;">
        <h2 id="det-title" style="margin:0; font-size: 20px;">Şarkı Seçin</h2>
        <p id="det-artist" style="opacity:0.5; margin:10px 0;">Usta-ify</p>
    </div>
    <div id="artist-chips" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px; margin: 15px 0;"></div>
    
    <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px;">
        <input type="text" id="credits-input" style="background:transparent; border:1px solid #333; color:#fff; width:100%; padding:10px; border-radius:8px;" placeholder="#etiket ekle..." oninput="parseHashtags()">
        <textarea id="desc-input" style="background:transparent; border:none; color:#fff; width:100%; height:60px; margin-top:10px; opacity:0.5; resize:none;" placeholder="Notlar..." oninput="saveMeta()"></textarea>
    </div>
</div>

<div id="player-bar">
    <div style="width:250px; display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="toggleRight(true)">
        <div id="mini-art" style="width:45px; height:45px; border-radius:8px; overflow:hidden; background:#222"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">...</div>
            <div id="bar-artist" style="font-size:10px; opacity:0.5">...</div>
        </div>
    </div>
    
    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:5px">
            <span onclick="toggleShuffle()" id="shuf-btn" style="cursor:pointer; opacity:0.4; font-size:18px;">🔀</span>
            <span onclick="manualPrev()" style="font-size:20px; cursor:pointer;">⏮</span>
            <div onclick="togglePlay()" class="play-sync" style="width:40px; height:40px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px;">▶</div>
            <span onclick="manualNext()" style="font-size:20px; cursor:pointer;">⏭</span>
            <span onclick="toggleRepeat()" id="rep-btn" style="cursor:pointer; opacity:0.4; font-size:18px;">🔁</span>
        </div>
        <div style="width:100%; display:flex; align-items:center">
            <span id="cur-time" style="font-size:10px; opacity:0.5; width:35px">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div class="bar-fill" id="p-fill"></div></div>
            <span id="dur-time" style="font-size:10px; opacity:0.5; width:35px">0:00</span>
        </div>
    </div>

    <div class="pc-extra" style="width:200px; display:flex; align-items:center; justify-content:flex-end; gap:10px">
        <div onclick="toggleSpeed()" id="speed-indicator" style="font-size:10px; font-weight:900; cursor:pointer;">1.0x</div>
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)" style="width:60px; accent-color:var(--accent);">
    </div>
</div>

<div id="settings-modal" class="full-modal">
    <h1 onclick="toggleModal('settings-modal')" style="cursor:pointer">✕ AYARLAR</h1>
    <div style="max-width:400px; display:flex; flex-direction:column; gap:20px; margin-top:30px;">
        <button onclick="syncFromCloud()" style="padding:15px; background:var(--accent); border:none; border-radius:10px; font-weight:bold;">BULUT VERİLERİNİ GÜNCELLE</button>
        <div><label>Crossfade: <span id="cf-val">3</span>s</label><input type="range" min="0" max="10" value="3" oninput="updateCF(this.value)" style="width:100%"></div>
        <div><label>Uyku Zamanlayıcısı: <span id="timer-val">Kapalı</span></label><input type="range" min="0" max="120" value="0" step="15" oninput="setSleepTimer(this.value)" style="width:100%"></div>
    </div>
</div>

<div id="playlist-modal" class="full-modal">
    <h1 onclick="toggleModal('playlist-modal')" style="cursor:pointer">✕ LİSTELER</h1>
    <div style="display:flex; gap:10px; margin:20px 0;"><input type="text" id="pl-name" style="background:#111; color:#fff; border:1px solid #333; padding:12px; flex:1; border-radius:8px;"><button onclick="createPL()" style="background:var(--accent); border:none; padding:0 20px; border-radius:8px; font-weight:bold;">OLUŞTUR</button></div>
    <div id="pl-list-modal" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:15px"></div>
</div>

<div id="db-modal" class="full-modal">
    <h1 onclick="toggleModal('db-modal')" style="cursor:pointer">✕ ARŞİV</h1>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;"><input type="text" id="db-tag" placeholder="#etiket"><input type="text" id="db-name" placeholder="İsim"><input type="text" id="db-img" placeholder="Resim URL" style="grid-column: span 2"></div>
    <button onclick="saveDB()" style="width:100%; padding:15px; background:var(--accent); border:none; font-weight:bold; border-radius:8px;">KAYDET</button>
    <div id="db-list" style="margin-top:20px; display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:10px"></div>
</div>

<audio id="pa"></audio><audio id="pb"></audio>

<script>
    const SYNC_URL = "https://script.google.com/macros/s/AKfycby-ViBklGLN-VCfeI_GdJk3Yy9Im9FA4CBDJCk7FHK5SgAXldoyFE8SgaL0eZejK0_3/exec";
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let playlists = JSON.parse(localStorage.getItem('u_pl')) || {}, artistDB = JSON.parse(localStorage.getItem('u_db')) || {};
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {}, currentIdx = 0, activeP = 'a', cfS = 3;
    let isShuffle = false, repeatMode = 0, playbackSpeed = 1.0, sleepTimer = null;

    const pa = document.getElementById('pa'), pb = document.getElementById('pb');

    async function init() {
        await syncFromCloud();
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url?.includes('http'));
            showView('all');
            updateDBUI(); updatePLUI(); initSortable();
            requestAnimationFrame(syncUI);
        } catch(e) { alert("Veri çekilemedi, interneti kontrol et!"); }
    }

    function syncUI() {
        const cur = activeP === 'a' ? pa : pb;
        if(!cur.paused && cur.duration) {
            const p = (cur.currentTime / cur.duration) * 100;
            document.getElementById('p-fill').style.width = p + "%";
            document.getElementById('cur-time').innerText = formatTime(cur.currentTime);
            document.getElementById('dur-time').innerText = formatTime(cur.duration);
            
            if(cur.duration - cur.currentTime <= cfS && !cur.dataset.fading && cfS > 0) {
                cur.dataset.fading = "true"; 
                handleTransition();
            }
        }
        if(cur.ended && !cur.dataset.fading) handleTransition();
        document.querySelectorAll('.play-sync').forEach(b => b.innerText = cur.paused ? '▶' : '⏸');
        requestAnimationFrame(syncUI);
    }

    function handleTransition() {
        if(repeatMode === 2) { playIdx(currentIdx); return; }
        const next = isShuffle ? Math.floor(Math.random()*currentQueue.length) : (currentIdx + 1) % currentQueue.length;
        if(cfS > 0) crossFade(next); else playIdx(next);
    }

    function crossFade(nextIdx) {
        const oldP = activeP === 'a' ? pa : pb;
        activeP = activeP === 'a' ? 'b' : 'a';
        const newP = activeP === 'a' ? pa : pb;

        currentIdx = nextIdx;
        const s = currentQueue[currentIdx];
        newP.src = s.url; newP.volume = 0; newP.playbackRate = playbackSpeed;
        newP.play();

        let v = 0;
        let interval = setInterval(() => {
            v += 0.1;
            if(v >= 1) { 
                clearInterval(interval); 
                oldP.pause(); oldP.dataset.fading = ""; 
                newP.volume = 1; 
            } else {
                newP.volume = v; oldP.volume = 1 - v;
            }
        }, (cfS * 1000) / 10);
        updateMetadataUI(s);
    }

    function playIdx(i) {
        currentIdx = i; const s = currentQueue[currentIdx];
        const cur = activeP === 'a' ? pa : pb;
        const other = activeP === 'a' ? pb : pa;
        other.pause(); other.currentTime = 0; other.dataset.fading = "";
        cur.src = s.url; cur.volume = 1; cur.playbackRate = playbackSpeed;
        cur.play().catch(() => console.log("Kaynak yüklenemedi."));
        updateMetadataUI(s);
    }

    function updateMetadataUI(s) {
        document.getElementById('bar-title').innerText = document.getElementById('det-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = document.getElementById('det-artist').innerText = s.artist;
        const m = songMeta[s.url] || {};
        const img = m.art || "";
        const artHTML = img ? `<img src="${img}">` : `<div style="padding:15px; opacity:0.2">🎵</div>`;
        document.getElementById('main-art').innerHTML = document.getElementById('mini-art').innerHTML = artHTML;
        document.getElementById('credits-input').value = m.credits || "";
        document.getElementById('desc-input').value = m.desc || "";
        document.getElementById('aurora').style.background = m.art ? 'var(--accent)' : '#222';
        parseHashtags(); renderSongs();
    }

    // PANEL KONTROLLERİ
    function toggleLeft() { document.body.classList.toggle('left-open'); }
    function toggleRight(force) {
        const panel = document.getElementById('right-panel');
        const isOpen = force !== undefined ? force : !panel.classList.contains('open');
        panel.classList.toggle('open', isOpen);
        if(window.innerWidth > 768) document.body.classList.toggle('right-open', isOpen);
    }
    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function toggleEditMode() {
        document.body.classList.toggle('edit-mode');
        const btn = document.getElementById('edit-btn');
        btn.innerText = document.body.classList.contains('edit-mode') ? "KAYDET" : "DÜZENLE";
        btn.classList.toggle('active');
        if(!document.body.classList.contains('edit-mode')) syncToCloud();
    }

    function initSortable() {
        Sortable.create(document.getElementById('song-body'), {
            handle: '.drag-handle', animation: 150,
            onEnd: () => {
                const rows = [...document.querySelectorAll('.song-row')];
                // Sıralamayı fiziksel DOM'dan çekip queue'yu güncelle
                currentQueue = rows.map(r => allSongs.find(s => s.url === r.dataset.url));
            }
        });
    }

    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIdx===i?'playing':''}" onclick="playIdx(${i})" data-url="${s.url}">
                <div class="drag-handle">⣿</div>
                <div class="song-title">${s.title}</div>
                <div class="song-artist">${s.artist}</div>
                <div onclick="event.stopPropagation(); toggleFav('${s.url}')">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }

    // BULUT İŞLEMLERİ
    async function syncToCloud() {
        document.getElementById('sync-status').innerText = "Buluta atılıyor...";
        const d = { u_f: localStorage.getItem('u_f'), u_pl: localStorage.getItem('u_pl'), u_db: localStorage.getItem('u_db'), u_m: localStorage.getItem('u_m') };
        try {
            await fetch(SYNC_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            document.getElementById('sync-status').innerText = "Bulut Güncel";
        } catch(e) { document.getElementById('sync-status').innerText = "Hata!"; }
    }

    async function syncFromCloud() {
        try {
            const r = await fetch(SYNC_URL);
            const d = await r.json();
            if(d.u_f) { localStorage.setItem('u_f', d.u_f); favorites = JSON.parse(d.u_f); }
            if(d.u_pl) { localStorage.setItem('u_pl', d.u_pl); playlists = JSON.parse(d.u_pl); }
            if(d.u_db) { localStorage.setItem('u_db', d.u_db); artistDB = JSON.parse(d.u_db); }
            if(d.u_m) { localStorage.setItem('u_m', d.u_m); songMeta = JSON.parse(d.u_m); }
        } catch(e) {}
    }

    // DİĞER FONKSİYONLAR
    function togglePlay() { const c=activeP==='a'?pa:pb; c.paused?c.play():c.pause(); }
    function manualNext() { playIdx((currentIdx+1)%currentQueue.length); }
    function manualPrev() { playIdx((currentIdx-1+currentQueue.length)%currentQueue.length); }
    function seek(e) { const c=activeP==='a'?pa:pb; c.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*c.duration; }
    function formatTime(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function toggleShuffle() { isShuffle=!isShuffle; document.getElementById('shuf-btn').style.opacity=isShuffle?1:0.4; }
    function toggleRepeat() { repeatMode=(repeatMode+1)%3; document.getElementById('rep-btn').innerText=repeatMode===2?'🔂':'🔁'; document.getElementById('rep-btn').style.opacity=repeatMode?1:0.4; }
    function setVol(v) { pa.volume=pb.volume=v; }
    function toggleSpeed() { const s=[1,1.25,1.5,2,0.8]; playbackSpeed=s[(s.indexOf(playbackSpeed)+1)%s.length]; document.getElementById('speed-indicator').innerText=playbackSpeed+'x'; }
    function updateCF(v) { cfS=parseInt(v); document.getElementById('cf-val').innerText=v; }
    function setSleepTimer(v) { if(sleepTimer)clearTimeout(sleepTimer); if(v>0) { document.getElementById('timer-val').innerText=v+' dk'; sleepTimer=setTimeout(()=>{pa.pause();pb.pause();},v*60000); } else document.getElementById('timer-val').innerText='Kapalı'; }
    function toggleFav(u) { favorites.includes(u)?favorites=favorites.filter(x=>x!==u):favorites.push(u); localStorage.setItem('u_f', JSON.stringify(favorites)); renderSongs(); syncToCloud(); }
    function updateArt() { const u=prompt("Kapak URL:"); if(u){ const s=currentQueue[currentIdx]; songMeta[s.url]=songMeta[s.url]||{}; songMeta[s.url].art=u; localStorage.setItem('u_m',JSON.stringify(songMeta)); updateMetadataUI(s); syncToCloud(); } }
    function saveMeta() { const s=currentQueue[currentIdx]; if(s){ songMeta[s.url]=songMeta[s.url]||{}; songMeta[s.url].credits=document.getElementById('credits-input').value; songMeta[s.url].desc=document.getElementById('desc-input').value; localStorage.setItem('u_m',JSON.stringify(songMeta)); syncToCloud(); } }
    function showView(v,el) { document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active')); if(el)el.classList.add('active'); currentQueue=v==='all'?[...allSongs]:allSongs.filter(s=>favorites.includes(s.url)); renderSongs(); }
    function createPL() { const n=document.getElementById('pl-name').value; if(n){playlists[n]=[]; localStorage.setItem('u_pl',JSON.stringify(playlists)); updatePLUI(); syncToCloud();}}
    function updatePLUI() { document.getElementById('sidebar-playlists').innerHTML=Object.keys(playlists).map(k=>`<div class="pl-item" onclick="showPL('${k}')"># ${k}</div>`).join(''); }
    function showPL(n) { currentQueue=allSongs.filter(s=>playlists[n].includes(s.url)); document.getElementById('view-title').innerText=n; renderSongs(); }
    function saveDB() { const t=document.getElementById('db-tag').value.toLowerCase().replace('#',''), n=document.getElementById('db-name').value, i=document.getElementById('db-img').value; if(t&&n){artistDB[t]={name:n, img:i}; localStorage.setItem('u_db',JSON.stringify(artistDB)); updateDBUI(); syncToCloud();}}
    function updateDBUI() { document.getElementById('db-list').innerHTML=Object.keys(artistDB).map(k=>`<div style="text-align:center;padding:5px;background:rgba(255,255,255,0.05);border-radius:10px"><img src="${artistDB[k].img}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;"><div style="font-size:8px">#${k}</div></div>`).join(''); }
    function parseHashtags() { const v=document.getElementById('credits-input').value, t=v.match(/#(\w+)/g)||[]; document.getElementById('artist-chips').innerHTML=t.map(x=>{const a=artistDB[x.substring(1).toLowerCase()]; return a?`<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);padding:3px 8px;border-radius:15px;font-size:10px;"><img src="${a.img}" style="width:18px;height:18px;border-radius:50%;object-fit:cover">${a.name}</div>`:''}).join(''); }

    window.onload = init;
</script>
</body>
</html>
