<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta-ify Premium v10.0</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --sidebar: #000000; --card: #121212; --text: #b3b3b3; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; padding: 20px 10px; border-right: 1px solid #1a1a1a; }
        .nav-link { padding: 12px 15px; cursor: pointer; border-radius: 8px; color: var(--text); font-weight: 600; transition: 0.3s; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; }
        .nav-link:hover, .nav-link.active { background: #1a1a1a; color: #fff; }
        .nav-link.active { border-left: 3px solid var(--neon); color: var(--neon); }
        .playlist-area { flex: 1; overflow-y: auto; margin-top: 20px; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        
        /* MAIN CONTENT */
        #main-content { flex: 1; display: flex; flex-direction: column; background: linear-gradient(to bottom, #181818, #050505); overflow-y: auto; padding-bottom: 120px; }
        .view-header { padding: 40px 30px; display: flex; align-items: flex-end; gap: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.5)); }
        .view-header h1 { font-size: 48px; margin: 0; text-shadow: 0 0 20px rgba(0,242,255,0.3); }

        /* SONG LIST TABLE */
        .song-table { width: 100%; padding: 0 30px; border-collapse: collapse; }
        .song-row { display: grid; grid-template-columns: 50px 1fr 1fr 100px; padding: 10px; border-radius: 5px; align-items: center; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .song-row:hover { background: rgba(255,255,255,0.1); }
        .song-row.playing { color: var(--neon); }
        .fav-icon { cursor: pointer; font-size: 18px; color: #444; }
        .fav-icon.active { color: #ff0055; }

        /* BOTTOM PLAYER */
        #player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: #000; border-top: 1px solid #1a1a1a; display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
        .track-info { width: 30%; display: flex; align-items: center; gap: 15px; }
        .player-controls { width: 40%; display: flex; flex-direction: column; align-items: center; }
        .control-btns { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; }
        .btn { cursor: pointer; font-size: 20px; opacity: 0.7; transition: 0.2s; }
        .btn:hover { opacity: 1; color: var(--neon); }
        .play-btn { font-size: 40px; }
        
        /* PROGRESS BAR */
        .progress-area { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 11px; color: #888; }
        .progress-bar-bg { flex: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar-fill { height: 100%; background: var(--neon); width: 0%; border-radius: 2px; box-shadow: 0 0 10px var(--neon); }

        /* SETTINGS & HISTORY */
        #settings-panel { position: absolute; right: 20px; bottom: 110px; background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid var(--neon); display: none; width: 280px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-link active" onclick="showView('all')">🏠 Ana Havuz</div>
    <div class="nav-link" onclick="showView('favorites')">💖 Favorilerim</div>
    <div class="nav-link" onclick="toggleSettings()">⚙️ Ayarlar</div>
    
    <div class="playlist-area" id="playlists">
        <div style="font-size: 11px; color: #555; margin-bottom: 10px; padding-left: 15px;">PLAYLISTLER</div>
        <div class="nav-link" onclick="createNewPlaylist()" style="font-size: 13px;">+ Liste Oluştur</div>
        <div id="playlist-list"></div>
    </div>
</div>

<div id="main-content">
    <div class="view-header">
        <div style="width: 150px; height: 150px; background: #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 50px;">🎵</div>
        <div>
            <div style="font-size: 12px; font-weight: bold;">ÇALMA LİSTESİ</div>
            <h1 id="view-title">Tüm Şarkılar</h1>
        </div>
    </div>
    
    <div class="song-table" id="song-list-body"></div>
</div>

<div id="settings-panel">
    <h3>Usta Ayarları</h3>
    <p>Crossfade: <span id="cf-val">3</span>s</p>
    <input type="range" min="0" max="15" value="3" style="width:100%" oninput="changeCF(this.value)">
    <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
    <h4>Geçmiş</h4>
    <div id="history-box" style="font-size: 11px; max-height: 150px; overflow-y: auto;"></div>
</div>

<div id="player-bar">
    <div class="track-info">
        <div id="mini-title" style="font-weight: bold;">Şarkı Seçin</div>
        <div id="mini-artist" style="font-size: 11px; color: #888; margin-left: 10px;"></div>
    </div>

    <div class="player-controls">
        <div class="control-btns">
            <div class="btn" onclick="toggleShuffle()" title="Karıştır">🔀</div>
            <div class="btn" onclick="prevSong()">⏮</div>
            <div class="btn play-btn" id="play-btn" onclick="togglePlay()">▶</div>
            <div class="btn" onclick="nextSong()">⏭</div>
            <div class="btn" onclick="toggleRepeat()" id="repeat-btn" title="Döngü">🔁</div>
        </div>
        <div class="progress-area">
            <span id="cur-time">0:00</span>
            <div class="progress-bar-bg" onclick="seek(event)">
                <div id="prog-fill" class="progress-bar-fill"></div>
            </div>
            <span id="dur-time">0:00</span>
        </div>
    </div>
    
    <div style="width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
        <span style="font-size: 12px;">🔊</span>
        <input type="range" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)" style="width: 100px;">
    </div>
</div>

<audio id="audio1"></audio>
<audio id="audio2"></audio>

<script>
    let allSongs = [];
    let currentList = [];
    let favorites = JSON.parse(localStorage.getItem('usta_favs')) || [];
    let playlists = JSON.parse(localStorage.getItem('usta_lists')) || {};
    let history = [];
    
    let currentIndex = 0;
    let activePlayer = 1;
    let crossfadeSeconds = 3;
    let isPlaying = false;
    let repeatState = 0; // 0: no, 1: list, 2: song

    const a1 = document.getElementById('audio1');
    const a2 = document.getElementById('audio2');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({
            title: r.c[0]?.v || "İsimsiz",
            artist: r.c[1]?.v || "Usta",
            url: r.c[2]?.v || ""
        })).filter(s => s.url.includes('http'));
        
        showView('all');
        renderPlaylistMenu();
    }

    function showView(type) {
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        if(type === 'all') {
            currentList = [...allSongs];
            document.getElementById('view-title').innerText = "Ana Havuz";
        } else if(type === 'favorites') {
            currentList = allSongs.filter(s => favorites.includes(s.url));
            document.getElementById('view-title').innerText = "Favorilerim";
        }
        renderSongs();
    }

    function renderSongs() {
        const container = document.getElementById('song-list-body');
        container.innerHTML = currentList.map((s, i) => `
            <div class="song-row" onclick="playIndex(${i})">
                <div style="color: #666;">${i+1}</div>
                <div>
                    <div style="color: #fff; font-weight: 500;">${s.title}</div>
                    <div style="font-size: 12px; color: #888;">${s.artist}</div>
                </div>
                <div style="font-size: 12px; color: #555;">Katalog</div>
                <div class="fav-icon ${favorites.includes(s.url) ? 'active' : ''}" 
                     onclick="event.stopPropagation(); toggleFav('${s.url}')">❤</div>
            </div>
        `).join('');
    }

    function playIndex(index) {
        currentIndex = index;
        const song = currentList[currentIndex];
        const p = activePlayer === 1 ? a1 : a2;
        
        p.src = song.url;
        p.play();
        isPlaying = true;
        
        document.getElementById('mini-title').innerText = song.title;
        document.getElementById('mini-artist').innerText = song.artist;
        document.getElementById('play-btn').innerText = "⏸";
        
        updateHistory(song.title);
        startTracking();
    }

    function startTracking() {
        const p = activePlayer === 1 ? a1 : a2;
        p.ontimeupdate = () => {
            const progress = (p.currentTime / p.duration) * 100;
            document.getElementById('prog-fill').style.width = progress + "%";
            document.getElementById('cur-time').innerText = formatTime(p.currentTime);
            document.getElementById('dur-time').innerText = formatTime(p.duration);
            
            // Crossfade mantığı
            if (p.duration && p.duration - p.currentTime < crossfadeSeconds) {
                p.ontimeupdate = null;
                nextWithFade();
            }
        };
    }

    function seek(e) {
        const p = activePlayer === 1 ? a1 : a2;
        const bar = document.querySelector('.progress-bar-bg');
        const percent = e.offsetX / bar.offsetWidth;
        p.currentTime = percent * p.duration;
    }

    function toggleFav(url) {
        if(favorites.includes(url)) {
            favorites = favorites.filter(f => f !== url);
        } else {
            favorites.push(url);
        }
        localStorage.setItem('usta_favs', JSON.stringify(favorites));
        renderSongs();
    }

    function togglePlay() {
        const p = activePlayer === 1 ? a1 : a2;
        if(p.paused) { p.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { p.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }

    function formatTime(s) {
        if(!s) return "0:00";
        const min = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function changeCF(v) {
        crossfadeSeconds = v;
        document.getElementById('cf-val').innerText = v;
    }

    function setVolume(v) {
        a1.volume = v;
        a2.volume = v;
    }

    function updateHistory(name) {
        const t = new Date().toLocaleTimeString();
        history.unshift(`${t} - ${name}`);
        document.getElementById('history-box').innerHTML = history.slice(0,10).map(h => `<div>${h}</div>`).join('');
    }

    window.onload = init;
</script>
</body>
</html>
