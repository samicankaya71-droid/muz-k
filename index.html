<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usta-ify Premium Cloud v27.0</title>
    <link id="main-font-link" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --accent-dark: #0a0a0a; --accent-mid: rgba(0, 242, 255, 0.4); --bg: #050505; --text: #fff; --f-size: 14px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: var(--f-size); margin: 0; display: flex; height: 100vh; overflow: hidden; position: relative; }

        #aurora { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(100px); opacity: 0.4; transition: all 2s ease; overflow: hidden; }
        .blob { position: absolute; width: 600px; height: 600px; background: var(--accent); border-radius: 50%; animation: move 20s infinite alternate; opacity: 0.6; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 30%); } }

        #sidebar, #player-bar, #right-panel, .full-modal { backdrop-filter: blur(25px); background: rgba(0,0,0,0.6) !important; }

        #sidebar { width: 280px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; z-index: 5000; overflow-y: auto; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-link { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; opacity: 0.6; }
        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--accent); }
        .pl-item { padding: 8px 55px; font-size: 0.85em; opacity: 0.5; cursor: pointer; }

        #main-content { flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 180px; z-index: 1; transition: all 0.5s ease; position: relative; }
        body.right-open #main-content { margin-right: 380px; }
        body.left-open #main-content { margin-left: 280px; }

        .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--accent-mid); border-radius: 20px; padding: 10px 20px; color: #fff; width: 250px; outline: none; }
        .btn-edit { background: var(--accent-mid); border: 1px solid var(--accent); color: var(--accent); border-radius: 10px; padding: 8px 15px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-edit.active { background: var(--accent); color: #000; }

        /* ŞARKI SATIRI DÜZENLEME */
        .song-row { display: grid; grid-template-columns: 40px 1fr 1fr 60px; padding: 12px 20px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; align-items: center; gap: 15px; }
        .song-row.playing { background: var(--accent-mid); color: var(--accent); }
        .song-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 100px; }
        .song-artist { opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drag-handle { cursor: grab; opacity: 0.3; display: none; text-align: center; }
        body.edit-mode .drag-handle { display: block; }

        #right-panel { width: 380px; border-left: 1px solid rgba(255,255,255,0.1); position: fixed; top: 0; right: 0; bottom: 0; transform: translateX(100%); z-index: 4000; padding: 30px; overflow-y: auto; transition: transform 0.5s ease; }
        #right-panel.open { transform: translateX(0); }

        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; border: 1px solid var(--accent-mid); cursor: pointer; position: relative; }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }

        #player-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; height: 100px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 30px; z-index: 1000; }
        .bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin: 0 15px; position: relative; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: 0 0 15px var(--accent); }

        .full-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 6000; display: none; padding: 60px; overflow-y: auto; }
        .close-x { position: absolute; top: 30px; right: 40px; font-size: 35px; cursor: pointer; }

        .speed-btn { font-size: 10px; font-weight: 900; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 5px; cursor: pointer; min-width: 40px; text-align: center; }
        .skip-btn { font-size: 18px; opacity: 0.7; cursor: pointer; }
        .ctrl-btn.active { color: var(--accent); opacity: 1; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; height: 100%; }
            body.left-open #sidebar { transform: translateX(280px); }
            .song-row { grid-template-columns: 30px 1fr 50px; }
            .song-artist { display: none; }
            #player-bar { width: 95%; bottom: 10px; height: 85px; padding: 0 15px; }
            .pc-controls { display: none !important; }
            .mobile-controls { display: block !important; }
        }
    </style>
</head>
<body>

<div id="aurora"><div class="blob"></div></div>

<div onclick="toggleLeft()" style="position:fixed; top:25px; left:25px; z-index:5500; font-size:28px; cursor:pointer;">☰</div>

<div id="sidebar">
    <div style="padding: 40px 30px; font-weight: 900; color: var(--accent); font-size: 22px;">USTA-IFY PREMIUM</div>
    <div class="nav-link active" onclick="showView('all', this)">🏠 HAVUZ</div>
    <div class="nav-link" onclick="showView('fav', this)">💖 FAVORİLER</div>
    <div class="nav-link" onclick="toggleModal('playlist-modal')">📂 LİSTELER</div>
    <div id="sidebar-playlists"></div>
    <div style="margin-top: auto; padding-bottom: 30px;">
        <div class="nav-link" onclick="toggleModal('db-modal')">👤 ARŞİV</div>
        <div class="nav-link" onclick="toggleModal('settings-modal')">⚙️ AYARLAR</div>
    </div>
</div>

<div id="main-content">
    <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-bottom: 30px;">
        <h1 id="view-title" style="font-size: 40px; font-weight: 900; margin:0;">HAVUZ</h1>
        <input type="text" id="search-input" class="search-box" placeholder="🔍 Ara..." oninput="filterSongs()">
        <button id="edit-btn" class="btn-edit" onclick="toggleEditMode()">✍️ DÜZENLE</button>
        <span id="sync-status" style="font-size: 10px; opacity: 0.5;"></span>
    </div>
    <div id="song-body"></div>
</div>

<div id="right-panel">
    <div style="width:40px; height:5px; background:rgba(255,255,255,0.2); border-radius:10px; margin: 0 auto 20px auto; cursor:pointer;" onclick="toggleRight(false)"></div>
    <span class="close-x" onclick="toggleRight(false)">✕</span>
    <div class="premium-art" id="main-art" onclick="updateArt()"></div>
    <div style="text-align: center; margin: 25px 0;">
        <h2 id="det-title" style="margin:0; font-size: 22px;">Şarkı Seçilmedi</h2>
        <p id="det-artist" style="opacity:0.5; margin:8px 0;">Usta-ify</p>
    </div>
    <div id="artist-chips" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:20px;"></div>

    <div class="mobile-controls" style="display:none;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:25px;">
            <span id="m-cur" style="font-size:12px;">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div class="bar-fill" id="m-fill"></div></div>
            <span id="m-dur" style="font-size:12px;">0:00</span>
        </div>
        <div style="display:flex; justify-content:space-around; align-items:center;">
            <span onclick="manualPrev()" style="font-size:30px;">⏮</span>
            <div onclick="togglePlay()" class="play-sync" style="width:65px; height:65px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:25px;">▶</div>
            <span onclick="manualNext()" style="font-size:30px;">⏭</span>
        </div>
    </div>

    <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-top: 20px;">
        <p style="font-size: 10px; opacity: 0.5; margin-bottom: 10px; text-align: center;">METADATA EDİTÖRÜ</p>
        <input type="text" id="credits-input" style="background:rgba(255,255,255,0.05); border:1px solid var(--accent-mid); color:#fff; width:100%; padding:12px; border-radius:10px; font-size: 13px;" placeholder="#etiket ekle..." oninput="parseHashtags()">
        <textarea id="desc-input" style="background:transparent; border:none; color:#fff; width:100%; height:80px; margin-top:10px; opacity:0.4; font-size:12px; resize: none;" placeholder="Şarkı notları..." oninput="saveMeta()"></textarea>
    </div>
</div>

<div id="player-bar" class="pc-controls">
    <div style="width:280px; display:flex; align-items:center; gap:15px; cursor:pointer;" onclick="toggleRight(true)">
        <div id="mini-art" style="width:50px; height:50px; border-radius:10px; background:#222; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:900; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Şarkı Seç</div>
            <div id="bar-artist" style="font-size:11px; opacity:0.6">Usta-ify</div>
        </div>
    </div>
    
    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div style="display:flex; align-items:center; gap:25px; margin-bottom:5px">
            <span onclick="toggleShuffle()" id="shuf-btn" class="ctrl-btn" style="cursor:pointer; opacity:0.5;">🔀</span>
            <span onclick="manualPrev()" style="font-size:22px; cursor:pointer;">⏮</span>
            <div onclick="togglePlay()" class="play-sync" style="width:45px; height:45px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px;">▶</div>
            <span onclick="manualNext()" style="font-size:22px; cursor:pointer;">⏭</span>
            <span onclick="toggleRepeat()" id="rep-btn" class="ctrl-btn" style="cursor:pointer; opacity:0.5;">🔁</span>
        </div>
        <div style="width:100%; display:flex; align-items:center">
            <span id="pc-cur" style="font-size:10px; opacity:0.5; width:40px; text-align:right">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div class="bar-fill" id="pc-fill"></div></div>
            <span id="pc-dur" style="font-size:10px; opacity:0.5; width:40px">0:00</span>
        </div>
    </div>

    <div style="width:200px; display:flex; align-items:center; justify-content:flex-end; gap:15px">
        <div class="speed-btn" onclick="toggleSpeed()" id="speed-indicator">1.0x</div>
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)" style="accent-color:var(--accent); width:70px">
    </div>
</div>

<div id="settings-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('settings-modal')">✕</span>
    <h1 style="font-weight: 900;">AYARLAR</h1>
    <div style="max-width:400px; display:flex; flex-direction:column; gap:25px">
        <button onclick="syncFromCloud()" style="padding:15px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">VERİLERİ BULUTTAN ÇEK</button>
        <div><label>Crossfade (sn): <span id="cf-val">3</span></label> <input type="range" min="0" max="10" value="3" oninput="updateCF(this.value)" style="width:100%"></div>
        <div><label>Uyku Zamanlayıcısı (dk): <span id="timer-val">Kapalı</span></label> <input type="range" min="0" max="120" value="0" step="15" oninput="setSleepTimer(this.value)" style="width:100%"></div>
    </div>
</div>

<div id="playlist-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('playlist-modal')">✕</span>
    <h1>LİSTELERİM</h1>
    <div style="display:flex; gap:10px; margin-bottom:20px"><input type="text" id="pl-name" placeholder="Liste Adı..." style="background:#111; color:#fff; border:1px solid #333; padding:15px; flex:1; border-radius:10px;"><button onclick="createPL()" style="background:var(--accent); border:none; padding:0 30px; border-radius:10px; font-weight:bold;">EKLE</button></div>
    <div id="pl-list-modal" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:15px"></div>
</div>

<div id="db-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('db-modal')">✕</span>
    <h1>ARŞİV</h1>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px"><input type="text" id="db-tag" placeholder="#etiket"><input type="text" id="db-name" placeholder="İsim"><input type="text" id="db-img" placeholder="Resim URL"></div>
    <button onclick="saveDB()" style="width:100%; padding:15px; background:var(--accent); border:none; font-weight:bold; border-radius:10px;">EKLE</button>
    <div id="db-list" style="margin-top:20px; display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:15px"></div>
</div>

<audio id="pa"></audio><audio id="pb"></audio>

<script>
    const SYNC_URL = "https://script.google.com/macros/s/AKfycby-ViBklGLN-VCfeI_GdJk3Yy9Im9FA4CBDJCk7FHK5SgAXldoyFE8SgaL0eZejK0_3/exec";
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let playlists = JSON.parse(localStorage.getItem('u_pl')) || {}, artistDB = JSON.parse(localStorage.getItem('u_db')) || {};
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {}, currentIdx = 0, activeP = 'a', cfS = 3;
    let isShuffle = false, repeatMode = 0, playbackSpeed = 1.0, sleepTimer = null;

    const pa = document.getElementById('pa'), pb = document.getElementById('pb');

    async function init() {
        await syncFromCloud();
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url?.includes('http'));
        
        showView('all'); 
        updateDBUI(); 
        updatePLUI();
        initSortable();
        requestAnimationFrame(sync);
    }

    function toggleEditMode() {
        document.body.classList.toggle('edit-mode');
        const btn = document.getElementById('edit-btn');
        btn.classList.toggle('active');
        btn.innerText = document.body.classList.contains('edit-mode') ? "✅ TAMAM" : "✍️ DÜZENLE";
        if(!document.body.classList.contains('edit-mode')) syncToCloud();
    }

    function initSortable() {
        Sortable.create(document.getElementById('song-body'), {
            handle: '.drag-handle', animation: 150,
            onEnd: function (evt) {
                const movedItem = currentQueue.splice(evt.oldIndex, 1)[0];
                currentQueue.splice(evt.newIndex, 0, movedItem);
            }
        });
    }

    function playIdx(i, isManual = true) {
        if(i < 0 || i >= currentQueue.length) return;
        currentIdx = i; const s = currentQueue[currentIdx];
        const cur = activeP === 'a' ? pa : pb;
        const other = activeP === 'a' ? pb : pa;
        if(isManual) { 
            other.pause(); other.currentTime = 0; 
            cur.src = s.url; cur.playbackRate = playbackSpeed;
            cur.play().catch(e => console.log("Oynatma hatası:", e)); 
        }
        updateUI(s);
    }

    function sync() {
        const cur = activeP === 'a' ? pa : pb;
        if(!cur.paused && cur.duration) {
            const perc = (cur.currentTime/cur.duration*100) + "%";
            document.getElementById('pc-fill').style.width = document.getElementById('m-fill').style.width = perc;
            document.getElementById('pc-cur').innerText = document.getElementById('m-cur').innerText = formatT(cur.currentTime);
            document.getElementById('pc-dur').innerText = document.getElementById('m-dur').innerText = formatT(cur.duration);
            
            if(cur.duration - cur.currentTime <= cfS && !cur.dataset.fading && cfS > 0) {
                cur.dataset.fading = "true"; crossFade();
            }
        }
        // Şarkı bittiğinde (eğer crossfade kapalıysa veya hata olduysa)
        if(cur.ended && !cur.dataset.fading) {
            if(repeatMode === 2) playIdx(currentIdx); // Tekrarla
            else manualNext();
        }
        document.querySelectorAll('.play-sync').forEach(b => b.innerText = cur.paused ? '▶' : '⏸');
        requestAnimationFrame(sync);
    }

    function crossFade() {
        const oldP = activeP === 'a' ? pa : pb;
        activeP = activeP === 'a' ? 'b' : 'a';
        const newP = activeP === 'a' ? pa : pb;

        if(repeatMode !== 2) {
            if(isShuffle) currentIdx = Math.floor(Math.random() * currentQueue.length);
            else currentIdx = (currentIdx + 1) % currentQueue.length;
        }

        const s = currentQueue[currentIdx];
        newP.src = s.url; newP.playbackRate = playbackSpeed; newP.volume = 0; newP.play();
        
        let v = 0;
        let int = setInterval(() => {
            v += 0.05;
            if(v >= 1) { clearInterval(int); oldP.pause(); oldP.dataset.fading = ""; newP.volume = 1; }
            else { newP.volume = v; oldP.volume = 1-v; }
        }, (cfS*1000)/20);
        updateUI(s);
    }

    function toggleShuffle() { 
        isShuffle = !isShuffle; 
        document.getElementById('shuf-btn').style.opacity = isShuffle ? "1" : "0.5";
        document.getElementById('shuf-btn').classList.toggle('active', isShuffle);
    }
    
    function toggleRepeat() { 
        repeatMode = (repeatMode + 1) % 3; 
        const btn = document.getElementById('rep-btn');
        btn.style.opacity = repeatMode === 0 ? "0.5" : "1";
        btn.innerText = repeatMode === 2 ? "🔂" : "🔁";
    }

    function updateUI(s) {
        document.getElementById('bar-title').innerText = document.getElementById('det-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = document.getElementById('det-artist').innerText = s.artist;
        const m = songMeta[s.url] || { art: '', credits: '', desc: '' };
        
        const artHTML = m.art ? `<img src="${m.art}" onerror="this.src=''">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#111; color:#333; font-size:40px;">🎵</div>`;
        document.getElementById('main-art').innerHTML = artHTML;
        document.getElementById('mini-art').innerHTML = artHTML;
        
        document.getElementById('credits-input').value = m.credits || "";
        document.getElementById('desc-input').value = m.desc || "";
        applyTheme(m.art); parseHashtags(); renderSongs();
    }

    async function syncToCloud() {
        const data = { u_f: localStorage.getItem('u_f'), u_pl: localStorage.getItem('u_pl'), u_db: localStorage.getItem('u_db'), u_m: localStorage.getItem('u_m') };
        try {
            await fetch(SYNC_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            document.getElementById('sync-status').innerText = "✅ Bulut Güncel";
        } catch(e) { document.getElementById('sync-status').innerText = "❌ Senkronizasyon Hatası"; }
    }

    async function syncFromCloud() {
        try {
            const res = await fetch(SYNC_URL);
            const cloudData = await res.json();
            if(cloudData) {
                if(cloudData.u_f) { localStorage.setItem('u_f', cloudData.u_f); favorites = JSON.parse(cloudData.u_f); }
                if(cloudData.u_pl) { localStorage.setItem('u_pl', cloudData.u_pl); playlists = JSON.parse(cloudData.u_pl); }
                if(cloudData.u_db) { localStorage.setItem('u_db', cloudData.u_db); artistDB = JSON.parse(cloudData.u_db); }
                if(cloudData.u_m) { localStorage.setItem('u_m', cloudData.u_m); songMeta = JSON.parse(cloudData.u_m); }
            }
        } catch(e) { console.log("Bulut boş."); }
    }

    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIdx===i?'playing':''}" onclick="playIdx(${i}, true)">
                <div class="drag-handle">⣿</div>
                <div class="song-title">${s.title}</div>
                <div class="song-artist">${s.artist}</div>
                <div onclick="event.stopPropagation(); toggleFav('${s.url}')" style="text-align:right;">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }

    // Diğer yardımcı fonksiyonlar (Aynı kalıyor)
    function toggleLeft() { document.body.classList.toggle('left-open'); }
    function toggleRight(f) { const p=document.getElementById('right-panel'); const o=f!==undefined?f:!p.classList.contains('open'); p.classList.toggle('open',o); if(window.innerWidth>768)document.body.classList.toggle('right-open',o); }
    function toggleModal(id) { const m=document.getElementById(id); m.style.display=m.style.display==='block'?'none':'block'; }
    function manualNext() { if(isShuffle) playIdx(Math.floor(Math.random()*currentQueue.length)); else playIdx((currentIdx+1)%currentQueue.length); }
    function manualPrev() { playIdx((currentIdx-1+currentQueue.length)%currentQueue.length); }
    function togglePlay() { const c=activeP==='a'?pa:pb; c.paused?c.play():c.pause(); }
    function seek(e) { (activeP==='a'?pa:pb).currentTime=(e.offsetX/e.currentTarget.offsetWidth)*(activeP==='a'?pa:pb).duration; }
    function formatT(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function setVol(v) { pa.volume=pb.volume=v; }
    function toggleSpeed() { const sp=[1, 1.25, 1.5, 2, 0.75]; playbackSpeed=sp[(sp.indexOf(playbackSpeed)+1)%sp.length]; pa.playbackRate=pb.playbackRate=playbackSpeed; document.getElementById('speed-indicator').innerText=playbackSpeed+"x"; }
    function updateCF(v) { cfS=parseInt(v); document.getElementById('cf-val').innerText=v; }
    function setSleepTimer(v) { if(sleepTimer)clearTimeout(sleepTimer); if(v>0) { document.getElementById('timer-val').innerText=v; sleepTimer=setTimeout(()=>{pa.pause();pb.pause();}, v*60000); } else document.getElementById('timer-val').innerText="Kapalı"; }
    function toggleFav(u) { favorites.includes(u)?favorites=favorites.filter(x=>x!==u):favorites.push(u); localStorage.setItem('u_f', JSON.stringify(favorites)); renderSongs(); syncToCloud(); }
    function updateArt() { const u=prompt("Fotoğraf URL:"); if(u){ const s=currentQueue[currentIdx]; songMeta[s.url] = songMeta[s.url] || {}; songMeta[s.url].art = u; localStorage.setItem('u_m', JSON.stringify(songMeta)); updateUI(s); syncToCloud(); } }
    function saveMeta() { const s=currentQueue[currentIdx]; if(s){ songMeta[s.url] = songMeta[s.url] || {}; songMeta[s.url].credits=document.getElementById('credits-input').value; songMeta[s.url].desc=document.getElementById('desc-input').value; localStorage.setItem('u_m', JSON.stringify(songMeta)); syncToCloud(); } }
    function showView(t, el) { document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active')); if(el)el.classList.add('active'); currentQueue=t==='all'?[...allSongs]:allSongs.filter(s=>favorites.includes(s.url)); renderSongs(); }
    function parseHashtags() { const v=document.getElementById('credits-input').value, t=v.match(/#(\w+)/g)||[]; document.getElementById('artist-chips').innerHTML=t.map(x=>{const a=artistDB[x.substring(1).toLowerCase()]; return a?`<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);padding:5px 10px;border-radius:20px;font-size:11px;"><img src="${a.img}" style="width:20px;height:20px;border-radius:50%;object-fit:cover">${a.name}</div>`:''}).join(''); saveMeta(); }
    function createPL() { const n=document.getElementById('pl-name').value; if(n){playlists[n]=[]; localStorage.setItem('u_pl', JSON.stringify(playlists)); updatePLUI(); syncToCloud();}}
    function updatePLUI() { document.getElementById('sidebar-playlists').innerHTML = Object.keys(playlists).map(k=>`<div class="pl-item" onclick="showPL('${k}')"># ${k}</div>`).join(''); }
    function showPL(n) { currentQueue=allSongs.filter(s=>playlists[n].includes(s.url)); document.getElementById('view-title').innerText=n; renderSongs(); }
    function saveDB() { const t=document.getElementById('db-tag').value.toLowerCase().replace('#',''), n=document.getElementById('db-name').value, i=document.getElementById('db-img').value; if(t&&n){artistDB[t]={name:n, img:i}; localStorage.setItem('u_db', JSON.stringify(artistDB)); updateDBUI(); syncToCloud();}}
    function updateDBUI() { document.getElementById('db-list').innerHTML = Object.keys(artistDB).map(k=>`<div style="text-align:center;padding:10px;background:rgba(255,255,255,0.05);border-radius:10px"><img src="${artistDB[k].img}" style="width:40px;height:40px;border-radius:50%;object-fit:cover"><div style="font-size:10px;margin-top:5px">#${k}</div></div>`).join(''); }
    function applyTheme(u) { if(u) { document.getElementById('aurora').style.opacity = "0.6"; } }

    window.onload = init;
</script>
</body>
</html>
