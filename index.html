<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usta-ify Universal Cloud v25.0</title>
    <link id="main-font-link" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --accent-dark: #0a0a0a; --accent-mid: rgba(0, 242, 255, 0.4); --bg: #050505; --text: #fff; --f-size: 14px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: var(--f-size); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #bg-grad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, var(--accent) -70%, var(--bg) 90%); opacity: 0.2; pointer-events: none; z-index: 0; }

        /* SIDEBAR */
        #sidebar { 
            width: 280px; background: #000; border-right: 1px solid var(--accent-dark); 
            display: flex; flex-direction: column; z-index: 5000; overflow-y: auto; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-link { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; opacity: 0.6; }
        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--accent); }
        .pl-item { padding: 8px 55px; font-size: 0.85em; opacity: 0.5; cursor: pointer; }
        .pl-item:hover { opacity: 1; color: var(--accent); }

        /* MAIN CONTENT */
        #main-content { 
            flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 160px; z-index: 1; 
            transition: all 0.5s ease; position: relative;
        }
        body.right-open #main-content { margin-right: 380px; }
        body.left-open #main-content { margin-left: 280px; }

        .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--accent-mid); border-radius: 20px; padding: 10px 20px; color: #fff; width: 250px; outline: none; }
        .song-row { display: grid; grid-template-columns: 40px 2fr 1fr 100px; padding: 12px 20px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; }
        .song-row.playing { background: var(--accent-mid); color: var(--accent); }

        /* PANELS */
        #right-panel { 
            width: 380px; background: #080808; border-left: 1px solid var(--accent-mid); 
            position: fixed; top: 0; right: 0; bottom: 0; transform: translateX(100%); 
            z-index: 4000; padding: 30px; overflow-y: auto; transition: transform 0.5s ease;
        }
        #right-panel.open { transform: translateX(0); }

        /* MODALS */
        .full-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; padding: 60px; backdrop-filter: blur(20px); }
        .close-x { position: absolute; top: 30px; right: 40px; font-size: 35px; cursor: pointer; }

        /* PLAYER BAR */
        #player-bar { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 80%; height: 95px; background: rgba(15,15,15,0.95); border-radius: 50px; 
            border: 1px solid var(--accent-mid); display: flex; align-items: center; padding: 0 40px; z-index: 1000;
        }
        .bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin: 0 20px; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 15px var(--accent); }

        /* MOBILE OVERRIDES */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; height: 100%; }
            body.left-open #sidebar { transform: translateX(280px); }
            body.left-open #main-content { margin-left: 0; transform: translateX(200px); opacity: 0.5; }
            #main-content { padding: 80px 20px; }
            .song-row { grid-template-columns: 30px 1fr 50px; }
            .song-row div:nth-child(3) { display: none; }
            #right-panel { width: 100%; transform: translateY(100%); border-left: none; background: #000; z-index: 7000; }
            #right-panel.open { transform: translateY(0); }
            #player-bar { width: 92%; padding: 0 15px; height: 75px; border-radius: 15px; }
            #player-bar .bar-bg, #player-bar .ctrl-btn:not(#play-btn) { display: none; }
            .mobile-controls { display: block !important; }
            .pc-controls { display: none !important; }
        }

        .mobile-controls { display: none; margin-top: 20px; }
        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; border: 1px solid var(--accent-mid); }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body id="main-body">

<div id="bg-grad"></div>

<div onclick="toggleLeft()" style="position:fixed; top:25px; left:25px; z-index:5500; font-size:28px; cursor:pointer;">☰</div>

<div id="sidebar">
    <div style="padding: 40px 30px; font-weight: 900; color: var(--accent); font-size: 22px;">USTA-IFY CLOUD</div>
    <div class="nav-link active" onclick="showView('all', this)"><span>🏠</span> HAVUZ</div>
    <div class="nav-link" onclick="showView('fav', this)"><span>💖</span> FAVORİLER</div>
    <div class="nav-link" onclick="toggleModal('playlist-modal')"><span>📂</span> LİSTELER</div>
    <div id="sidebar-playlists"></div>
    <div style="margin-top: auto; padding-bottom: 30px;">
        <div class="nav-link" onclick="toggleModal('db-modal')"><span>👤</span> ARŞİV</div>
        <div class="nav-link" onclick="toggleModal('settings-modal')"><span>⚙️</span> AYARLAR</div>
    </div>
</div>

<div id="main-content">
    <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-bottom: 30px;">
        <h1 id="view-title" style="font-size: 40px; font-weight: 900; margin:0;">HAVUZ</h1>
        <input type="text" id="search-input" class="search-box" placeholder="🔍 Şarkı Ara..." oninput="filterSongs()">
        <span id="sync-status" style="font-size: 10px; opacity: 0.5;"></span>
    </div>
    <div id="song-body"></div>
</div>

<div id="right-panel">
    <div style="width:40px; height:5px; background:rgba(255,255,255,0.2); border-radius:10px; margin: 0 auto 20px auto; cursor:pointer;" onclick="toggleRight(false)"></div>
    <span class="close-x" onclick="toggleRight(false)">✕</span>
    <div class="premium-art" id="main-art" onclick="updateArt()"></div>
    <div style="text-align: center; margin: 20px 0;">
        <h2 id="det-title" style="margin:0;">Şarkı Seçilmedi</h2>
        <p id="det-artist" style="opacity:0.5; margin:5px 0;">Usta-ify</p>
    </div>
    <div id="artist-chips" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px; margin-bottom:20px;"></div>

    <div class="mobile-controls">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
            <span id="m-cur">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div class="bar-fill" id="m-fill"></div></div>
            <span id="m-dur">0:00</span>
        </div>
        <div style="display:flex; justify-content:center; align-items:center; gap:30px;">
            <span onclick="toggleShuffle()" class="ctrl-btn shuf-sync">🔀</span>
            <span onclick="manualPrev()" style="font-size:35px;">⏮</span>
            <div onclick="togglePlay()" class="play-sync" style="width:70px; height:70px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px;">▶</div>
            <span onclick="manualNext()" style="font-size:35px;">⏭</span>
            <span onclick="toggleRepeat()" class="rep-sync">🔁</span>
        </div>
    </div>

    <input type="text" id="credits-input" style="background:rgba(255,255,255,0.05); border:1px dashed var(--accent-mid); color:#fff; width:100%; padding:12px; border-radius:10px; margin-top:30px;" placeholder="#etiket ekle..." oninput="parseHashtags()">
    <textarea id="desc-input" style="background:transparent; border:none; color:#fff; width:100%; height:100px; margin-top:15px; opacity:0.4; font-size:13px;" placeholder="Notlar..." oninput="saveMeta()"></textarea>
</div>

<div id="player-bar" class="pc-controls">
    <div style="width:250px; display:flex; align-items:center; gap:12px; cursor:pointer;" onclick="toggleRight(true)">
        <div id="mini-art" style="width:48px; height:48px; border-radius:10px; background:#222; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:900; font-size:13px; white-space:nowrap">Şarkı Seç</div>
            <div id="bar-artist" style="font-size:10px; opacity:0.5">Usta-ify</div>
        </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:5px">
            <span onclick="toggleShuffle()" class="ctrl-btn shuf-sync">🔀</span>
            <span onclick="manualPrev()" class="ctrl-btn" style="font-size:24px">⏮</span>
            <div onclick="togglePlay()" class="play-sync" style="width:42px; height:42px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer">▶</div>
            <span onclick="manualNext()" class="ctrl-btn" style="font-size:24px">⏭</span>
            <span onclick="toggleRepeat()" class="ctrl-btn rep-sync">🔁</span>
        </div>
        <div style="width:100%; display:flex; align-items:center">
            <span id="pc-cur" style="font-size:10px; opacity:0.5;">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div class="bar-fill" id="pc-fill"></div></div>
            <span id="pc-dur" style="font-size:10px; opacity:0.5;">0:00</span>
        </div>
    </div>
    <div style="width:150px; text-align:right">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)" style="accent-color:var(--accent); width:70px">
    </div>
</div>

<div id="settings-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('settings-modal')">✕</span>
    <h1>AYARLAR & BULUT</h1>
    <div style="max-width:400px; display:flex; flex-direction:column; gap:20px">
        <button onclick="syncFromCloud()" style="padding:15px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">BULUTTAN VERİLERİ ŞİMDİ ÇEK</button>
        <div><label>Manuel Renk</label> <input type="color" id="manual-color" value="#00f2ff" oninput="applyTheme()"></div>
        <div><label>Crossfade (sn): <span id="cf-val">3</span></label> <input type="range" min="0" max="10" value="3" oninput="updateCF(this.value)"></div>
    </div>
</div>

<div id="playlist-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('playlist-modal')">✕</span>
    <h1>LİSTELER</h1>
    <div style="display:flex; gap:10px; margin-bottom:20px"><input type="text" id="pl-name" placeholder="Liste Adı..." style="background:#111; color:#fff; border:1px solid #333; padding:15px; flex:1; border-radius:10px;"><button onclick="createPL()" style="background:var(--accent); border:none; padding:0 30px; border-radius:10px; font-weight:bold;">EKLE</button></div>
    <div id="pl-list-modal" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:15px"></div>
</div>

<div id="db-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('db-modal')">✕</span>
    <h1>ARŞİV</h1>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px"><input type="text" id="db-tag" placeholder="#etiket"><input type="text" id="db-name" placeholder="İsim"><input type="text" id="db-img" placeholder="Resim URL"></div>
    <button onclick="saveDB()" style="width:100%; padding:15px; background:var(--accent); border:none; font-weight:bold; border-radius:10px;">SANATÇI EKLE</button>
    <div id="db-list" style="margin-top:20px; display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:15px"></div>
</div>

<audio id="pa"></audio><audio id="pb"></audio>

<script>
    const SYNC_URL = "https://script.google.com/macros/s/AKfycby-ViBklGLN-VCfeI_GdJk3Yy9Im9FA4CBDJCk7FHK5SgAXldoyFE8SgaL0eZejK0_3/exec";
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let playlists = JSON.parse(localStorage.getItem('u_pl')) || {}, artistDB = JSON.parse(localStorage.getItem('u_db')) || {};
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {}, currentIdx = 0, activeP = 'a', cfS = 3;
    let isShuffle = false, repeatMode = 0;

    const pa = document.getElementById('pa'), pb = document.getElementById('pb');

    async function init() {
        // 1. Önce buluttaki verileri çek
        await syncFromCloud();
        
        // 2. Şarkı listesini çek
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url?.includes('http'));
        
        showView('all'); updateDBUI(); updatePLUI();
        requestAnimationFrame(sync);
    }

    // --- BULUT SENKRONİZASYON FONKSİYONLARI ---
    async function syncToCloud() {
        document.getElementById('sync-status').innerText = "☁️ Senkronize ediliyor...";
        const data = {
            u_f: localStorage.getItem('u_f'),
            u_pl: localStorage.getItem('u_pl'),
            u_db: localStorage.getItem('u_db'),
            u_m: localStorage.getItem('u_m')
        };
        try {
            await fetch(SYNC_URL, {
                method: 'POST',
                mode: 'no-cors', // Apps Script CORS için gerekli
                body: JSON.stringify(data)
            });
            setTimeout(() => { document.getElementById('sync-status').innerText = "✅ Bulut Güncel"; }, 1000);
        } catch(e) {
            document.getElementById('sync-status').innerText = "❌ Senkronizasyon Hatası";
        }
    }

    async function syncFromCloud() {
        try {
            const res = await fetch(SYNC_URL);
            const cloudData = await res.json();
            if(cloudData) {
                if(cloudData.u_f) { localStorage.setItem('u_f', cloudData.u_f); favorites = JSON.parse(cloudData.u_f); }
                if(cloudData.u_pl) { localStorage.setItem('u_pl', cloudData.u_pl); playlists = JSON.parse(cloudData.u_pl); }
                if(cloudData.u_db) { localStorage.setItem('u_db', cloudData.u_db); artistDB = JSON.parse(cloudData.u_db); }
                if(cloudData.u_m) { localStorage.setItem('u_m', cloudData.u_m); songMeta = JSON.parse(cloudData.u_m); }
                updatePLUI(); updateDBUI();
            }
        } catch(e) { console.log("Bulut verisi çekilemedi veya boş."); }
    }

    function toggleLeft() { document.body.classList.toggle('left-open'); }
    function toggleRight(force) { 
        const p = document.getElementById('right-panel');
        const open = force !== undefined ? force : !p.classList.contains('open');
        p.classList.toggle('open', open);
        if(window.innerWidth > 768) document.body.classList.toggle('right-open', open);
    }
    function toggleModal(id) { const m = document.getElementById(id); m.style.display = m.style.display === 'block' ? 'none' : 'block'; if(window.innerWidth<768) toggleLeft(); }

    function playIdx(i, isManual = true) {
        currentIdx = i; const s = currentQueue[currentIdx];
        const cur = activeP === 'a' ? pa : pb;
        const other = activeP === 'a' ? pb : pa;
        if(isManual) { other.pause(); other.currentTime = 0; cur.src = s.url; cur.volume = 1; cur.play(); }
        updateUI(s);
        toggleRight(true);
    }

    function sync() {
        const cur = activeP === 'a' ? pa : pb;
        if(!cur.paused && cur.duration) {
            const perc = (cur.currentTime/cur.duration*100) + "%";
            document.getElementById('pc-fill').style.width = document.getElementById('m-fill').style.width = perc;
            document.getElementById('pc-cur').innerText = document.getElementById('m-cur').innerText = formatT(cur.currentTime);
            document.getElementById('pc-dur').innerText = document.getElementById('m-dur').innerText = formatT(cur.duration);
            if(cur.duration - cur.currentTime <= cfS && !cur.dataset.fading && cfS > 0) {
                cur.dataset.fading = "true"; crossFade();
            }
        }
        document.querySelectorAll('.play-sync').forEach(b => b.innerText = cur.paused ? '▶' : '⏸');
        requestAnimationFrame(sync);
    }

    function crossFade() {
        const oldP = activeP === 'a' ? pa : pb;
        activeP = activeP === 'a' ? 'b' : 'a';
        const newP = activeP === 'a' ? pa : pb;
        if(isShuffle) currentIdx = Math.floor(Math.random()*currentQueue.length);
        else if(repeatMode !== 2) currentIdx = (currentIdx + 1) % currentQueue.length;
        const s = currentQueue[currentIdx];
        newP.src = s.url; newP.volume = 0; newP.play();
        let v = 0;
        let int = setInterval(() => {
            v += 0.05;
            if(v >= 1) { clearInterval(int); oldP.pause(); oldP.dataset.fading = ""; newP.volume = 1; }
            else { newP.volume = v; oldP.volume = 1-v; }
        }, (cfS*1000)/20);
        updateUI(s);
    }

    function updateUI(s) {
        document.getElementById('bar-title').innerText = document.getElementById('det-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = document.getElementById('det-artist').innerText = s.artist;
        const m = songMeta[s.url] || { art: '', credits: '', desc: '' };
        document.getElementById('main-art').innerHTML = m.art ? `<img src="${m.art}">` : '';
        document.getElementById('mini-art').innerHTML = m.art ? `<img src="${m.art}" style="width:100%;height:100%;object-fit:cover">` : '';
        document.getElementById('credits-input').value = m.credits || "";
        document.getElementById('desc-input').value = m.desc || "";
        applyTheme(m.art); parseHashtags(); renderSongs();
    }

    function applyTheme(imgUrl = null) {
        const manual = document.getElementById('manual-color').value;
        if(imgUrl) {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = imgUrl;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 1; canvas.height = 1; ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const col = `rgb(${r},${g},${b})`;
                document.documentElement.style.setProperty('--accent', col);
                document.documentElement.style.setProperty('--accent-dark', `rgb(${r/4},${g/4},${b/4})`);
                document.documentElement.style.setProperty('--accent-mid', `rgba(${r},${g},${b}, 0.3)`);
            };
        } else {
            document.documentElement.style.setProperty('--accent', manual);
        }
    }

    function filterSongs() { const t = document.getElementById('search-input').value.toLowerCase(); currentQueue = allSongs.filter(s => s.title.toLowerCase().includes(t) || s.artist.toLowerCase().includes(t)); renderSongs(); }
    function showView(t, el) { 
        document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active')); if(el) el.classList.add('active');
        document.getElementById('view-title').innerText = t==='all'?'HAVUZ':'FAVORİLER';
        currentQueue = t==='all'?[...allSongs]:allSongs.filter(s=>favorites.includes(s.url)); renderSongs();
        if(window.innerWidth < 768) toggleLeft();
    }
    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIdx===i?'playing':''}" onclick="playIdx(${i}, true)">
                <div style="opacity:0.3">${i+1}</div>
                <div style="font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.title}</div>
                <div style="opacity:0.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.artist}</div>
                <div onclick="event.stopPropagation(); toggleFav('${s.url}')" style="text-align:right">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }

    function createPL() { 
        const n = document.getElementById('pl-name').value; 
        if(n && !playlists[n]) { 
            playlists[n] = []; localStorage.setItem('u_pl', JSON.stringify(playlists)); 
            updatePLUI(); syncToCloud();
        } 
    }
    function updatePLUI() {
        document.getElementById('sidebar-playlists').innerHTML = Object.keys(playlists).map(k => `<div class="pl-item" onclick="showPL('${k}')"># ${k}</div>`).join('');
        document.getElementById('pl-list-modal').innerHTML = Object.keys(playlists).map(k => `<div style="background:#111; padding:20px; border-radius:15px; text-align:center;"><div>${k}</div><div onclick="showPL('${k}')" style="color:var(--accent); cursor:pointer; margin-top:10px">AÇ</div></div>`).join('');
    }
    function showPL(name) { currentQueue = allSongs.filter(s => playlists[name].includes(s.url)); document.getElementById('view-title').innerText = name; renderSongs(); toggleModal('playlist-modal'); }

    function togglePlay() { const c = activeP==='a'?pa:pb; c.paused ? c.play() : c.pause(); }
    function manualNext() { playIdx((currentIdx + 1) % currentQueue.length, true); }
    function manualPrev() { playIdx((currentIdx - 1 + currentQueue.length) % currentQueue.length, true); }
    function seek(e) { (activeP==='a'?pa:pb).currentTime = (e.offsetX / e.currentTarget.offsetWidth) * (activeP==='a'?pa:pb).duration; }
    function toggleShuffle() { isShuffle = !isShuffle; document.querySelectorAll('.shuf-sync').forEach(b => b.classList.toggle('active', isShuffle)); }
    function toggleRepeat() { repeatMode = (repeatMode+1)%3; document.querySelectorAll('.rep-sync').forEach(b => b.innerText = repeatMode===2?'🔂':'🔁'); }
    function setVol(v) { pa.volume = pb.volume = v; }
    function formatT(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function updateCF(v) { cfS = parseInt(v); document.getElementById('cf-val').innerText = v; }
    function toggleFav(u) { 
        favorites.includes(u)?favorites=favorites.filter(x=>x!==u):favorites.push(u); 
        localStorage.setItem('u_f', JSON.stringify(favorites)); 
        renderSongs(); syncToCloud();
    }
    function updateArt() { const u=prompt("URL:"); if(u){ document.getElementById('main-art').innerHTML=`<img src="${u}">`; saveMeta(); applyTheme(u); } }
    function saveMeta() { 
        const s=currentQueue[currentIdx]; 
        if(s) { 
            const img=document.querySelector('#main-art img'); 
            songMeta[s.url]={art:img?img.src:'', credits:document.getElementById('credits-input').value, desc:document.getElementById('desc-input').value}; 
            localStorage.setItem('u_m', JSON.stringify(songMeta)); 
            syncToCloud();
        } 
    }
    function saveDB() { 
        const t=document.getElementById('db-tag').value.toLowerCase().replace('#',''), n=document.getElementById('db-name').value, i=document.getElementById('db-img').value; 
        if(t&&n){ 
            artistDB[t]={name:n, img:i}; 
            localStorage.setItem('u_db', JSON.stringify(artistDB)); 
            updateDBUI(); syncToCloud();
        } 
    }
    function updateDBUI() { document.getElementById('db-list').innerHTML = Object.keys(artistDB).map(k=>`<div style="text-align:center; background:rgba(255,255,255,0.03); padding:10px; border-radius:10px"><img src="${artistDB[k].img}" style="width:40px;height:40px;border-radius:50%"><div style="font-size:10px;font-weight:bold">#${k}</div></div>`).join(''); }
    function parseHashtags() {
        const val = document.getElementById('credits-input').value; const tags = val.match(/#(\w+)/g) || [];
        document.getElementById('artist-chips').innerHTML = tags.map(t => { const art = artistDB[t.substring(1).toLowerCase()]; return art ? `<div style="display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,0.1); padding:5px 12px; border-radius:20px; font-size:12px;"><img src="${art.img}" style="width:20px;height:20px;border-radius:50%"> ${art.name}</div>` : ''; }).join('');
    }

    window.onload = init;
</script>
</body>
</html>
