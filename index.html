<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta-ify Ghost Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* [ÖNCEKİ TEMEL STİLLER KORUNDU - SADECE YENİLER EKLENDİ] */
        :root { --neon: #00f2ff; --gold: #d4af37; --bg: #000; --panel: #080808; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #sidebar { width: 260px; background: #000; border-right: 1px solid #111; display: flex; flex-direction: column; flex-shrink: 0; z-index: 1001; }
        #sidebar.collapsed { width: 80px; }
        .nav-link { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #555; font-weight: 600; font-size: 14px; }
        .nav-link.active { color: var(--neon); border-left: 3px solid var(--neon); background: rgba(255,255,255,0.02); }

        #main-content { flex: 1; overflow-y: auto; background: radial-gradient(circle at 0% 0%, #111, #000); padding-bottom: 120px; }
        .song-row { display: grid; grid-template-columns: 50px 2fr 1fr 120px; padding: 15px 25px; border-radius: 12px; cursor: pointer; margin: 0 40px 5px; }
        .song-row.playing { border-color: var(--neon); color: var(--neon); background: rgba(0,242,255,0.02); }

        /* SAĞ PANEL - GİZLİ YAZIM ALANI */
        #right-panel { width: 380px; background: var(--panel); border-left: 1px solid #111; transform: translateX(100%); transition: 0.5s; }
        #right-panel.open { transform: translateX(0); }
        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; border: 1px solid #222; margin-bottom: 25px; cursor: pointer; }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }

        .artist-chip { display: inline-flex; align-items: center; background: #151515; border: 1px solid #222; padding: 6px 12px; border-radius: 25px; margin: 5px; font-size: 12px; font-weight: 600; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .artist-chip img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold); }

        /* GİZLİ GİRİŞ ALANI */
        .ghost-input-container { position: relative; margin-top: 10px; }
        .premium-input { background: #000; border: 1px solid #222; color: #fff; width: 100%; padding: 12px; border-radius: 10px; font-family: inherit; opacity: 0; }
        .ghost-input-container:hover .premium-input, .premium-input:focus { opacity: 1; border-color: var(--neon); }
        .label { font-size: 11px; font-weight: 800; color: var(--gold); letter-spacing: 2px; margin: 20px 0 10px; display: block; text-transform: uppercase; }

        /* PLAYER BAR */
        #player-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 95%; height: 95px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; padding: 0 40px; z-index: 2000; }
        .bar-bg { flex: 1; height: 5px; background: #222; border-radius: 10px; cursor: pointer; position: relative; margin: 0 20px; }
        .bar-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 15px var(--neon); }
        .modal-glass { position: fixed; background: rgba(10,10,10,0.95); border: 1px solid #222; border-radius: 25px; padding: 30px; z-index: 2000; display: none; width: 350px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 30px; display: flex; justify-content: space-between;">
        <span style="font-weight:800; color:var(--neon)">USTA-IFY</span>
        <span style="cursor:pointer" onclick="toggleSidebar()">≡</span>
    </div>
    <div class="nav-link active" onclick="showView('all', this)"><span>🏠</span><span>Ana Havuz</span></div>
    <div class="nav-link" onclick="showView('fav', this)"><span>💖</span><span>Favoriler</span></div>
    <div class="nav-link" onclick="toggleModal('history-modal')"><span>📜</span><span>Geçmiş</span></div>
    <div class="nav-link" onclick="toggleModal('settings-modal')"><span>⚙️</span><span>Ayarlar</span></div>
    <div class="nav-link" onclick="toggleRightPanel()"><span>📑</span><span>Detaylar</span></div>
</div>

<div id="main-content">
    <div style="padding:60px 40px 20px;"><h1 id="view-title" style="font-size: 50px; margin:0">Ana Havuz</h1></div>
    <div id="song-body"></div>
</div>

<div id="right-panel">
    <div style="padding: 30px; overflow-y: auto; height: 100%;">
        <div class="premium-art" onclick="updateArt()" id="main-art"></div>
        
        <span class="label">Emeği Geçenler</span>
        <div id="artist-chips" style="min-height: 40px; border-bottom: 1px solid #111; padding-bottom: 10px;"></div>
        
        <div class="ghost-input-container">
            <input type="text" class="premium-input" id="credits-input" placeholder="#etiket eklemek için buraya tıkla..." oninput="parseHashtags()">
        </div>

        <span class="label">Özel Notlar</span>
        <div class="ghost-input-container">
            <textarea class="premium-input" id="desc-input" style="height:80px; opacity: 1; background: transparent; border-style: dashed;" oninput="saveSongMeta()"></textarea>
        </div>

        <span class="label">Şarkı Sözleri</span>
        <div style="border: 1px dashed #222; padding: 20px; border-radius: 15px; text-align: center; color:#222; font-size: 11px;">Lyrics Canvas</div>
    </div>
</div>

<div id="player-bar">
    <div style="width:25%; display:flex; align-items:center; gap:15px">
        <div id="mini-art" style="width:50px; height:50px; background:#111; border-radius:10px; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:bold; font-size:14px;">Şarkı Seçin</div>
            <div id="bar-artist" style="font-size:11px; color:#444">Sanatçı</div>
        </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:10px">
            <span id="shuf-btn" onclick="toggleShuffle()" style="cursor:pointer; opacity:0.5">🔀</span>
            <span onclick="skip(-10)" style="cursor:pointer">⏪</span>
            <span onclick="prev()" style="cursor:pointer">⏮</span>
            <div id="play-btn" onclick="togglePlay()" style="width:50px; height:50px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; cursor:pointer">▶</div>
            <span onclick="next()" style="cursor:pointer">⏭</span>
            <span onclick="skip(10)" style="cursor:pointer">⏩</span>
            <span id="rep-btn" onclick="toggleRepeat()" style="cursor:pointer; opacity:0.5">🔁</span>
        </div>
        <div style="width:100%; display:flex; align-items:center">
            <span id="cur-time" style="font-size:10px; color:#444">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div id="bar-fill" class="bar-fill"></div></div>
            <span id="dur-time" style="font-size:10px; color:#444">0:00</span>
        </div>
    </div>
    <div style="width:25%; display:flex; justify-content:flex-end; align-items:center; gap:15px">
        <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)" style="width:80px; accent-color:var(--neon)">
    </div>
</div>

<div id="settings-modal" class="modal-glass" style="bottom:130px; right:40px">
    <h3 style="color:var(--neon); margin:0 0 15px 0">⚙️ Ayarlar</h3>
    <label style="font-size:12px">Crossfade Süresi: <span id="cf-val">3</span>s</label>
    <input type="range" min="0" max="15" value="3" style="width:100%; margin-top:10px" oninput="updateCF(this.value)">
</div>

<div id="history-modal" class="modal-glass" style="bottom:130px; left:40px">
    <h3 style="color:var(--neon); margin:0 0 15px 0">📜 Geçmiş</h3>
    <div id="hist-content" style="max-height:250px; overflow-y:auto;"></div>
</div>

<audio id="a1"></audio><audio id="a2"></audio>

<script>
    /* --- ARTIST DATABASE (BURAYI DİLEDİĞİN GİBİ DOLDUR) --- */
    const artistDB = {
        "sago": { name: "Sagopa Kajmer", img: "https://i.ibb.co/Xz9kH3p/sago.jpg" },
        "ceza": { name: "Ceza", img: "https://i.ibb.co/9V0n7M5/ceza.jpg" },
        "kolera": { name: "Kolera", img: "https://i.ibb.co/ZxbL6fJ/kolera.jpg" },
        "contra": { name: "Contra", img: "https://i.ibb.co/6y4M5S3/contra.jpg" }
    };

    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {}, history = JSON.parse(localStorage.getItem('u_h')) || [];
    let currentIndex = 0, activePlayer = 1, cfS = 3, isShuffle = false, repeatMode = 0, shufPool = [];

    const a1 = document.getElementById('a1'), a2 = document.getElementById('a2');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v || "İsimsiz", artist: r.c[1]?.v || "Bilinmiyor", url: r.c[2]?.v || "" })).filter(s => s.url.includes('http'));
        showView('all');
    }

    function playIdx(i) {
        currentIndex = i; const s = currentQueue[currentIndex];
        const p = activePlayer === 1 ? a1 : a2;
        p.src = s.url; p.volume = 1; p.play();
        document.getElementById('play-btn').innerText = "⏸";
        document.getElementById('bar-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = s.artist;
        loadMeta(s.url);
        if(!document.getElementById('right-panel').classList.contains('open')) toggleRightPanel();
        addHist(s.title);
        track(p);
        renderSongs();
    }

    /* --- GELİŞMİŞ CROSSFADE (SES YAVAŞLAMA VE YÜKSELME) --- */
    function track(p) {
        p.ontimeupdate = () => {
            document.getElementById('bar-fill').style.width = (p.currentTime/p.duration*100) + "%";
            document.getElementById('cur-time').innerText = formatT(p.currentTime);
            document.getElementById('dur-time').innerText = formatT(p.duration);
            
            if (p.duration && p.duration - p.currentTime <= cfS && cfS > 0) {
                p.ontimeupdate = null; 
                crossFadeNext();
            }
        };
        p.onended = () => { if(cfS <= 0) next(); };
    }

    function crossFadeNext() {
        const oldP = activePlayer === 1 ? a1 : a2;
        activePlayer = activePlayer === 1 ? 2 : 1;
        const newP = activePlayer === 1 ? a1 : a2;
        
        // Sıradaki şarkıyı belirle
        if(repeatMode !== 2) {
            if(isShuffle) {
                if(shufPool.length === 0) shufPool = Array.from({length: currentQueue.length}, (_, i) => i);
                currentIndex = shufPool.splice(Math.floor(Math.random()*shufPool.length), 1)[0];
            } else { currentIndex = (currentIndex + 1) % currentQueue.length; }
        }

        newP.src = currentQueue[currentIndex].url;
        newP.volume = 0; // Sıfırdan başla
        newP.play();

        const step = 0.05; // Ses değişim hızı
        const interval = (cfS * 1000) / (1 / step); // Geçiş süresine göre ayarla

        let fade = setInterval(() => {
            if (newP.volume < 0.95) {
                newP.volume = Math.min(1, newP.volume + step);
                oldP.volume = Math.max(0, oldP.volume - step);
            } else {
                clearInterval(fade);
                oldP.pause();
                oldP.volume = 1;
                newP.volume = 1;
                track(newP);
                updateUI();
            }
        }, interval);
    }

    // [HASHTAG VE DİĞER FONKSİYONLAR]
    function parseHashtags() {
        const text = document.getElementById('credits-input').value;
        const chips = document.getElementById('artist-chips');
        const tags = text.match(/#(\w+)/g) || [];
        chips.innerHTML = tags.map(t => {
            const key = t.substring(1).toLowerCase();
            const artist = artistDB[key];
            return artist ? `<div class="artist-chip"><img src="${artist.img}"> ${artist.name}</div>` : `<div class="artist-chip">#${key}</div>`;
        }).join('');
        saveSongMeta();
    }

    function loadMeta(url) {
        const m = songMeta[url] || { art: '', credits: '', desc: '' };
        document.getElementById('credits-input').value = m.credits;
        document.getElementById('desc-input').value = m.desc;
        document.getElementById('main-art').innerHTML = m.art ? `<img src="${m.art}">` : `<div style="padding:20px; text-align:center; color:#333">Kapak Yok</div>`;
        document.getElementById('mini-art').innerHTML = m.art ? `<img src="${m.art}" style="width:100%;height:100%;object-fit:cover">` : '';
        parseHashtags();
    }

    function saveSongMeta() {
        const url = currentQueue[currentIndex].url;
        const img = document.querySelector('#main-art img');
        songMeta[url] = { art: img?img.src:'', credits: document.getElementById('credits-input').value, desc: document.getElementById('desc-input').value };
        localStorage.setItem('u_m', JSON.stringify(songMeta));
    }

    function updateArt() {
        const link = prompt("Resim URL:");
        if(link) { document.getElementById('main-art').innerHTML = `<img src="${link}">`; saveSongMeta(); loadMeta(currentQueue[currentIndex].url); }
    }

    // [TEMEL UI FONKSİYONLARI]
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleRightPanel() { document.getElementById('right-panel').classList.toggle('open'); }
    function toggleModal(id) { const m = document.getElementById(id); m.style.display = m.style.display==='block'?'none':'block'; }
    function updateCF(v) { cfS = parseInt(v); document.getElementById('cf-val').innerText = v; }
    function formatT(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function setVol(v) { a1.volume = v; a2.volume = v; }
    function togglePlay() { const p = activePlayer===1?a1:a2; if(p.paused) { p.play(); document.getElementById('play-btn').innerText="⏸"; } else { p.pause(); document.getElementById('play-btn').innerText="▶"; } }
    function skip(v) { (activePlayer===1?a1:a2).currentTime += v; }
    function next() { crossFadeNext(); }
    function prev() { currentIndex = (currentIndex - 1 + currentQueue.length) % currentQueue.length; playIdx(currentIndex); }
    function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuf-btn').classList.toggle('active', isShuffle); shufPool=[]; }
    function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; document.getElementById('rep-btn').innerText = repeatMode===2?"🔂":"🔁"; }
    function addHist(t) { history.unshift({t, time: new Date().toLocaleTimeString()}); if(history.length>20) history.pop(); localStorage.setItem('u_h', JSON.stringify(history)); updateHistUI(); }
    function updateHistUI() { document.getElementById('hist-content').innerHTML = history.map(h => `<div style="padding:10px 0; border-bottom:1px solid #111"><b>${h.t}</b> <br><small style="color:#444">${h.time}</small></div>`).join(''); }
    function showView(type, el) {
        if(el) { document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        currentQueue = type === 'all' ? [...allSongs] : allSongs.filter(s => favorites.includes(s.url));
        renderSongs();
    }
    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIndex===i?'playing':''}" onclick="playIdx(${i})">
                <div style="opacity:0.2">${i+1}</div>
                <div style="font-weight:600">${s.title}</div>
                <div style="color:#444">${s.artist}</div>
                <div style="text-align:right" onclick="event.stopPropagation(); toggleFav('${s.url}')">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }
    function updateUI() {
        const s = currentQueue[currentIndex];
        document.getElementById('bar-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = s.artist;
        loadMeta(s.url); renderSongs();
    }
    function toggleFav(u) { if(favorites.includes(u)) favorites=favorites.filter(f=>f!==u); else favorites.push(u); localStorage.setItem('u_f', JSON.stringify(favorites)); renderSongs(); }

    window.onload = init;
</script>
</body>
</html>
