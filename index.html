<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Global Player v7.0</title>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .player-card { background: linear-gradient(145deg, #1e1e1e, #111); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); width: 320px; text-align: center; border: 1px solid #333; position: relative; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 12px #00f2ff; margin: 15px 0; font-size: 1.1rem; font-weight: bold; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        button { background: rgba(0,242,255,0.05); border: 2px solid #00f2ff; color: #00f2ff; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; transition: 0.3s; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }
        #playlist { margin-top: 25px; width: 320px; max-height: 300px; overflow-y: auto; background: #151515; border-radius: 15px; padding: 10px; border: 1px solid #222; }
        .song-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; text-align: left; color: #aaa; }
        .active-song { color: #00f2ff; font-weight: bold; background: #1a1a1a; border-left: 4px solid #00f2ff; }
        .status-msg { font-size: 10px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="player-card">
    <h3 id="song-title">Liste Yükleniyor...</h3>
    <p id="artist-name" class="neon-text">Usta Drive Sistemi</p>
    
    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button id="play-btn" onclick="togglePlay()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>
    
    <div id="status" class="status-msg">Hazır</div>
    
    <audio id="audio1"></audio>
    <audio id="audio2"></audio>
</div>

<div id="playlist"></div>

<script>
    let songs = [];
    let currentIndex = 0;
    let activePlayer = 1;
    let crossfadeTime = 3500; 
    const audio1 = document.getElementById('audio1');
    const audio2 = document.getElementById('audio2');

    // USTA: Drive linkini çalınabilir ham veriye dönüştüren sihirli fonksiyon
    function formatUrl(url) {
        if (!url) return "";
        
        // Google Drive Linkini Düzenle
        if (url.includes('drive.google.com')) {
            let fileId = "";
            try {
                if (url.includes('/d/')) {
                    fileId = url.split('/d/')[1].split('/')[0];
                } else if (url.includes('id=')) {
                    fileId = url.split('id=')[1].split('&')[0];
                }
                return `https://docs.google.com/uc?export=download&id=${fileId}`;
            } catch (e) { return url; }
        }
        
        // Dropbox Linkini Düzenle
        if (url.includes('dropbox.com')) {
            return url.replace(/\?dl=0$|\?dl=1$|$/, '?raw=1');
        }
        
        return url;
    }

    async function loadSongsFromGoogle() {
        const tableID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const url = `https://docs.google.com/spreadsheets/d/${tableID}/gviz/tq?tqx=out:json`;
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            const jsonText = text.substring(47).slice(0, -2);
            const json = JSON.parse(jsonText);
            
            songs = json.table.rows.map(row => ({
                title: row.c[0] ? String(row.c[0].v) : "İsimsiz",
                artist: row.c[1] ? String(row.c[1].v) : "Usta",
                url: row.c[2] ? String(row.c[2].v) : ""
            })).filter(s => s.url !== "");

            if(songs.length > 0) {
                renderPlaylist();
                document.getElementById('song-title').innerText = songs[0].title;
            } else {
                document.getElementById('song-title').innerText = "Tablo Boş!";
            }
        } catch (e) {
            document.getElementById('song-title').innerText = "Bağlantı Hatası!";
        }
    }

    window.onload = loadSongsFromGoogle;

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = songs.map((s, i) => `
            <div class="song-item ${i === currentIndex ? 'active-song' : ''}" onclick="playSpecific(${i})">
                ${i+1}. ${s.title}
            </div>
        `).join('');
    }

    function playSpecific(index) {
        currentIndex = index;
        startSong();
    }

    function startSong() {
        const song = songs[currentIndex];
        const finalUrl = formatUrl(song.url);
        let currentPlayer = activePlayer === 1 ? audio1 : audio2;
        
        document.getElementById('status').innerText = "Yükleniyor...";
        
        // Güvenlik duvarı için ham veri ayarı
        currentPlayer.crossOrigin = "anonymous";
        currentPlayer.src = finalUrl;
        
        currentPlayer.play().then(() => {
            document.getElementById('play-btn').innerText = "⏸";
            document.getElementById('song-title').innerText = song.title;
            document.getElementById('artist-name').innerText = song.artist;
            document.getElementById('status').innerText = "Çalıyor";
            renderPlaylist();
            setupCrossfade(currentPlayer);
        }).catch(err => {
            document.getElementById('status').innerText = "Hata: Drive iznini kontrol et!";
            console.error(err);
        });
    }

    function setupCrossfade(player) {
        player.ontimeupdate = function() {
            if (player.duration - player.currentTime < (crossfadeTime / 1000)) {
                player.ontimeupdate = null; 
                fadeOutAndNext(player);
            }
        };
    }

    function fadeOutAndNext(oldPlayer) {
        currentIndex = (currentIndex + 1) % songs.length;
        activePlayer = activePlayer === 1 ? 2 : 1;
        let newPlayer = activePlayer === 1 ? audio1 : audio2;
        
        newPlayer.crossOrigin = "anonymous";
        newPlayer.src = formatUrl(songs[currentIndex].url);
        newPlayer.volume = 0;
        newPlayer.play();

        let fadeInterval = setInterval(() => {
            if (newPlayer.volume < 0.9) {
                newPlayer.volume += 0.1;
                if(oldPlayer.volume > 0.1) oldPlayer.volume -= 0.1;
            } else {
                oldPlayer.pause();
                oldPlayer.volume = 1;
                newPlayer.volume = 1;
                clearInterval(fadeInterval);
                setupCrossfade(newPlayer);
                renderPlaylist();
                document.getElementById('song-title').innerText = songs[currentIndex].title;
            }
        }, 300);
    }

    function togglePlay() {
        let p = activePlayer === 1 ? audio1 : audio2;
        if (p.paused) { p.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { p.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }

    function nextSong() { currentIndex = (currentIndex + 1) % songs.length; startSong(); }
    function prevSong() { currentIndex = (currentIndex - 1 + songs.length) % songs.length; startSong(); }
</script>

</body>
</html>
