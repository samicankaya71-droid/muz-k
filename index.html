<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Usta-ify Precision v22.0</title>
    <link id="main-font-link" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --accent-dark: rgba(0, 242, 255, 0.1); --accent-mid: rgba(0, 242, 255, 0.4); --bg: #050505; --text: #fff; --f-size: 14px; }
        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: var(--f-size); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #bg-grad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, var(--accent) -60%, var(--bg) 80%); opacity: 0.25; pointer-events: none; z-index: 0; }

        /* SIDEBAR (KOYU TONLU) */
        #sidebar { width: 280px; background: #000; border-right: 1px solid var(--accent-dark); display: flex; flex-direction: column; z-index: 100; overflow-y: auto; background: linear-gradient(135deg, #000 0%, var(--accent-dark) 100%); }
        .nav-link { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; opacity: 0.5; }
        .nav-link.active, .nav-link:hover { opacity: 1; color: var(--accent); }
        .pl-item { padding: 8px 55px; font-size: 0.85em; opacity: 0.4; cursor: pointer; }
        .pl-item:hover { opacity: 1; color: var(--accent); }

        /* MAIN CONTENT - DETAYLAR AÇILINCA DARALIR */
        #main-content { flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 160px; z-index: 1; margin-right: 0; transition: margin-right 0.6s ease; }
        body.right-open #main-content { margin-right: 380px; }

        .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--accent-dark); border-radius: 20px; padding: 10px 20px; color: #fff; width: 250px; outline: none; margin-left: 20px; font-size: 13px; }
        .search-box:focus { border-color: var(--accent); }

        .song-row { display: grid; grid-template-columns: 40px 2fr 1fr 120px; padding: 12px 20px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; }
        .song-row:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-dark); }
        .song-row.playing { background: var(--accent-dark); color: var(--accent); border-color: var(--accent-mid); }

        /* MODALS */
        .full-modal { position: fixed; top: 0; left: 280px; right: 0; bottom: 0; background: rgba(5,5,5,0.98); z-index: 500; display: none; padding: 60px; backdrop-filter: blur(30px); }
        .close-x { position: absolute; top: 30px; right: 40px; font-size: 35px; cursor: pointer; opacity: 0.5; }

        /* RIGHT PANEL (OTOMATİK KOYU TON) */
        #right-panel { width: 380px; background: linear-gradient(225deg, #080808 0%, var(--accent-dark) 100%); border-left: 1px solid var(--accent-mid); position: fixed; top: 0; right: 0; bottom: 0; transform: translateX(100%); z-index: 200; padding: 30px; overflow-y: auto; }
        #right-panel.open { transform: translateX(0); }
        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--accent-mid); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }

        /* PLAYER BAR */
        #player-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 75%; height: 95px; background: rgba(10,10,10,0.9); border-radius: 50px; border: 1px solid var(--accent-mid); display: flex; align-items: center; padding: 0 40px; z-index: 1000; backdrop-filter: blur(15px); }
        .bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin: 0 20px; overflow: hidden; }
        #bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 15px var(--accent); }
        .ctrl-btn { cursor: pointer; opacity: 0.5; font-size: 18px; }
        .ctrl-btn:hover, .ctrl-btn.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body id="main-body">

<div id="bg-grad"></div>

<div id="sidebar">
    <div style="padding: 40px 30px; font-weight: 900; color: var(--accent); font-size: 22px; letter-spacing: -1px;">USTA-IFY PRECISION</div>
    <div class="nav-link active" onclick="showView('all', this)"><span>🏠</span><span>HAVUZ</span></div>
    <div class="nav-link" onclick="showView('fav', this)"><span>💖</span><span>FAVORİLER</span></div>
    
    <div style="margin-top: 15px;">
        <div class="nav-link" onclick="toggleModal('playlist-modal')"><span>📂</span><span>LİSTELER</span></div>
        <div id="sidebar-playlists"></div>
    </div>

    <div style="margin-top: auto; padding-bottom: 30px;">
        <div class="nav-link" onclick="toggleModal('db-modal')"><span>👤</span><span>ARŞİV</span></div>
        <div class="nav-link" onclick="toggleModal('settings-modal')"><span>⚙️</span><span>AYARLAR</span></div>
        <div class="nav-link" onclick="toggleRight()"><span>📑</span><span>DETAYLAR</span></div>
    </div>
</div>

<div id="main-content">
    <div style="display: flex; align-items: center; margin-bottom: 40px;">
        <h1 id="view-title" style="font-size: 45px; font-weight: 900; margin:0;">HAVUZ</h1>
        <input type="text" id="search-input" class="search-box" placeholder="🔍 Şarkı Ara..." oninput="filterSongs()">
    </div>
    <div id="song-body"></div>
</div>

<div id="settings-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('settings-modal')">✕</span>
    <h1>AYARLAR</h1>
    <div style="max-width: 400px; display:flex; flex-direction:column; gap:25px">
        <div><label>Bukalemun Modu</label> <input type="checkbox" id="cham-mode" checked onchange="applyTheme()"></div>
        <div><label>Manuel Renk Seçimi</label> <input type="color" id="manual-color" value="#00f2ff" oninput="applyTheme()"></div>
        <div><label>Oto-Geçiş Crossfade (Saniye): <span id="cf-val">3</span>s</label> <input type="range" min="0" max="10" value="3" oninput="updateCF(this.value)"></div>
        <div><label>Yazı Fontu</label> <select id="font-select" onchange="updateFont(this.value)" style="width:100%; padding:10px; background:#111; color:#fff; border:1px solid #333;"><option value="Montserrat">Montserrat</option><option value="Roboto">Roboto</option><option value="Poppins">Poppins</option></select></div>
        <div><label>Yazı Boyutu</label> <input type="range" min="12" max="22" value="14" oninput="updateFSize(this.value)" style="width:100%;"></div>
    </div>
</div>

<div id="playlist-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('playlist-modal')">✕</span>
    <h1>LİSTE YÖNETİMİ</h1>
    <div style="display:flex; gap:10px; margin-bottom:30px">
        <input type="text" id="pl-name" placeholder="Yeni Liste..." style="background:#111; color:#fff; border:1px solid #333; padding:15px; border-radius:10px; flex:1">
        <button onclick="createPL()" style="background:var(--accent); border:none; padding:0 30px; border-radius:10px; font-weight:bold; cursor:pointer">EKLE</button>
    </div>
    <div id="pl-list-modal" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:20px"></div>
</div>

<div id="db-modal" class="full-modal">
    <span class="close-x" onclick="toggleModal('db-modal')">✕</span>
    <h1>SANATÇI ARŞİVİ</h1>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px">
        <input type="text" id="db-tag" placeholder="#etiket">
        <input type="text" id="db-name" placeholder="İsim">
        <input type="text" id="db-img" placeholder="Resim URL">
    </div>
    <button onclick="saveDB()" style="padding:15px; background:var(--accent); border:none; font-weight:bold; cursor:pointer; border-radius:10px">KAYDET</button>
    <div id="db-list" style="margin-top:30px; display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:15px"></div>
</div>

<div id="right-panel">
    <span class="close-x" onclick="toggleRight()">✕</span>
    <div class="premium-art" id="main-art" onclick="updateArt()"></div>
    <div id="artist-chips" style="margin-bottom:15px;"></div>
    <div id="tag-section" style="border-top: 1px solid var(--accent-dark); padding-top:15px;">
        <input type="text" id="credits-input" style="background:transparent; border:1px dashed var(--accent-mid); color:#fff; width:100%; padding:10px;" placeholder="#tag ekle..." oninput="parseHashtags()">
        <textarea id="desc-input" style="background:transparent; border:none; color:#fff; width:100%; height:120px; margin-top:15px; opacity:0.5; font-size:12px;" placeholder="Şarkı notları..." oninput="saveMeta()"></textarea>
    </div>
</div>

<div id="player-bar">
    <div style="width:220px; display:flex; align-items:center; gap:12px">
        <div id="mini-art" style="width:48px; height:48px; border-radius:10px; background:#222; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:900; font-size:13px; white-space:nowrap">Şarkı Seç</div>
            <div id="bar-artist" style="font-size:10px; opacity:0.4">Usta-ify</div>
        </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:5px">
            <span onclick="toggleShuffle()" id="shuf-btn" class="ctrl-btn">🔀</span>
            <span onclick="manualSkip(-10)" class="ctrl-btn">⏪</span>
            <span onclick="manualPrev()" class="ctrl-btn" style="font-size:24px">⏮</span>
            <div onclick="togglePlay()" id="play-btn" style="width:42px; height:42px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer">▶</div>
            <span onclick="manualNext()" class="ctrl-btn" style="font-size:24px">⏭</span>
            <span onclick="manualSkip(10)" class="ctrl-btn">⏩</span>
            <span onclick="toggleRepeat()" id="rep-btn" class="ctrl-btn">🔁</span>
        </div>
        <div style="width:100%; display:flex; align-items:center">
            <span id="cur-t" style="font-size:10px; opacity:0.5; width:35px">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div id="bar-fill"></div></div>
            <span id="dur-t" style="font-size:10px; opacity:0.5; width:35px">0:00</span>
        </div>
    </div>
    <div style="width:150px; text-align:right">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)" style="accent-color:var(--accent); width:70px">
    </div>
</div>

<audio id="pa"></audio><audio id="pb"></audio>

<script>
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let playlists = JSON.parse(localStorage.getItem('u_pl')) || {}, artistDB = JSON.parse(localStorage.getItem('u_db')) || {};
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {}, currentIdx = 0, activeP = 'a', cfS = 3;
    let isShuffle = false, repeatMode = 0;

    const pa = document.getElementById('pa'), pb = document.getElementById('pb');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url?.includes('http'));
        showView('all'); updateDBUI(); updatePLUI();
        requestAnimationFrame(sync);
    }

    function applyTheme(imgUrl = null) {
        const isCham = document.getElementById('cham-mode').checked;
        const manual = document.getElementById('manual-color').value;
        let col = manual;
        if(isCham && imgUrl) {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = imgUrl;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 1; canvas.height = 1; ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                col = `rgb(${r},${g},${b})`;
                updateColors(col, r, g, b);
            };
        } else {
            const r = parseInt(col.slice(1,3), 16), g = parseInt(col.slice(3,5), 16), b = parseInt(col.slice(5,7), 16);
            updateColors(col, r, g, b);
        }
    }

    function updateColors(col, r, g, b) {
        document.documentElement.style.setProperty('--accent', col);
        document.documentElement.style.setProperty('--accent-dark', `rgba(${r},${g},${b}, 0.15)`);
        document.documentElement.style.setProperty('--accent-mid', `rgba(${r},${g},${b}, 0.5)`);
    }

    // ARAMA SİSTEMİ
    function filterSongs() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const filtered = allSongs.filter(s => s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term));
        currentQueue = filtered;
        renderSongs();
    }

    // AUDIO & CROSSFADE
    function playIdx(i, isManual = true) {
        currentIdx = i; const s = currentQueue[currentIdx];
        const cur = activeP === 'a' ? pa : pb;
        const other = activeP === 'a' ? pb : pa;

        if (isManual) {
            other.pause(); other.currentTime = 0;
            cur.src = s.url; cur.volume = 1; cur.play();
        } else {
            // Otomatik geçişte zaten crossFade tetikleniyor
        }
        
        document.getElementById('play-btn').innerText = "⏸";
        updateUI(s);
        if(!document.getElementById('right-panel').classList.contains('open')) toggleRight();
    }

    function sync() {
        const cur = activeP === 'a' ? pa : pb;
        if(!cur.paused && cur.duration) {
            document.getElementById('bar-fill').style.width = (cur.currentTime/cur.duration*100) + "%";
            document.getElementById('cur-t').innerText = formatT(cur.currentTime);
            document.getElementById('dur-t').innerText = formatT(cur.duration);
            if(cur.duration - cur.currentTime <= cfS && !cur.dataset.fading && cfS > 0) {
                cur.dataset.fading = "true"; crossFade();
            }
        }
        requestAnimationFrame(sync);
    }

    function crossFade() {
        const oldP = activeP === 'a' ? pa : pb;
        activeP = activeP === 'a' ? 'b' : 'a';
        const newP = activeP === 'a' ? pa : pb;
        
        if(isShuffle) { currentIdx = Math.floor(Math.random()*currentQueue.length); }
        else if(repeatMode !== 2) { currentIdx = (currentIdx + 1) % currentQueue.length; }
        
        const s = currentQueue[currentIdx];
        newP.src = s.url; newP.volume = 0; newP.play();
        let v = 0;
        let int = setInterval(() => {
            v += 0.05;
            if(v >= 1) { clearInterval(int); oldP.pause(); oldP.dataset.fading = ""; newP.volume = 1; }
            else { newP.volume = v; oldP.volume = 1-v; }
        }, (cfS*1000)/20);
        updateUI(s);
    }

    function manualNext() { playIdx((currentIdx + 1) % currentQueue.length, true); }
    function manualPrev() { playIdx((currentIdx - 1 + currentQueue.length) % currentQueue.length, true); }
    function manualSkip(v) { (activeP==='a'?pa:pb).currentTime += v; }

    function updateUI(s) {
        document.getElementById('bar-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = s.artist;
        const m = songMeta[s.url] || { art: '', credits: '', desc: '' };
        document.getElementById('main-art').innerHTML = m.art ? `<img src="${m.art}">` : '';
        document.getElementById('mini-art').innerHTML = m.art ? `<img src="${m.art}" style="width:100%;height:100%;object-fit:cover">` : '';
        document.getElementById('credits-input').value = m.credits || "";
        document.getElementById('desc-input').value = m.desc || "";
        applyTheme(m.art); parseHashtags(); renderSongs();
    }

    // UI & PLAYLISTS
    function toggleRight() { 
        document.getElementById('right-panel').classList.toggle('open'); 
        document.getElementById('main-body').classList.toggle('right-open');
    }

    function createPL() { const n = document.getElementById('pl-name').value; if(n && !playlists[n]) { playlists[n] = []; localStorage.setItem('u_pl', JSON.stringify(playlists)); updatePLUI(); } }
    function updatePLUI() {
        const side = document.getElementById('sidebar-playlists');
        const modal = document.getElementById('pl-list-modal');
        side.innerHTML = Object.keys(playlists).map(k => `<div class="pl-item" onclick="showPL('${k}')"># ${k}</div>`).join('');
        modal.innerHTML = Object.keys(playlists).map(k => `<div style="background:#111; padding:20px; border-radius:15px; text-align:center; position:relative"><div>${k}</div><div onclick="showPL('${k}')" style="color:var(--accent); cursor:pointer; margin-top:10px">AÇ</div><div onclick="delPL('${k}')" style="position:absolute; top:10px; right:10px; color:red; cursor:pointer">✕</div></div>`).join('');
    }
    function showPL(name) { currentQueue = allSongs.filter(s => playlists[name].includes(s.url)); document.getElementById('view-title').innerText = name; renderSongs(); toggleModal('playlist-modal'); }

    function showView(t, el) { 
        document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active')); if(el) el.classList.add('active');
        document.getElementById('view-title').innerText = t==='all'?'HAVUZ':'FAVORİLER';
        currentQueue = t==='all'?[...allSongs]:allSongs.filter(s=>favorites.includes(s.url)); renderSongs();
    }

    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIdx===i?'playing':''}" onclick="playIdx(${i}, true)">
                <div style="opacity:0.3">${i+1}</div>
                <div style="font-weight:700">${s.title}</div>
                <div style="opacity:0.5">${s.artist}</div>
                <div style="display:flex; gap:15px; justify-content:flex-end">
                    <span onclick="event.stopPropagation(); toggleFav('${s.url}')">${favorites.includes(s.url)?'💖':'🤍'}</span>
                    <span onclick="event.stopPropagation(); addToPL('${s.url}')">➕</span>
                </div>
            </div>
        `).join('');
    }

    // STANDARTLAR
    function togglePlay() { const c = activeP==='a'?pa:pb; c.paused ? c.play() : c.pause(); document.getElementById('play-btn').innerText = c.paused ? '▶' : '⏸'; }
    function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuf-btn').classList.toggle('active', isShuffle); }
    function toggleRepeat() { repeatMode = (repeatMode+1)%3; document.getElementById('rep-btn').innerText = repeatMode===2?'🔂':'🔁'; document.getElementById('rep-btn').classList.toggle('active', repeatMode>0); }
    function seek(e) { (activeP==='a'?pa:pb).currentTime = (e.offsetX / e.currentTarget.offsetWidth) * (activeP==='a'?pa:pb).duration; }
    function setVol(v) { pa.volume = pb.volume = v; }
    function updateFont(f) { document.getElementById('main-font-link').href=`https://fonts.googleapis.com/css2?family=${f.replace(' ','+')}:wght@400;700;900&display=swap`; document.body.style.fontFamily=`'${f}', sans-serif`; }
    function updateFSize(s) { document.documentElement.style.setProperty('--f-size', s+'px'); }
    function updateCF(v) { cfS = parseInt(v); document.getElementById('cf-val').innerText = v; }
    function formatT(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function toggleModal(id) { const m = document.getElementById(id); const open = m.style.display==='block'; document.querySelectorAll('.full-modal').forEach(x=>x.style.display='none'); m.style.display=open?'none':'block'; }
    function addToPL(url) { const n = prompt("Playlist?"); if(playlists[n]) { playlists[n].push(url); localStorage.setItem('u_pl', JSON.stringify(playlists)); } }
    function toggleFav(u) { favorites.includes(u)?favorites=favorites.filter(x=>x!==u):favorites.push(u); localStorage.setItem('u_f', JSON.stringify(favorites)); renderSongs(); }
    function updateArt() { const u=prompt("URL:"); if(u){ document.getElementById('main-art').innerHTML=`<img src="${u}">`; saveMeta(); applyTheme(u); } }
    function saveMeta() { const s=currentQueue[currentIdx]; const img=document.querySelector('#main-art img'); if(s) { songMeta[s.url]={art:img?img.src:'', credits:document.getElementById('credits-input').value, desc:document.getElementById('desc-input').value}; localStorage.setItem('u_m', JSON.stringify(songMeta)); } }
    function saveDB() { const t=document.getElementById('db-tag').value.toLowerCase().replace('#',''), n=document.getElementById('db-name').value, i=document.getElementById('db-img').value; if(t&&n){ artistDB[t]={name:n, img:i}; localStorage.setItem('u_db', JSON.stringify(artistDB)); updateDBUI(); } }
    function updateDBUI() { document.getElementById('db-list').innerHTML = Object.keys(artistDB).map(k=>`<div style="text-align:center; background:rgba(255,255,255,0.03); padding:10px; border-radius:10px"><img src="${artistDB[k].img}" style="width:40px;height:40px;border-radius:50%"><div style="font-size:10px;font-weight:bold">#${k}</div><div onclick="delDB('${k}')" style="color:red; cursor:pointer; font-size:9px">SİL</div></div>`).join(''); }
    function delDB(k) { delete artistDB[k]; localStorage.setItem('u_db', JSON.stringify(artistDB)); updateDBUI(); }
    function parseHashtags() {
        const val = document.getElementById('credits-input').value; const tags = val.match(/#(\w+)/g) || [];
        document.getElementById('artist-chips').innerHTML = tags.map(t => { const art = artistDB[t.substring(1).toLowerCase()]; return art ? `<div style="display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,0.1); padding:5px 12px; border-radius:20px; margin:5px"><img src="${art.img}" style="width:20px;height:20px;border-radius:50%"> ${art.name}</div>` : ''; }).join('');
        saveMeta();
    }

    window.onload = init;
</script>
</body>
</html>
