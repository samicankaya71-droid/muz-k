<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta-ify Professional</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SOL PANEL (SIDEBAR) */
        #sidebar { width: 280px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; transition: 0.3s; z-index: 100; }
        .sidebar-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #111; transition: 0.2s; }
        .sidebar-item:hover { background: #1a1a1a; color: var(--neon); }
        .section-title { font-size: 12px; color: #555; padding: 15px 20px 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* ANA İÇERİK ALANI */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top right, #111, #050505); }
        .header { padding: 20px; font-size: 24px; font-weight: bold; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        /* ŞARKI LİSTESİ (HAVUZ) */
        #song-list { flex: 1; overflow-y: auto; padding: 20px; }
        .song-row { display: flex; align-items: center; padding: 10px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; cursor: pointer; position: relative; }
        .song-row:hover { background: rgba(255,255,255,0.05); }
        .song-row.active { border-left: 4px solid var(--neon); background: rgba(0,242,255,0.05); }
        .song-info { flex: 1; margin-left: 15px; }
        .fav-btn { color: #444; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .fav-btn.active { color: #ff0055; text-shadow: 0 0 10px #ff0055; }

        /* ALT ÇALMA ÇUBUĞU (PLAYER BAR) */
        #player-bar { height: 100px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        .current-track-info { width: 250px; }
        .controls-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-group { display: flex; align-items: center; gap: 15px; }
        .main-btns { font-size: 20px; cursor: pointer; color: #fff; }
        .main-btns:hover { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #888; }
        .progress-bar { flex: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 8px var(--neon); }

        /* AYARLAR MODAL */
        #settings-menu { position: absolute; left: 20px; bottom: 120px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--neon); display: none; width: 250px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .history-list { font-size: 11px; color: #888; padding: 10px; }
        .sortable-ghost { opacity: 0.3; background: var(--neon); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
</head>
<body>

<div id="sidebar">
    <div class="header" style="font-size: 18px; color: var(--neon);">USTA-IFY</div>
    <div class="section-title">Kütüphane</div>
    <div class="sidebar-item" onclick="showView('all')">🎵 Tüm Şarkılar (Havuz)</div>
    <div class="sidebar-item" onclick="showView('favorites')">❤️ Favoriler</div>
    <div class="section-title">Playlistlerim</div>
    <div id="playlist-nav"></div>
    <div class="sidebar-item" style="color: #666;" onclick="createNewPlaylist()">+ Yeni Playlist Oluştur</div>
    
    <div class="section-title">Aktivite</div>
    <div class="sidebar-item" onclick="toggleHistory()">📜 Şarkı Geçmişi</div>
    <div id="history-box" style="display:none;" class="history-list"></div>
    
    <div style="margin-top: auto;">
        <div class="sidebar-item" onclick="toggleSettings()">⚙️ Ayarlar</div>
    </div>
</div>

<div id="main-content">
    <div id="view-title" class="header">Tüm Şarkılar</div>
    <button id="edit-mode-btn" style="position: absolute; right: 20px; top: 85px; background: none; border: 1px solid #444; color: #888; cursor: pointer; padding: 5px 10px; border-radius: 5px;">Düzenle: KAPALI</button>
    <div id="song-list"></div>

    <div id="settings-menu">
        <h4 style="margin-top: 0;">Genel Ayarlar</h4>
        <label>Crossfade (Saniye): <span id="cf-val">3</span>s</label>
        <input type="range" min="0" max="12" value="3" style="width:100%" oninput="updateCF(this.value)">
        <div style="margin-top: 15px;">
            <small>Dükkan Modu: Neon Açık</small>
        </div>
    </div>
</div>

<div id="player-bar">
    <div class="current-track-info">
        <div id="bar-title" style="font-weight: bold; font-size: 14px;">Şarkı Seçilmedi</div>
        <div id="bar-artist" style="font-size: 12px; color: #888;">Sanatçı</div>
    </div>

    <div class="controls-center">
        <div class="btn-group">
            <span class="main-btns" onclick="toggleShuffle()" id="shuffle-btn">🔀</span>
            <span class="main-btns" onclick="prevSong()">⏮</span>
            <span class="main-btns" id="play-btn" onclick="togglePlay()" style="font-size: 35px;">▶</span>
            <span class="main-btns" onclick="nextSong()">⏭</span>
            <span class="main-btns" onclick="toggleRepeat()" id="repeat-btn">🔁</span>
        </div>
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <div class="progress-bar" onclick="seek(event)">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span id="duration-time">0:00</span>
        </div>
    </div>
    
    <div style="width: 150px; display: flex; align-items: center; gap: 10px;">
        🔊 <input type="range" min="0" max="1" step="0.1" value="1" oninput="updateVolume(this.value)">
    </div>
</div>

<audio id="audio1"></audio>
<audio id="audio2"></audio>

<script>
    let allSongs = []; // Havuz
    let currentQueue = []; // O an çalan liste
    let favorites = JSON.parse(localStorage.getItem('favs')) || [];
    let history = JSON.parse(localStorage.getItem('history')) || [];
    let playlists = JSON.parse(localStorage.getItem('playlists')) || {};
    
    let currentIndex = 0;
    let activePlayer = 1;
    let crossfadeTime = 3000;
    let isShuffle = false;
    let repeatMode = 0; // 0: Kapalı, 1: Playlist Döngü, 2: Tek Şarkı Döngü
    let editMode = false;

    const audio1 = document.getElementById('audio1');
    const audio2 = document.getElementById('audio2');

    // VERİ ÇEKME
    async function loadData() {
        const tableID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const url = `https://docs.google.com/spreadsheets/d/${tableID}/gviz/tq?tqx=out:json`;
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            allSongs = json.table.rows.map(row => ({
                id: Math.random().toString(36).substr(2, 9),
                title: row.c[0]?.v || "İsimsiz",
                artist: row.c[1]?.v || "Usta",
                url: row.c[2]?.v || ""
            })).filter(s => s.url.length > 5);
            showView('all');
        } catch (e) { alert("Veri çekilemedi!"); }
    }

    // GÖRÜNÜM YÖNETİMİ
    function showView(type, playlistName = null) {
        let listHtml = "";
        let targetList = [];
        const container = document.getElementById('song-list');
        
        if(type === 'all') {
            targetList = allSongs;
            document.getElementById('view-title').innerText = "Tüm Şarkılar (Havuz)";
        } else if(type === 'favorites') {
            targetList = allSongs.filter(s => favorites.includes(s.url));
            document.getElementById('view-title').innerText = "Favoriler";
        }

        currentQueue = targetList;
        renderList(targetList);
    }

    function renderList(list) {
        const container = document.getElementById('song-list');
        container.innerHTML = list.map((s, i) => `
            <div class="song-row" data-id="${s.id}" onclick="playSong(${i})">
                <div style="color: #444; width: 20px;">${i+1}</div>
                <div class="song-info">
                    <div style="font-weight: bold;">${s.title}</div>
                    <div style="font-size: 12px; color: #666;">${s.artist}</div>
                </div>
                <div class="fav-btn ${favorites.includes(s.url) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${s.url}')">❤</div>
            </div>
        `).join('');
        
        // Sürükle Bırak Etkinleştirme
        if(editMode) {
            new Sortable(container, {
                animation: 150,
                ghostClass: 'sortable-ghost'
            });
        }
    }

    // OYNATMA MANTIĞI
    function playSong(index) {
        currentIndex = index;
        const song = currentQueue[currentIndex];
        const player = activePlayer === 1 ? audio1 : audio2;
        
        player.src = song.url;
        player.play();
        
        document.getElementById('bar-title').innerText = song.title;
        document.getElementById('bar-artist').innerText = song.artist;
        document.getElementById('play-btn').innerText = "⏸";
        
        addToHistory(song);
        updateProgress();
    }

    function addToHistory(song) {
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes()} - ${now.toLocaleDateString()}`;
        history.unshift({ title: song.title, time: timeStr });
        if(history.length > 20) history.pop();
        localStorage.setItem('history', JSON.stringify(history));
        updateHistoryUI();
    }

    // AYARLAR & KONTROLLER
    function updateCF(val) {
        crossfadeTime = val * 1000;
        document.getElementById('cf-val').innerText = val;
    }

    function toggleEdit() {
        editMode = !editMode;
        document.getElementById('edit-mode-btn').innerText = editMode ? "Düzenle: AÇIK" : "Düzenle: KAPALI";
        renderList(currentQueue);
    }

    function togglePlay() {
        const p = activePlayer === 1 ? audio1 : audio2;
        if(p.paused) { p.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { p.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }

    function updateProgress() {
        const p = activePlayer === 1 ? audio1 : audio2;
        p.ontimeupdate = () => {
            const perc = (p.currentTime / p.duration) * 100;
            document.getElementById('progress-fill').style.width = perc + "%";
            document.getElementById('current-time').innerText = formatTime(p.currentTime);
            document.getElementById('duration-time').innerText = formatTime(p.duration);
            
            // Crossfade Tetikleme
            if (p.duration && p.duration - p.currentTime < (crossfadeTime / 1000)) {
                p.ontimeupdate = null;
                nextWithFade();
            }
        };
    }

    function formatTime(sec) {
        if(!sec) return "0:00";
        let m = Math.floor(sec / 60);
        let s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // Modal ve Menü Açılışları
    function toggleSettings() { 
        const m = document.getElementById('settings-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }
    
    function toggleHistory() {
        const h = document.getElementById('history-box');
        h.style.display = h.style.display === 'block' ? 'none' : 'block';
        updateHistoryUI();
    }

    function updateHistoryUI() {
        document.getElementById('history-box').innerHTML = history.map(h => `
            <div style="margin-bottom: 8px; border-left: 2px solid #333; padding-left: 5px;">
                <div>${h.title}</div>
                <div style="font-size: 9px; color: #555;">${h.time}</div>
            </div>
        `).join('');
    }

    document.getElementById('edit-mode-btn').onclick = toggleEdit;
    window.onload = loadData;

</script>
</body>
</html>
