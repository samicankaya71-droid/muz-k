<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usta-ify Adaptive v23.0</title>
    <link id="main-font-link" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --accent-dark: rgba(0, 242, 255, 0.15); --accent-mid: rgba(0, 242, 255, 0.5); --bg: #050505; --text: #fff; --f-size: 14px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: var(--f-size); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #bg-grad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, var(--accent) -60%, var(--bg) 85%); opacity: 0.25; pointer-events: none; z-index: 0; transition: background 0.8s ease; }

        /* SIDEBAR - PC */
        #sidebar { width: 280px; background: linear-gradient(135deg, #000 0%, var(--accent-dark) 100%); border-right: 1px solid var(--accent-dark); display: flex; flex-direction: column; z-index: 100; overflow-y: auto; transition: transform 0.3s ease; }
        .nav-link { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; opacity: 0.5; transition: 0.3s; }
        .nav-link.active, .nav-link:hover { opacity: 1; color: var(--accent); }
        .pl-item { padding: 8px 55px; font-size: 0.85em; opacity: 0.4; cursor: pointer; }

        /* MAIN CONTENT */
        #main-content { flex: 1; overflow-y: auto; padding: 40px; padding-bottom: 160px; z-index: 1; transition: margin-right 0.5s ease; position: relative; }
        body.right-open #main-content { margin-right: 380px; }

        .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--accent-dark); border-radius: 20px; padding: 10px 20px; color: #fff; width: 250px; outline: none; transition: 0.3s; }
        .song-row { display: grid; grid-template-columns: 40px 2fr 1fr 80px; padding: 12px 20px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; align-items: center; }
        .song-row.playing { background: var(--accent-dark); color: var(--accent); border-color: var(--accent-mid); }

        /* RIGHT PANEL (PC & MOBILE) */
        #right-panel { 
            width: 380px; background: linear-gradient(225deg, #080808 0%, var(--accent-dark) 100%); 
            border-left: 1px solid var(--accent-mid); position: fixed; top: 0; right: 0; bottom: 0; 
            transform: translateX(100%); z-index: 2000; padding: 30px; overflow-y: auto; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        #right-panel.open { transform: translateX(0); }
        .mobile-drag-handle { display: none; width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: -10px auto 20px auto; }

        /* PLAYER BAR - PC */
        #player-bar { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 75%; height: 95px; background: rgba(10,10,10,0.95); 
            border-radius: 50px; border: 1px solid var(--accent-mid); 
            display: flex; align-items: center; padding: 0 40px; z-index: 1000; backdrop-filter: blur(20px); 
        }
        .bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin: 0 20px; position: relative; }
        #bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 15px var(--accent); transition: width 0.1s linear; }
        .ctrl-btn { cursor: pointer; opacity: 0.5; font-size: 18px; transition: 0.2s; }
        .ctrl-btn:hover, .ctrl-btn.active { opacity: 1; color: var(--accent); }

        /* MODALS */
        .full-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5,5,5,0.98); z-index: 3000; display: none; padding: 40px; backdrop-filter: blur(30px); }
        .close-x { position: absolute; top: 20px; right: 30px; font-size: 30px; cursor: pointer; opacity: 0.5; z-index: 10; }

        /* MOBILE OVERRIDES */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 4000; }
            #sidebar.mobile-show { transform: translateX(280px); }
            #main-content { padding: 20px; margin-right: 0 !important; }
            .search-box { width: 100%; margin-left: 0; margin-top: 10px; }
            .song-row { grid-template-columns: 30px 1fr 40px; }
            .song-row div:nth-child(3) { display: none; }
            
            #player-bar { width: 95%; height: 70px; bottom: 10px; padding: 0 20px; border-radius: 15px; }
            #player-bar .bar-bg, #player-bar .ctrl-btn:not(#play-btn) { display: none; } /* Mini bar hali */
            
            #right-panel { 
                width: 100%; left: 0; top: 0; bottom: 0; border-left: none; 
                transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
                border-top: 1px solid var(--accent-mid); border-radius: 30px 30px 0 0;
            }
            #right-panel.open { transform: translateY(0); }
            .mobile-drag-handle { display: block; }
            
            .mobile-player-controls { display: flex !important; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
            .pc-hide { display: none !important; }
        }

        .mobile-player-controls { display: none; }
        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; border: 1px solid var(--accent-mid); box-shadow: 0 15px 45px rgba(0,0,0,0.6); }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body id="main-body">

<div id="bg-grad"></div>

<div id="mob-menu-btn" onclick="toggleSidebar()" style="position:fixed; top:20px; left:20px; z-index:3500; font-size:24px; display:none;">☰</div>

<div id="sidebar">
    <div style="padding: 40px 30px; font-weight: 900; color: var(--accent); font-size: 20px;">USTA-IFY ADAPTIVE</div>
    <div class="nav-link active" onclick="showView('all', this); toggleSidebar(false)">🏠 HAVUZ</div>
    <div class="nav-link" onclick="showView('fav', this); toggleSidebar(false)">💖 FAVORİLER</div>
    <div class="nav-link" onclick="toggleModal('playlist-modal'); toggleSidebar(false)">📂 LİSTELER</div>
    <div id="sidebar-playlists"></div>
    <div style="margin-top: auto; padding-bottom: 20px;">
        <div class="nav-link" onclick="toggleModal('db-modal')">👤 ARŞİV</div>
        <div class="nav-link" onclick="toggleModal('settings-modal')">⚙️ AYARLAR</div>
    </div>
</div>

<div id="main-content">
    <div style="display: flex; flex-wrap: wrap; align-items: center; margin-bottom: 30px; gap: 15px;">
        <h1 id="view-title" style="font-size: 35px; font-weight: 900; margin:0;">HAVUZ</h1>
        <input type="text" id="search-input" class="search-box" placeholder="🔍 Şarkı Ara..." oninput="filterSongs()">
    </div>
    <div id="song-body"></div>
</div>

<div id="right-panel">
    <div class="mobile-drag-handle" onclick="toggleRight()"></div>
    <span class="close-x" onclick="toggleRight()">✕</span>
    
    <div class="premium-art" id="main-art" onclick="updateArt()"></div>
    
    <div style="text-align: center; margin-top: 20px;">
        <h2 id="mob-title" style="margin:0; font-size: 24px;">Şarkı Seçilmedi</h2>
        <p id="mob-artist" style="opacity:0.5; margin:5px 0 20px 0;">Usta-ify</p>
    </div>

    <div id="artist-chips" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px;"></div>

    <div class="mobile-player-controls">
        <div style="width:100%; display:flex; align-items:center; gap:10px;">
            <span id="m-cur-t" style="font-size:12px; opacity:0.5;">0:00</span>
            <div class="bar-bg" onclick="seek(event)" style="margin:0;"><div id="bar-fill-m" style="height:100%; background:var(--accent); width:0%; border-radius:10px;"></div></div>
            <span id="m-dur-t" style="font-size:12px; opacity:0.5;">0:00</span>
        </div>
        <div style="display:flex; align-items:center; gap:30px;">
            <span onclick="toggleShuffle()" class="ctrl-btn shuf-m">🔀</span>
            <span onclick="manualPrev()" style="font-size:35px;" class="ctrl-btn">⏮</span>
            <div onclick="togglePlay()" id="play-btn-m" style="width:70px; height:70px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px;">▶</div>
            <span onclick="manualNext()" style="font-size:35px;" class="ctrl-btn">⏭</span>
            <span onclick="toggleRepeat()" class="ctrl-btn rep-m">🔁</span>
        </div>
    </div>

    <div style="margin-top: 40px; border-top: 1px solid var(--accent-dark); padding-top: 20px;">
        <input type="text" id="credits-input" style="background:rgba(255,255,255,0.03); border:1px dashed var(--accent-mid); color:#fff; width:100%; padding:12px; border-radius:10px;" placeholder="#tag ekle..." oninput="parseHashtags()">
        <textarea id="desc-input" style="background:transparent; border:none; color:#fff; width:100%; height:100px; margin-top:15px; opacity:0.4;" placeholder="Şarkı notları..." oninput="saveMeta()"></textarea>
    </div>
</div>

<div id="player-bar" class="pc-player">
    <div style="width:250px; display:flex; align-items:center; gap:15px; cursor:pointer" onclick="toggleRight()">
        <div id="mini-art" style="width:50px; height:50px; border-radius:10px; background:#222; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:900; font-size:14px; white-space:nowrap">Şarkı Seç</div>
            <div id="bar-artist" style="font-size:11px; opacity:0.4">Usta-ify</div>
        </div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center">
        <div style="display:flex; align-items:center; gap:25px; margin-bottom:5px">
            <span onclick="toggleShuffle()" id="shuf-btn" class="ctrl-btn">🔀</span>
            <span onclick="manualPrev()" style="font-size:26px" class="ctrl-btn">⏮</span>
            <div onclick="togglePlay()" id="play-btn" style="width:45px; height:45px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer">▶</div>
            <span onclick="manualNext()" style="font-size:26px" class="ctrl-btn">⏭</span>
            <span onclick="toggleRepeat()" id="rep-btn" class="ctrl-btn">🔁</span>
        </div>
        <div style="width:100%; display:flex; align-items:center">
            <span id="cur-t" style="font-size:10px; opacity:0.5; width:35px">0:00</span>
            <div class="bar-bg" onclick="seek(event)"><div id="bar-fill"></div></div>
            <span id="dur-t" style="font-size:10px; opacity:0.5; width:35px">0:00</span>
        </div>
    </div>
    <div style="width:150px; text-align:right">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)" style="accent-color:var(--accent); width:80px">
    </div>
</div>

<div id="settings-modal" class="full-modal">...</div>
<div id="playlist-modal" class="full-modal">...</div>
<div id="db-modal" class="full-modal">...</div>

<audio id="pa"></audio><audio id="pb"></audio>

<script>
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let playlists = JSON.parse(localStorage.getItem('u_pl')) || {}, artistDB = JSON.parse(localStorage.getItem('u_db')) || {};
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {}, currentIdx = 0, activeP = 'a', cfS = 3;
    let isShuffle = false, repeatMode = 0;

    // TOUCH SWIPE FOR MOBILE
    let touchStart = 0;
    document.getElementById('right-panel').addEventListener('touchstart', e => touchStart = e.touches[0].clientY);
    document.getElementById('right-panel').addEventListener('touchmove', e => {
        let touchMove = e.touches[0].clientY;
        if(touchMove - touchStart > 100 && window.innerWidth < 768) toggleRight(false);
    });

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url?.includes('http'));
        showView('all'); updateDBUI(); updatePLUI();
        if(window.innerWidth < 768) document.getElementById('mob-menu-btn').style.display = 'block';
        requestAnimationFrame(sync);
    }

    function playIdx(i, isManual = true) {
        currentIdx = i; const s = currentQueue[currentIdx];
        const cur = activeP === 'a' ? pa : pb;
        const other = activeP === 'a' ? pb : pa;
        if (isManual) { other.pause(); other.currentTime = 0; cur.src = s.url; cur.volume = 1; cur.play(); }
        document.getElementById('play-btn').innerText = document.getElementById('play-btn-m').innerText = "⏸";
        updateUI(s);
        if(!document.getElementById('right-panel').classList.contains('open')) toggleRight(true);
    }

    function sync() {
        const cur = activeP === 'a' ? pa : pb;
        if(!cur.paused && cur.duration) {
            const perc = (cur.currentTime/cur.duration*100) + "%";
            document.getElementById('bar-fill').style.width = document.getElementById('bar-fill-m').style.width = perc;
            document.getElementById('cur-t').innerText = document.getElementById('m-cur-t').innerText = formatT(cur.currentTime);
            document.getElementById('dur-t').innerText = document.getElementById('m-dur-t').innerText = formatT(cur.duration);
            if(cur.duration - cur.currentTime <= cfS && !cur.dataset.fading && cfS > 0) {
                cur.dataset.fading = "true"; crossFade();
            }
        }
        requestAnimationFrame(sync);
    }

    function crossFade() {
        const oldP = activeP === 'a' ? pa : pb;
        activeP = activeP === 'a' ? 'b' : 'a';
        const newP = activeP === 'a' ? pa : pb;
        if(isShuffle) currentIdx = Math.floor(Math.random()*currentQueue.length);
        else if(repeatMode !== 2) currentIdx = (currentIdx + 1) % currentQueue.length;
        const s = currentQueue[currentIdx];
        newP.src = s.url; newP.volume = 0; newP.play();
        let v = 0;
        let int = setInterval(() => {
            v += 0.05;
            if(v >= 1) { clearInterval(int); oldP.pause(); oldP.dataset.fading = ""; newP.volume = 1; }
            else { newP.volume = v; oldP.volume = 1-v; }
        }, (cfS*1000)/20);
        updateUI(s);
    }

    function updateUI(s) {
        document.getElementById('bar-title').innerText = document.getElementById('mob-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = document.getElementById('mob-artist').innerText = s.artist;
        const m = songMeta[s.url] || { art: '', credits: '', desc: '' };
        const artHtml = m.art ? `<img src="${m.art}">` : '';
        document.getElementById('main-art').innerHTML = artHtml;
        document.getElementById('mini-art').innerHTML = m.art ? `<img src="${m.art}" style="width:100%;height:100%;object-fit:cover">` : '';
        document.getElementById('credits-input').value = m.credits || "";
        document.getElementById('desc-input').value = m.desc || "";
        applyTheme(m.art); parseHashtags(); renderSongs();
    }

    function toggleRight(force) { 
        const p = document.getElementById('right-panel');
        const b = document.getElementById('main-body');
        const isOpening = force !== undefined ? force : !p.classList.contains('open');
        p.classList.toggle('open', isOpening);
        if(window.innerWidth > 768) b.classList.toggle('right-open', isOpening);
    }

    function toggleSidebar(force) {
        document.getElementById('sidebar').classList.toggle('mobile-show', force);
    }

    // RENK & THEME
    function applyTheme(imgUrl = null) {
        const manual = document.getElementById('manual-color')?.value || "#00f2ff";
        if(imgUrl) {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = imgUrl;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 1; canvas.height = 1; ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const col = `rgb(${r},${g},${b})`;
                document.documentElement.style.setProperty('--accent', col);
                document.documentElement.style.setProperty('--accent-dark', `rgba(${r},${g},${b}, 0.2)`);
                document.documentElement.style.setProperty('--accent-mid', `rgba(${r},${g},${b}, 0.5)`);
            };
        } else {
            document.documentElement.style.setProperty('--accent', manual);
        }
    }

    // STANDARTLAR
    function togglePlay() { const c = activeP==='a'?pa:pb; c.paused ? c.play() : c.pause(); document.getElementById('play-btn').innerText = document.getElementById('play-btn-m').innerText = c.paused ? '▶' : '⏸'; }
    function manualNext() { playIdx((currentIdx + 1) % currentQueue.length, true); }
    function manualPrev() { playIdx((currentIdx - 1 + currentQueue.length) % currentQueue.length, true); }
    function filterSongs() { const t = document.getElementById('search-input').value.toLowerCase(); currentQueue = allSongs.filter(s => s.title.toLowerCase().includes(t) || s.artist.toLowerCase().includes(t)); renderSongs(); }
    function showView(t, el) { 
        document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active')); if(el) el.classList.add('active');
        currentQueue = t==='all'?[...allSongs]:allSongs.filter(s=>favorites.includes(s.url)); renderSongs(); 
    }
    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIdx===i?'playing':''}" onclick="playIdx(${i}, true)">
                <div style="opacity:0.3">${i+1}</div>
                <div style="font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.title}</div>
                <div style="opacity:0.5">${s.artist}</div>
                <div onclick="event.stopPropagation(); toggleFav('${s.url}')" style="text-align:right">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }
    function formatT(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function seek(e) { (activeP==='a'?pa:pb).currentTime = (e.offsetX / e.currentTarget.offsetWidth) * (activeP==='a'?pa:pb).duration; }
    function toggleShuffle() { isShuffle = !isShuffle; document.querySelectorAll('.shuf-m, #shuf-btn').forEach(b => b.classList.toggle('active', isShuffle)); }
    function toggleRepeat() { repeatMode = (repeatMode+1)%3; document.querySelectorAll('.rep-m, #rep-btn').forEach(b => b.innerText = repeatMode===2?'🔂':'🔁'); }

    window.onload = init;
</script>
</body>
</html>
