<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usta Spotify Mobil Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --green: #1db954; --black: #000; --dark: #121212; --grey: #282828; --text-grey: #b3b3b3; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar - Mobilde gizle/aç yapabiliriz ama şimdilik sabit kalsın */
        #sidebar { width: 240px; background: var(--black); padding: 15px; display: flex; flex-direction: column; border-right: 1px solid #222; }
        @media (max-width: 768px) { #sidebar { display: none; } } /* Mobil görünümde yan menü gizlenebilir */

        #main { flex-grow: 1; background: linear-gradient(to bottom, #1e1e1e, var(--black)); overflow-y: auto; padding: 15px; padding-bottom: 180px; -webkit-overflow-scrolling: touch; }
        .song-table { width: 100%; border-collapse: collapse; }
        .song-table td { padding: 10px; color: var(--text-grey); border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        .active-song { color: var(--green) !important; font-weight: bold; }

        /* Player - Mobilde daha büyük butonlar */
        #player { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px 10px; border-top: 1px solid #282828; z-index: 100; box-sizing: border-box; }
        .player-grid { display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; }
        @media (max-width: 768px) { .player-grid { grid-template-columns: 1fr; gap: 10px; } .p-left, .p-right { display: none; } }

        .play-btn { background: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bar-bg { width: 100%; height: 5px; background: #444; border-radius: 3px; margin: 10px 0; position: relative; }
        .bar-fill { height: 100%; background: var(--green); width: 0%; border-radius: 3px; }
    </style>
</head>
<body onclick="unlockAudio()"> <div id="sidebar">
    <div class="nav-item active" onclick="showSection('all')"><i class="fas fa-home"></i> Kitaplık</div>
    <div class="nav-item" onclick="showSection('favs')"><i class="fas fa-heart"></i> Favoriler</div>
    <div class="nav-item" onclick="openSettings()"><i class="fas fa-cog"></i> Ayarlar</div>
    <div class="playlist-area" id="pl-container"></div>
</div>

<div id="main">
    <h1 id="view-title" style="font-size: 24px;">Yükleniyor...</h1>
    <table class="song-table"><tbody id="song-list"></tbody></table>
</div>

<div id="player">
    <div class="player-grid">
        <div class="p-left">
            <div id="p-title" style="font-weight:bold; font-size:14px;">Seçilmedi</div>
            <div id="p-artist" style="color:var(--text-grey); font-size:12px;">Usta</div>
        </div>

        <div class="p-mid" style="display:flex; flex-direction:column; align-items:center;">
            <div style="display:flex; gap:25px; align-items:center;">
                <button onclick="prev()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-step-backward"></i></button>
                <button class="play-btn" onclick="togglePlay()" id="play-btn"><i class="fas fa-play"></i></button>
                <button onclick="next()" style="background:none; border:none; color:white; font-size:20px;"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="bar-bg" id="progress-bar" onclick="seek(event)">
                <div class="bar-fill" id="bar-fill"></div>
            </div>
        </div>

        <div class="p-right" style="text-align:right;">
             <i class="fas fa-volume-up"></i>
        </div>
    </div>
</div>

<div id="settings-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; padding:20px; border-radius:10px; z-index:200; width:80%;">
    <h3>Geçiş Ayarı (Crossfade)</h3>
    <input type="range" min="0" max="12" value="5" id="cf-range" style="width:100%;">
    <p><span id="cf-val">5</span> saniye</p>
    <button onclick="closeSettings()" style="background:var(--green); width:100%; border:none; padding:10px; font-weight:bold; border-radius:5px;">KAYDET</button>
</div>

<script>
const TABLO_ID = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
const sheetUrl = `https://docs.google.com/spreadsheets/d/${TABLO_ID}/gviz/tq?tqx=out:json`;

let allSongs = [], currentSongs = [], favorites = [], playlists = {}, settings = { cf: 3 };
let currentIdx = 0, activeAudio = new Audio(), nextAudio = new Audio(), isCrossfading = false;
let audioUnlocked = false;

// Mobilde ses motorunu uyandır
function unlockAudio() {
    if (audioUnlocked) return;
    activeAudio.play().then(() => { activeAudio.pause(); nextAudio.play().then(() => nextAudio.pause()); });
    audioUnlocked = true;
}

async function init() {
    try {
        const res = await fetch(sheetUrl);
        const data = await res.text();
        const json = JSON.parse(data.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v || "İsimsiz", artist: r.c[1]?.v || "Usta", url: r.c[2]?.v || "" })).filter(s => s.url.includes("http"));
        
        loadStorage();
        showSection('all');
    } catch(e) { console.log("Hata:", e); }
}

function renderList() {
    const list = document.getElementById('song-list');
    list.innerHTML = currentSongs.map((s, i) => `
        <tr onclick="playSong(${i})" class="${activeAudio.src === s.url ? 'active-song' : ''}">
            <td style="width:10%">${i+1}</td>
            <td><strong>${s.title}</strong><br><small>${s.artist}</small></td>
        </tr>`).join('');
}

function playSong(i, isFade = false) {
    currentIdx = i;
    const s = currentSongs[currentIdx];
    
    if(!isFade) {
        activeAudio.pause();
        activeAudio.src = s.url;
        activeAudio.play().catch(e => console.log("Mobil Engel:", e));
    } else {
        activeAudio = nextAudio;
    }

    document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
    document.getElementById('p-title').innerText = s.title;
    document.getElementById('p-artist').innerText = s.artist;
    
    isCrossfading = false;
    activeAudio.ontimeupdate = handleTimeUpdate;
    renderList();

    // Sadece sıradaki şarkıyı ön yükle (Mobil dostu)
    let nIdx = (currentIdx + 1) % currentSongs.length;
    nextAudio.src = currentSongs[nIdx].url;
    nextAudio.preload = "auto";
}

function handleTimeUpdate() {
    const pct = (activeAudio.currentTime / activeAudio.duration) * 100;
    document.getElementById('bar-fill').style.width = pct + "%";
    
    if (activeAudio.duration - activeAudio.currentTime <= settings.cf && !isCrossfading && settings.cf > 0) {
        isCrossfading = true;
        startCrossfade();
    }
}

function startCrossfade() {
    nextAudio.volume = 0;
    nextAudio.play();
    let vol = 0;
    let fadeInterval = setInterval(() => {
        if (vol < 1) {
            vol += 0.1;
            nextAudio.volume = vol;
            if (activeAudio.volume > 0.1) activeAudio.volume -= 0.1;
        } else {
            activeAudio.pause();
            playSong((currentIdx + 1) % currentSongs.length, true);
            clearInterval(fadeInterval);
        }
    }, (settings.cf * 1000) / 10);
}

function togglePlay() {
    if(activeAudio.paused) { activeAudio.play(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>'; }
    else { activeAudio.pause(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; }
}

function next() { playSong((currentIdx + 1) % currentSongs.length); }
function prev() { playSong((currentIdx - 1 + currentSongs.length) % currentSongs.length); }

function seek(e) {
    const rect = document.getElementById('progress-bar').getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    activeAudio.currentTime = pct * activeAudio.duration;
}

function showSection(name) {
    document.getElementById('view-title').innerText = name === 'all' ? "Kitaplık" : (name === 'favs' ? "Favoriler" : name);
    currentSongs = name === 'all' ? [...allSongs] : (name === 'favs' ? [...favorites] : [...playlists[name]]);
    renderList();
}

function openSettings() { document.getElementById('settings-modal').style.display = 'block'; }
function closeSettings() { 
    settings.cf = parseInt(document.getElementById('cf-range').value); 
    document.getElementById('cf-val').innerText = settings.cf;
    document.getElementById('settings-modal').style.display = 'none'; 
    saveStorage();
}

function saveStorage() { localStorage.setItem('usta_settings', JSON.stringify(settings)); }
function loadStorage() { settings = JSON.parse(localStorage.getItem('usta_settings') || '{"cf":3}'); }

init();
</script>
</body>
</html>
