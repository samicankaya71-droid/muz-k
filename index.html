<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Usta-ify Chameleon v17.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #00f2ff; --bg-dark: #050505; --text-color: #ffffff; }
        * { box-sizing: border-box; transition: background 0.8s ease, color 0.5s ease, border-color 0.5s ease; }
        body { 
            background: var(--bg-dark); 
            color: var(--text-color); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* DİNAMİK ARKA PLAN */
        #bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--main-color), transparent);
            opacity: 0.05; pointer-events: none; z-index: 0;
        }

        /* SIDEBAR */
        #sidebar { width: 260px; background: rgba(0,0,0,0.8); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; z-index: 10; }
        #sidebar.collapsed { width: 80px; }
        .nav-link { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #666; font-weight: 700; }
        .nav-link.active { color: var(--main-color); border-left: 4px solid var(--main-color); background: rgba(255,255,255,0.02); }

        /* ANA EKRAN */
        #main-content { flex: 1; overflow-y: auto; position: relative; z-index: 1; padding-bottom: 150px; }
        .song-row { display: grid; grid-template-columns: 50px 2fr 1fr 100px; padding: 15px 30px; border-radius: 15px; margin: 0 40px 5px; cursor: pointer; }
        .song-row.playing { background: rgba(255,255,255,0.05); color: var(--main-color); font-weight: bold; }

        /* SAĞ PANEL & HAYALET GİRİŞ */
        #right-panel { width: 380px; background: rgba(5,5,5,0.9); border-left: 1px solid rgba(255,255,255,0.05); transform: translateX(100%); transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1); overflow-y: auto; padding: 30px; }
        #right-panel.open { transform: translateX(0); }
        .premium-art { width: 100%; aspect-ratio: 1; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; margin-bottom: 30px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .premium-art img { width: 100%; height: 100%; object-fit: cover; }

        .ghost-area { position: relative; margin-top: 10px; }
        .ghost-input { 
            width: 100%; background: transparent; border: 1px solid transparent; 
            color: var(--text-color); padding: 10px; border-radius: 10px; font-family: inherit;
            opacity: 0; cursor: default;
        }
        .ghost-area:hover .ghost-input, .ghost-input:focus { opacity: 0.3; border-color: var(--main-color); cursor: text; }
        
        .artist-chip { 
            display: inline-flex; align-items: center; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 50px; 
            margin: 5px; font-size: 12px; gap: 10px; 
        }
        .artist-chip img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid var(--main-color); }

        /* PLAYER BAR */
        #player-bar { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; height: 100px; 
            background: rgba(10,10,10,0.8); backdrop-filter: blur(30px); border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 40px; z-index: 100;
        }
        .progress-container { flex: 1; margin: 0 30px; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; position: relative; }
        #bar-fill { height: 100%; background: var(--main-color); width: 0%; border-radius: 10px; box-shadow: 0 0 15px var(--main-color); }

        /* MODALS */
        .modal { 
            position: fixed; background: rgba(5,5,5,0.95); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 30px; padding: 30px; z-index: 2000; display: none; width: 400px; box-shadow: 0 0 100px #000;
        }
        .btn-main { background: var(--main-color); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="bg-overlay"></div>

<div id="sidebar">
    <div style="padding: 40px 30px; font-weight: 900; font-size: 20px; color: var(--main-color); letter-spacing: -1px;">USTA-IFY</div>
    <div class="nav-link active" onclick="showView('all', this)"><span>🏠</span><span>HAVUZ</span></div>
    <div class="nav-link" onclick="showView('fav', this)"><span>💖</span><span>FAVORİLER</span></div>
    <div class="nav-link" onclick="toggleModal('db-modal')"><span>👤</span><span>ARŞİV</span></div>
    <div class="nav-link" onclick="toggleModal('settings-modal')"><span>⚙️</span><span>AYARLAR</span></div>
</div>

<div id="main-content">
    <div style="padding: 80px 40px 30px;"><h1 id="view-title" style="font-size: 60px; margin:0; font-weight: 900;">TÜMÜ</h1></div>
    <div id="song-body"></div>
</div>

<div id="right-panel">
    <div class="premium-art" onclick="updateArt()" id="main-art"></div>
    <div id="artist-chips"></div>
    <div class="ghost-area">
        <input type="text" class="ghost-input" id="credits-input" placeholder="#tag..." oninput="parseHashtags()">
    </div>
    <div style="margin-top:40px; opacity: 0.5; font-size: 11px; font-weight: 800; letter-spacing: 2px;">NOTLAR</div>
    <textarea class="ghost-input" id="desc-input" style="height:120px; opacity:0.1" oninput="saveSongMeta()"></textarea>
</div>

<div id="player-bar">
    <div style="width:250px; display:flex; align-items:center; gap:20px">
        <div id="mini-art" style="width:60px; height:60px; border-radius:15px; background:#111; overflow:hidden"></div>
        <div style="overflow:hidden">
            <div id="bar-title" style="font-weight:900; font-size:15px; white-space:nowrap">Şarkı Seç</div>
            <div id="bar-artist" style="font-size:12px; opacity:0.4">Usta-ify</div>
        </div>
    </div>

    <div class="progress-container">
        <div style="display:flex; justify-content:center; gap:25px; margin-bottom:12px">
            <span onclick="toggleShuffle()" id="shuf-btn" style="cursor:pointer; opacity:0.3">🔀</span>
            <span onclick="prev()" style="cursor:pointer; font-size: 20px;">⏮</span>
            <div onclick="togglePlay()" id="play-btn" style="width:55px; height:55px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:24px">▶</div>
            <span onclick="next()" style="cursor:pointer; font-size: 20px;">⏭</span>
            <span onclick="toggleRepeat()" id="rep-btn" style="cursor:pointer; opacity:0.3">🔁</span>
        </div>
        <div style="display:flex; align-items:center; gap:15px">
            <span id="cur-time" style="font-size:11px; width:40px; opacity:0.5">0:00</span>
            <div class="bar-bg" id="bar-container" onclick="seek(event)"><div id="bar-fill"></div></div>
            <span id="dur-time" style="font-size:11px; width:40px; opacity:0.5">0:00</span>
        </div>
    </div>

    <div style="width:200px; display:flex; justify-content:flex-end">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)" style="accent-color:var(--main-color)">
    </div>
</div>

<div id="db-modal" class="modal" style="bottom:150px; left:40px">
    <h2 style="margin-top:0">SANATÇI ARŞİVİ</h2>
    <input type="text" id="db-tag" placeholder="#etiket" class="ghost-input" style="opacity:1; background:rgba(255,255,255,0.05); margin-bottom:10px">
    <input type="text" id="db-name" placeholder="Sanatçı Adı" class="ghost-input" style="opacity:1; background:rgba(255,255,255,0.05); margin-bottom:10px">
    <input type="text" id="db-img" placeholder="Fotoğraf URL" class="ghost-input" style="opacity:1; background:rgba(255,255,255,0.05); margin-bottom:20px">
    <button class="btn-main" onclick="saveToDB()">KAYDET</button>
    <div id="db-list" style="margin-top:20px; max-height:200px; overflow-y:auto"></div>
</div>

<div id="settings-modal" class="modal" style="bottom:150px; right:40px">
    <h2 style="margin-top:0">AYARLAR</h2>
    <label>CROSSFADE: <span id="cf-val">3</span>s</label>
    <input type="range" min="0" max="12" value="3" oninput="updateCF(this.value)" style="width:100%; margin-top:20px">
</div>

<audio id="player1"></audio>
<audio id="player2"></audio>

<script>
    let allSongs = [], currentQueue = [], favorites = JSON.parse(localStorage.getItem('u_f')) || [];
    let songMeta = JSON.parse(localStorage.getItem('u_m')) || {};
    let artistDB = JSON.parse(localStorage.getItem('u_db')) || {};
    let currentIndex = 0, activeP = 1, cfS = 3, isShuffle = false, repeatMode = 0;

    const p1 = document.getElementById('player1'), p2 = document.getElementById('player2');

    async function init() {
        const id = "1wmpmxKjl-EFhiwqEShsPYx9VjiXfEmqvfdlI2k0Bkq8";
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allSongs = json.table.rows.map(r => ({ title: r.c[0]?.v, artist: r.c[1]?.v, url: r.c[2]?.v })).filter(s => s.url?.includes('http'));
        showView('all');
        updateDBUI();
        requestAnimationFrame(syncBar);
    }

    // BUKALEMUN RENK ANALİZİ
    function adaptColors(imgUrl) {
        if(!imgUrl) return;
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = imgUrl;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1; canvas.height = 1;
            ctx.drawImage(img, 0, 0, 1, 1);
            const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
            const color = `rgb(${r},${g},${b})`;
            document.documentElement.style.setProperty('--main-color', color);
            // Zıt renk kontrolü (parlaklık analizi)
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            document.documentElement.style.setProperty('--text-color', brightness > 125 ? '#000' : '#fff');
        };
    }

    function playIdx(i, force = true) {
        currentIndex = i;
        const s = currentQueue[currentIndex];
        const cur = activeP === 1 ? p1 : p2;
        const other = activeP === 1 ? p2 : p1;

        if(force) {
            other.pause();
            cur.src = s.url;
            cur.volume = 1;
            cur.play();
            document.getElementById('play-btn').innerText = "⏸";
        }
        
        updateUI(s);
        if(!document.getElementById('right-panel').classList.contains('open')) toggleRightPanel();
    }

    function syncBar() {
        const cur = activeP === 1 ? p1 : p2;
        if(!cur.paused && cur.duration) {
            const prog = (cur.currentTime / cur.duration) * 100;
            document.getElementById('bar-fill').style.width = prog + "%";
            document.getElementById('cur-time').innerText = formatT(cur.currentTime);
            document.getElementById('dur-time').innerText = formatT(cur.duration);

            // Crossfade Tetikleyici (Hatasız mühürlü versiyon)
            if(cur.duration - cur.currentTime <= cfS && cfS > 0 && !cur.dataset.fading) {
                cur.dataset.fading = "true";
                crossFadeNext();
            }
        }
        requestAnimationFrame(syncBar);
    }

    function crossFadeNext() {
        const oldP = activeP === 1 ? p1 : p2;
        activeP = activeP === 1 ? 2 : 1;
        const newP = activeP === 1 ? p1 : p2;

        currentIndex = (currentIndex + 1) % currentQueue.length;
        const nextS = currentQueue[currentIndex];

        newP.src = nextS.url;
        newP.volume = 0;
        newP.dataset.fading = "";
        newP.play();

        let vol = 0;
        const interval = setInterval(() => {
            vol += 0.02;
            if(vol >= 1) {
                clearInterval(interval);
                oldP.pause();
                oldP.dataset.fading = "";
                newP.volume = 1;
            } else {
                newP.volume = vol;
                oldP.volume = 1 - vol;
            }
        }, (cfS * 1000) / 50);

        updateUI(nextS);
    }

    function updateUI(s) {
        document.getElementById('bar-title').innerText = s.title;
        document.getElementById('bar-artist').innerText = s.artist;
        const m = songMeta[s.url] || { art: '', credits: '', desc: '' };
        document.getElementById('main-art').innerHTML = m.art ? `<img src="${m.art}">` : '<div style="padding:40px; text-align:center">GÖRSEL YOK</div>';
        document.getElementById('mini-art').innerHTML = m.art ? `<img src="${m.art}" style="width:100%;height:100%;object-fit:cover">` : '';
        document.getElementById('credits-input').value = m.credits || "";
        document.getElementById('desc-input').value = m.desc || "";
        parseHashtags();
        adaptColors(m.art);
        document.querySelectorAll('.song-row').forEach((r, idx) => r.classList.toggle('playing', idx === currentIndex));
    }

    // ARŞİV VE HASHTAG
    function saveToDB() {
        const tag = document.getElementById('db-tag').value.toLowerCase().replace('#','');
        const name = document.getElementById('db-name').value;
        const img = document.getElementById('db-img').value;
        if(tag && name) {
            artistDB[tag] = { name, img };
            localStorage.setItem('u_db', JSON.stringify(artistDB));
            updateDBUI();
            parseHashtags();
        }
    }

    function updateDBUI() {
        document.getElementById('db-list').innerHTML = Object.keys(artistDB).map(k => `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px">
                <img src="${artistDB[k].img}" style="width:30px; height:30px; border-radius:50%">
                <span style="font-size:12px">#${k} - ${artistDB[k].name}</span>
                <span onclick="delDB('${k}')" style="margin-left:auto; cursor:pointer; color:red">✕</span>
            </div>
        `).join('');
    }

    function parseHashtags() {
        const text = document.getElementById('credits-input').value;
        const chips = document.getElementById('artist-chips');
        const tags = text.match(/#(\w+)/g) || [];
        chips.innerHTML = tags.map(t => {
            const key = t.substring(1).toLowerCase();
            const art = artistDB[key];
            return art ? `<div class="artist-chip"><img src="${art.img}"> ${art.name}</div>` : `<div class="artist-chip">#${key}</div>`;
        }).join('');
        saveSongMeta();
    }

    // YARDIMCI FONKSİYONLAR
    function delDB(k) { delete artistDB[k]; localStorage.setItem('u_db', JSON.stringify(artistDB)); updateDBUI(); parseHashtags(); }
    function toggleModal(id) { 
        const m = document.getElementById(id); 
        const showing = m.style.display === 'block';
        document.querySelectorAll('.modal').forEach(mod => mod.style.display = 'none');
        m.style.display = showing ? 'none' : 'block';
    }
    function toggleRightPanel() { document.getElementById('right-panel').classList.toggle('open'); }
    function formatT(s) { const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function setVol(v) { p1.volume = v; p2.volume = v; }
    function seek(e) { 
        const cur = activeP === 1 ? p1 : p2;
        cur.currentTime = (e.offsetX / document.getElementById('bar-container').offsetWidth) * cur.duration; 
    }
    function togglePlay() {
        const cur = activeP === 1 ? p1 : p2;
        if(cur.paused) { cur.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { cur.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }
    function updateCF(v) { cfS = parseInt(v); document.getElementById('cf-val').innerText = v; }
    function next() { crossFadeNext(); }
    function prev() { currentIndex = (currentIndex - 1 + currentQueue.length) % currentQueue.length; playIdx(currentIndex); }
    function saveSongMeta() {
        const s = currentQueue[currentIndex];
        const img = document.querySelector('#main-art img');
        songMeta[s.url] = { art: img ? img.src : '', credits: document.getElementById('credits-input').value, desc: document.getElementById('desc-input').value };
        localStorage.setItem('u_m', JSON.stringify(songMeta));
    }
    function updateArt() {
        const url = prompt("Resim URL:");
        if(url) { 
            document.getElementById('main-art').innerHTML = `<img src="${url}">`; 
            saveSongMeta(); 
            adaptColors(url);
        }
    }
    function showView(type, el) {
        if(el) { document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        currentQueue = type === 'all' ? [...allSongs] : allSongs.filter(s => favorites.includes(s.url));
        renderSongs();
    }
    function renderSongs() {
        document.getElementById('song-body').innerHTML = currentQueue.map((s, i) => `
            <div class="song-row ${currentIndex===i?'playing':''}" onclick="playIdx(${i})">
                <div style="opacity:0.2">${i+1}</div>
                <div>${s.title}</div>
                <div style="opacity:0.4">${s.artist}</div>
                <div onclick="event.stopPropagation(); toggleFav('${s.url}')">${favorites.includes(s.url)?'💖':'🤍'}</div>
            </div>
        `).join('');
    }
    function toggleFav(u) {
        if(favorites.includes(u)) favorites = favorites.filter(f => f !== u);
        else favorites.push(u);
        localStorage.setItem('u_f', JSON.stringify(favorites));
        renderSongs();
    }

    window.onload = init;
</script>
</body>
</html>
